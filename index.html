onth-cell{padding:6px 4px 4px}.day-number{min-width:24px;height:24px;font-size:11px}.bar-layers{left:2px;right:2px;top:28px;gap:3px}.event-bar{height:12px;padding:0 4px;border-radius:5px;font-size:0}.event-bar .bar-label{display:none}.month-cell .mini-dots{bottom:5px;left:5px}.month-cell .mini-dots span{width:4px;height:4px}.bottom-bar{left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom,0px) + 12px)}.floating-dock{gap:6px;padding:8px 10px}.dock-btn{padding:8px 6px;font-size:11px;min-width:44px}.primary-fab{width:50px;height:50px}.primary-fab svg{width:22px;height:22px}.panel{padding:14px;border-radius:24px}.panel-header{margin-bottom:10px}.panel-title{font-size:18px}.panel-sub{font-size:12px}.subscription-overview,.category-grid,.overview-grid{gap:8px}.subscription-overview{grid-template-columns:1fr}.sub-total{padding:16px;border-radius:20px}.sub-total .value{font-size:24px}.category-card,.overview-card,.habit-card,.sub-item{border-radius:18px}.overview-card{padding:12px}.overview-card .name{font-size:11px}.overview-card .value{font-size:20px}.overview-card .sub{font-size:11px}.habit-card{padding:12px}.habit-top h4{font-size:16px}.habit-top p,.habit-foot{font-size:11px}.mini-row{padding:10px 12px}.week-head{padding:0 0 8px}.week-title{font-size:18px}.week-strip{padding:10px 0 8px}.week-num{font-size:15px}.week-num.today{width:42px;height:42px}.day-card{padding:14px}.day-summary h3{font-size:20px}.task-item{padding:14px;border-radius:20px}.task-main h4{font-size:15px}}

<body>
<div id="app">
<header class="topbar"><div class="topline"><div><div class="eyebrow" id="todayLabel">오늘 일정</div><div class="title">to do list</div></div><div class="header-actions"><button class="icon-btn" type="button" id="openStatsBtn" title="통계"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 20V10"/><path d="M12 20V4"/><path d="M18 20v-7"/></svg></button><button class="icon-btn" type="button" id="openSubBtn" title="구독 추가"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button></div></div><section class="hero-card"><div class="hero-main"><h2 id="heroHeadline">이번 달 일정 0개를 정리 중이에요</h2></div><div class="hero-stats"><div class="stat-pill"><div class="stat-label">오늘 할 일</div><div class="stat-value" id="todayCount">0개</div></div><div class="stat-pill"><div class="stat-label">한달 할 일</div><div class="stat-value" id="monthCount">0개</div></div><div class="stat-pill"><div class="stat-label">이번 달 구독</div><div class="stat-value" id="subTotalMini">0원</div></div></div></section><div class="segment-wrap"><div class="segment"><button type="button" class="active" data-view="month">월간</button><button type="button" data-view="week">주간</button></div><button class="today-chip" type="button" id="jumpToday">오늘</button></div></header>
<main class="content" id="content"></main>
<div class="bottom-bar"><div class="floating-dock"><button class="dock-btn active" type="button" id="focusScheduleTab">일정</button><button class="dock-btn" type="button" id="focusSubTab">구독</button><button class="primary-fab" type="button" id="openTaskBtn" aria-label="일정 추가"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button><button class="dock-btn" type="button" id="focusCategoryTab">카테고리</button><button class="dock-btn" type="button" id="focusStatsTab">통계</button></div></div>
</div>
<div class="modal-backdrop" id="taskModal"><div class="sheet"><div class="sheet-handle"></div><div class="sheet-head"><h3 id="taskModalTitle">일정 추가</h3><button class="close-btn" type="button" data-close="taskModal">×</button></div><div class="form-grid"><div class="field"><label for="taskTitle">제목</label><input id="taskTitle" placeholder="예: 프로젝트 마감"></div><div class="inline-two"><div class="field"><label for="taskStart">시작일</label><input id="taskStart" type="date"></div><div class="field"><label for="taskEnd">종료일</label><input id="taskEnd" type="date"></div></div><div class="inline-two"><div class="field"><label for="taskTime">시간</label><input id="taskTime" type="time"></div><div class="field"><label for="taskCategory">카테고리</label><select id="taskCategory"></select></div></div><div class="field"><label for="taskNote">메모</label><textarea id="taskNote" placeholder="세부 메모를 남겨보세요"></textarea></div><div class="submit-row"><button class="btn-secondary" type="button" data-close="taskModal">취소</button><button class="btn-primary" type="button" id="saveTaskBtn">저장</button></div></div></div></div>
<div class="modal-backdrop" id="subModal"><div class="sheet"><div class="sheet-handle"></div><div class="sheet-head"><h3 id="subModalTitle">구독 추가</h3><button class="close-btn" type="button" data-close="subModal">×</button></div><div class="form-grid"><div class="field"><label for="subService">서비스명</label><input id="subService" placeholder="예: Netflix"></div><div class="inline-two"><div class="field"><label for="subAmount">금액</label><input id="subAmount" type="number" min="0" step="100"></div><div class="field"><label for="subDate">결제일</label><input id="subDate" type="number" min="1" max="31" placeholder="매달 5일"></div></div><div class="field"><label for="subCategory">카테고리</label><select id="subCategory"></select></div><div class="submit-row"><button class="btn-secondary" type="button" data-close="subModal">취소</button><button class="btn-primary" type="button" id="saveSubBtn">저장</button></div></div></div></div>
<div class="modal-backdrop" id="routineModal"><div class="sheet"><div class="sheet-handle"></div><div class="sheet-head"><h3 id="routineModalTitle">루틴 추가</h3><button class="close-btn" type="button" data-close="routineModal">×</button></div><div class="form-grid"><div class="field"><label for="routineTitle">루틴 이름</label><input id="routineTitle" placeholder="예: 아침 스트레칭"></div><div class="inline-two"><div class="field"><label for="routinePattern">반복</label><select id="routinePattern"><option value="daily">매일</option><option value="weekday">평일</option><option value="weekend">주말</option><option value="custom">커스텀</option></select></div><div class="field"><label for="routineGoal">주간 목표</label><input id="routineGoal" type="number" min="1" max="7" value="5"></div></div><div class="field"><label for="routineDays">커스텀 요일</label><select id="routineDays" multiple><option value="1">월</option><option value="2">화</option><option value="3">수</option><option value="4">목</option><option value="5">금</option><option value="6">토</option><option value="0">일</option></select></div><div class="submit-row"><button class="btn-secondary" type="button" data-close="routineModal">취소</button><button class="btn-primary" type="button" id="saveRoutineBtn">저장</button></div></div></div></div><div class="modal-backdrop" id="taskDetailModal"><div class="sheet"><div class="sheet-handle"></div><div class="sheet-head"><h3>일정 상세</h3><button class="close-btn" type="button" data-close="taskDetailModal">×</button></div><div class="form-grid"><div class="field"><label>제목</label><div id="detailTitle" class="mini-row" style="justify-content:flex-start"></div></div><div class="inline-two"><div class="field"><label>일정</label><div id="detailDate" class="mini-row" style="justify-content:flex-start"></div></div><div class="field"><label>시간</label><div id="detailTime" class="mini-row" style="justify-content:flex-start"></div></div></div><div class="field"><label>카테고리</label><div id="detailCategory" class="mini-row" style="justify-content:flex-start"></div></div><div class="field"><label>메모</label><div id="detailNote" class="mini-row" style="justify-content:flex-start;align-items:flex-start;min-height:84px"></div></div><div class="submit-row"><button class="btn-secondary" type="button" data-close="taskDetailModal">닫기</button><button class="btn-primary" type="button" id="detailEditBtn">수정</button></div></div></div></div><script>
const STORAGE_KEY='ios_todo_calendar_v2';const DAY_NAMES=['일','월','화','수','목','금','토'];const MONTH_NAMES=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const TASK_CATEGORIES=[{name:'업무',color:'#0A84FF'},{name:'개인',color:'#30D158'},{name:'건강',color:'#FF9F0A'},{name:'학습',color:'#BF5AF2'},{name:'생활',color:'#FF375F'}];
const SUB_CATEGORIES=[{name:'영상',color:'#0A84FF'},{name:'음악',color:'#BF5AF2'},{name:'생산성',color:'#30D158'},{name:'쇼핑',color:'#FF9F0A'},{name:'기타',color:'#40C8E0'}];
function startOfMonth(date){return new Date(date.getFullYear(),date.getMonth(),1)}function clone(obj){return JSON.parse(JSON.stringify(obj))}function fmtDate(date){const y=date.getFullYear(),m=String(date.getMonth()+1).padStart(2,'0'),d=String(date.getDate()).padStart(2,'0');return `${y}-${m}-${d}`}
function parseDate(str){return new Date(`${str}T00:00:00`)}function addDays(date,amount){const d=new Date(date);d.setDate(d.getDate()+amount);return d}function daysBetween(a,b){return Math.round((parseDate(b)-parseDate(a))/86400000)}function isSameMonth(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()}function escapeHtml(str){return String(str||'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}function money(value){return `${Number(value||0).toLocaleString('ko-KR')}원`}
function getTaskColor(category){return TASK_CATEGORIES.find(c=>c.name===category)?.color||'#0A84FF'}function getRoutineDays(routine){if(routine.pattern==='daily')return [0,1,2,3,4,5,6];if(routine.pattern==='weekday')return [1,2,3,4,5];if(routine.pattern==='weekend')return [0,6];return routine.days||[]}
function isRoutineScheduled(routine,date){return getRoutineDays(routine).includes(date.getDay())}
function getWeekDates(base){const start=addDays(base,-base.getDay());return Array.from({length:7},(_,i)=>addDays(start,i))}
function getRoutineWeekCount(routine,base){return getWeekDates(base).filter(d=>routine.completedDates.includes(fmtDate(d))).length}
function getRoutineStreak(routine){let streak=0;let d=new Date();for(let i=0;i<30;i++){const ds=fmtDate(d);if(isRoutineScheduled(routine,d)&&routine.completedDates.includes(ds)) streak++; else if(isRoutineScheduled(routine,d)) break;d=addDays(d,-1)}return streak}
function toggleRoutineToday(id){const today=new Date();const todayStr=fmtDate(today);state.routines=state.routines.map(r=>{if(r.id!==id)return r;const has=r.completedDates.includes(todayStr);const completedDates=has?r.completedDates.filter(v=>v!==todayStr):[...r.completedDates,todayStr];return {...r,completedDates}});saveState();render()} function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
const DEFAULT_STATE={currentView:'month',activeTab:'schedule',currentMonth:startOfMonth(new Date('2026-04-01')).toISOString(),selectedDate:'2026-04-06',editingTaskId:null,editingSubId:null,editingRoutineId:null,tasks:[{id:1,title:'브랜드 가이드 정리',start:'2026-04-06',end:'2026-04-06',time:'10:00',category:'업무',note:'와이어프레임 최종 확인',done:false},{id:2,title:'벚꽃 여행',start:'2026-04-10',end:'2026-04-13',time:'',category:'개인',note:'멀티데이 바 예시',done:false},{id:3,title:'PT 수업',start:'2026-04-08',end:'2026-04-08',time:'19:00',category:'건강',note:'하체 루틴',done:true},{id:4,title:'토익 공부',start:'2026-04-14',end:'2026-04-16',time:'20:00',category:'학습',note:'리스닝 집중',done:false}],subscriptions:[{id:1,service:'Netflix',amount:17000,payDay:3,category:'영상'},{id:2,service:'YouTube Premium',amount:14900,payDay:11,category:'영상'},{id:3,service:'Apple Music',amount:8900,payDay:18,category:'음악'},{id:4,service:'Notion',amount:8000,payDay:25,category:'생산성'}],routines:[{id:1,title:'물 2L 마시기',pattern:'daily',goal:7,completedDates:['2026-04-05','2026-04-06']},{id:2,title:'운동 30분',pattern:'weekday',goal:5,completedDates:['2026-04-01','2026-04-02','2026-04-04','2026-04-06']},{id:3,title:'영어 단어 20개',pattern:'custom',days:[1,3,5],goal:3,completedDates:['2026-04-02','2026-04-04']}]};
function loadState(){try{const saved=JSON.parse(localStorage.getItem(STORAGE_KEY));if(saved&&saved.tasks&&saved.subscriptions)return {...clone(DEFAULT_STATE),...saved,routines:saved.routines||clone(DEFAULT_STATE).routines}}catch(e){}return clone(DEFAULT_STATE)}let state=loadState();
function getSelectedDate(){return parseDate(state.selectedDate)}function getTasksForDate(dateStr){return state.tasks.filter(task=>task.start<=dateStr&&task.end>=dateStr).sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'))}function getTasksStartingOn(dateStr){return state.tasks.filter(task=>task.start===dateStr).sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'))}
function getMonthGrid(monthDate){const first=startOfMonth(monthDate);const start=addDays(first,-first.getDay());const cells=[];for(let i=0;i<42;i++)cells.push(addDays(start,i));return cells}function getWeekRows(monthDate){const cells=getMonthGrid(monthDate),rows=[];for(let i=0;i<cells.length;i+=7)rows.push(cells.slice(i,i+7));return rows}
function buildWeekBars(row){const rowStart=fmtDate(row[0]),rowEnd=fmtDate(row[6]);const active=state.tasks.filter(task=>task.start<=rowEnd&&task.end>=rowStart).sort((a,b)=>a.start.localeCompare(b.start)||a.title.localeCompare(b.title));const lanes=[];return active.map(task=>{const startIdx=Math.max(0,daysBetween(rowStart,task.start));const endIdx=Math.min(6,daysBetween(rowStart,task.end));let lane=0;while(lanes[lane]&&lanes[lane]>=startIdx)lane+=1;lanes[lane]=endIdx;return{task,lane,startIdx,endIdx,continuesLeft:task.start<rowStart,continuesRight:task.end>rowEnd}})}
function renderMonthView(){const monthDate=startOfMonth(new Date(state.currentMonth));const rows=getWeekRows(monthDate);const monthLabel=`${monthDate.getFullYear()}년 ${MONTH_NAMES[monthDate.getMonth()]}`;const todayStr=fmtDate(new Date());const weekdayHtml=DAY_NAMES.map((day,index)=>{const color=index===0?'#ff3b30':index===6?'#0a66ff':'#c1c5d0';return `<div style="color:${color};padding:10px 0 8px">${day}</div>`}).join('');const rowsHtml=rows.map(row=>row.map((date,dayIndex)=>{const dateStr=fmtDate(date);const dow=date.getDay();const numColor=dow===0?'#ff3b30':dow===6?'#0a66ff':'#7b8190';const bars=buildWeekBars(row).filter(bar=>bar.startIdx===dayIndex).map(bar=>{const label=bar.continuesLeft?'':escapeHtml(bar.task.time||bar.task.title);return `<div class="event-bar ${bar.continuesLeft?'continue-left':''} ${bar.continuesRight?'continue-right':''} ${bar.task.done?'done':''}" data-open-task="${bar.task.id}" style="grid-row:${bar.lane+1};width:calc(${bar.endIdx-bar.startIdx+1}00% + ${(bar.endIdx-bar.startIdx)*8}px);background:${getTaskColor(bar.task.category)}"><span class="bar-label">${label}</span></div>`}).join('');const miniDots=getTasksStartingOn(dateStr).slice(0,3).map(task=>`<span style="background:${getTaskColor(task.category)}"></span>`).join('');return `<div class="month-cell ${isSameMonth(date,monthDate)?'':'other'} ${dateStr===state.selectedDate?'selected':''} ${dateStr===todayStr?'today':''}" data-date="${dateStr}"><div class="day-number" style="${dateStr===todayStr?'':`color:${numColor}`}">${date.getDate()}</div><div class="bar-layers">${bars}</div><div class="mini-dots">${miniDots}</div></div>`}).join('')).join('');return `<section class="panel month-photo-panel"><div class="month-photo-head"><div class="nav-inline"><button type="button" id="prevMonth">‹</button></div><div class="month-photo-title">${monthLabel}</div><div class="nav-inline"><button type="button" id="nextMonth">›</button></div></div><div class="calendar-shell"><div class="calendar-weekdays">${weekdayHtml}</div><div class="calendar-grid">${rowsHtml}</div></div></section>`}
function renderWeekView(){const selected=getSelectedDate();const weekStart=addDays(selected,-selected.getDay());const weekEnd=addDays(weekStart,6);const strip=Array.from({length:7},(_,i)=>addDays(weekStart,i)).map(date=>{const ds=fmtDate(date);const has=getTasksForDate(ds).length>0;const isToday=ds===fmtDate(new Date());const dowColor=date.getDay()===0?'#ff3b30':date.getDay()===6?'#0a66ff':'#c1c5d0';return `<div class="week-day" data-date="${ds}"><div class="week-dow" style="color:${dowColor}">${DAY_NAMES[date.getDay()]}</div><div class="week-num ${isToday?'today':''}" style="${isToday?'':`color:${date.getDay()===0?'#ff3b30':date.getDay()===6?'#0a66ff':'#7b8190'}`}">${date.getDate()}</div><div class="week-dot" style="opacity:${has?1:0};background:${isToday?'#ffd43b':'#ff6b6b'}"></div></div>`}).join('');return `<section class="panel"><div class="week-shell"><div class="week-head"><div class="nav-inline"><button type="button" id="prevWeek">‹</button></div><div class="week-title">${weekStart.getMonth()+1}/${weekStart.getDate()} - ${weekEnd.getMonth()+1}/${weekEnd.getDate()}</div><div class="nav-inline"><button type="button" id="nextWeek">›</button></div></div><div class="week-strip">${strip}</div></div></section>`}
function renderSelectedDay(){const date=getSelectedDate(),dateStr=fmtDate(date),tasks=getTasksForDate(dateStr),doneCount=tasks.filter(task=>task.done).length,pct=tasks.length?Math.round((doneCount/tasks.length)*100):0;return `<section class="panel day-card"><div class="day-summary"><div><h3>${date.getMonth()+1}월 ${date.getDate()}일 <span style="font-weight:400;color:#b3b8c4">${DAY_NAMES[date.getDay()]}요일</span> ${dateStr===fmtDate(new Date())?'<span style="display:inline-block;background:#ff453a;color:#fff;font-size:13px;padding:5px 12px;border-radius:999px;vertical-align:middle">오늘</span>':''}</h3><p>${doneCount}/${tasks.length} 완료</p></div><div class="day-actions"><div class="progress-ring">${pct}%</div><button class="add-round" type="button" id="inlineAddBtn">추가</button></div></div><div class="task-list">${tasks.length?tasks.map(task=>`<article class="task-item ${task.done?'done':''}"><button class="check" type="button" data-toggle-task="${task.id}">${task.done?'✓':''}</button><div class="task-main"><h4>${escapeHtml(task.title)}</h4><div class="task-meta"><span class="badge category">${escapeHtml(task.category)}</span><span class="badge range">${task.start===task.end?`${task.time||'종일'}`:`${task.start.slice(5)} - ${task.end.slice(5)}`}</span></div></div><button class="ghost-btn" type="button" data-edit-task="${task.id}">›</button></article>`).join(''):`<div class="empty">오늘 일정이 없어요.</div>`}</div></section>`}
function renderSubscriptions(){const total=state.subscriptions.reduce((sum,item)=>sum+Number(item.amount||0),0);const grouped=SUB_CATEGORIES.map(cat=>({...cat,total:state.subscriptions.filter(item=>item.category===cat.name).reduce((sum,item)=>sum+Number(item.amount||0),0)})).filter(item=>item.total>0);const listHtml=state.subscriptions.slice().sort((a,b)=>a.payDay-b.payDay||a.service.localeCompare(b.service)).map(item=>`<article class="sub-item"><div class="sub-left"><h4>${escapeHtml(item.service)}</h4><p>${escapeHtml(item.category)} · 매달 ${item.payDay}일 결제</p></div><div class="sub-right"><strong>${money(item.amount)}</strong><span><button class="ghost-btn" type="button" data-edit-sub="${item.id}">수정</button></span></div></article>`).join('');return `<section class="panel" id="subscriptionSection"><div class="panel-header"><div><div class="panel-title">구독 관리</div><div class="panel-sub">금액, 서비스명, 결제일, 카테고리와 월 합계를 한 번에 봐요</div></div><button class="ghost-btn" type="button" id="subAddInline">구독 추가</button></div><div class="subscription-overview"><div class="sub-total"><div class="label">월 합계</div><div class="value">${money(total)}</div><div class="meta">총 ${state.subscriptions.length}개의 정기 결제를 추적 중</div></div><div class="category-stack">${(grouped.length?grouped:[{name:'예정 없음',total:0,color:'#d1d5db'}]).slice(0,3).map(cat=>`<div class="category-card"><div class="name">${escapeHtml(cat.name)}</div><div class="amount" style="color:${cat.color}">${money(cat.total)}</div></div>`).join('')}</div></div><div class="subscription-list">${listHtml||`<div class="empty">구독 항목을 추가하면 여기서 관리할 수 있어요.</div>`}</div></section>`}
function renderCategoryPanel(){const today=new Date();const todayStr=fmtDate(today);const scheduledToday=state.routines.filter(r=>isRoutineScheduled(r,today));const doneToday=scheduledToday.filter(r=>r.completedDates.includes(todayStr));const taskMap=TASK_CATEGORIES.map(cat=>({name:cat.name,color:cat.color,count:state.tasks.filter(task=>task.category===cat.name).length})).filter(item=>item.count>0);const subMap=SUB_CATEGORIES.map(cat=>({name:cat.name,color:cat.color,total:state.subscriptions.filter(sub=>sub.category===cat.name).reduce((sum,sub)=>sum+Number(sub.amount||0),0)})).filter(item=>item.total>0);const routineCards=(state.routines||[]).map(r=>{const weekDates=getWeekDates(today);const weekHtml=weekDates.map(d=>{const ds=fmtDate(d);const active=isRoutineScheduled(r,d);const done=r.completedDates.includes(ds);return `<div class="habit-dot ${active?'on':''} ${done?'done':''}">${DAY_NAMES[d.getDay()]}</div>`}).join('');return `<article class="habit-card"><div class="habit-top"><div><h4>${escapeHtml(r.title)}</h4><p>${r.pattern==='daily'?'매일':r.pattern==='weekday'?'평일':r.pattern==='weekend'?'주말':'커스텀'} · 주 ${r.goal}회 목표</p></div><div class="habit-actions"><button class="tiny-btn" type="button" data-toggle-routine="${r.id}">${r.completedDates.includes(todayStr)?'오늘 완료':'오늘 체크'}</button></div></div><div class="habit-progress">${weekHtml}</div><div class="habit-foot"><span>이번 주 ${getRoutineWeekCount(r,today)}회</span><span>${getRoutineStreak(r)}일 연속</span></div></article>`}).join('');return `<section class="panel" id="categorySection"><div class="panel-header"><div><div class="panel-title">한눈에 보기</div><div class="panel-sub">오늘의 루틴과 카테고리 흐름을 빠르게 파악해요</div></div><button class="ghost-btn" type="button" id="routineAddInline">루틴 추가</button></div><div class="overview-grid"><div class="overview-card"><div class="name">오늘 일정</div><div class="value" style="color:var(--blue)">${getTasksForDate(todayStr).length}개</div><div class="sub">선택한 하루의 밀도를 바로 확인</div></div><div class="overview-card"><div class="name">오늘 루틴</div><div class="value" style="color:var(--green)">${doneToday.length}/${scheduledToday.length||0}</div><div class="sub">오늘 체크한 루틴 진행률</div></div><div class="overview-card"><div class="name">이번 달 구독</div><div class="value" style="color:var(--orange)">${money(state.subscriptions.reduce((sum,item)=>sum+Number(item.amount||0),0))}</div><div class="sub">정기 결제 부담을 한 번에</div></div><div class="overview-card"><div class="name">활성 루틴</div><div class="value" style="color:var(--purple)">${(state.routines||[]).length}개</div><div class="sub">꾸준히 챙기는 습관 수</div></div></div><section class="panel" style="margin-top:16px;padding:14px"><div class="panel-title" style="font-size:18px">루틴 트래커</div><div class="panel-sub" style="margin-top:4px">주간 점검과 오늘 체크를 같이 볼 수 있어요</div><div class="habit-list" style="margin-top:14px">${routineCards||`<div class="empty">루틴을 추가해 습관을 추적해보세요.</div>`}</div></section><div class="category-grid" style="margin-top:16px"><div class="panel" style="padding:14px"><div class="panel-title" style="font-size:17px">일정 분포</div><div class="mini-list" style="margin-top:12px">${(taskMap.length?taskMap:[{name:'없음',color:'#d1d5db',count:0}]).map(item=>`<div class="mini-row"><strong style="color:${item.color}">${escapeHtml(item.name)}</strong><span>${item.count}개</span></div>`).join('')}</div></div><div class="panel" style="padding:14px"><div class="panel-title" style="font-size:17px">구독 분류</div><div class="mini-list" style="margin-top:12px">${(subMap.length?subMap:[{name:'없음',color:'#d1d5db',total:0}]).map(item=>`<div class="mini-row"><strong style="color:${item.color}">${escapeHtml(item.name)}</strong><span>${money(item.total)}</span></div>`).join('')}</div></div></div></section>`}
function renderStatsPanel(){const now=new Date(),todayStr=fmtDate(now),weekStart=addDays(now,-now.getDay()),weekEnd=addDays(weekStart,6),monthKey=fmtDate(now).slice(0,7),totalTasks=state.tasks.length,doneTasks=state.tasks.filter(task=>task.done).length,weekTasks=state.tasks.filter(task=>task.start<=fmtDate(weekEnd)&&task.end>=fmtDate(weekStart)),weekDone=weekTasks.filter(task=>task.done).length,monthTasks=state.tasks.filter(task=>task.start.slice(0,7)<=monthKey&&task.end.slice(0,7)>=monthKey),monthDone=monthTasks.filter(task=>task.done).length,weekRate=weekTasks.length?Math.round(weekDone/weekTasks.length*100):0,monthRate=monthTasks.length?Math.round(monthDone/monthTasks.length*100):0,subTotal=state.subscriptions.reduce((sum,item)=>sum+Number(item.amount||0),0),monthLabel=`${now.getFullYear()}년 ${now.getMonth()+1}월`;return `<section class="panel" id="statsSection"><div class="panel-header"><div><div class="panel-title">통계</div><div class="panel-sub">주간과 한달 달성률을 같이 확인해요</div></div></div><div class="overview-grid"><div class="overview-card"><div class="name">주간 달성률</div><div class="value" style="color:var(--blue)">${weekRate}%</div><div class="sub">${weekDone}/${weekTasks.length} 완료</div></div><div class="overview-card"><div class="name">한달 달성률</div><div class="value" style="color:var(--green)">${monthRate}%</div><div class="sub">${monthDone}/${monthTasks.length} 완료</div></div><div class="overview-card"><div class="name">이번 주 일정</div><div class="value" style="color:var(--purple)">${weekTasks.length}개</div><div class="sub">${weekStart.getMonth()+1}/${weekStart.getDate()} - ${weekEnd.getMonth()+1}/${weekEnd.getDate()}</div></div><div class="overview-card"><div class="name">이번 달 구독</div><div class="value" style="color:var(--orange)">${money(subTotal)}</div><div class="sub">${monthLabel} 기준</div></div></div><section class="panel" style="margin-top:16px;padding:14px"><div class="panel-title" style="font-size:18px">전체 진행</div><div class="mini-list" style="margin-top:12px"><div class="mini-row"><strong>전체 일정</strong><span>${totalTasks}개</span></div><div class="mini-row"><strong>전체 완료</strong><span>${doneTasks}개</span></div><div class="mini-row"><strong>오늘 할 일</strong><span>${getTasksForDate(todayStr).length}개</span></div><div class="mini-row"><strong>한달 할 일</strong><span>${monthTasks.length}개</span></div></div></section></section>`}
function render(){const scheduleClass=state.currentView==='month'?'page month-mode':'page';const scheduleBody=state.currentView==='month'?`${renderMonthView()}`:`${renderWeekView()}${renderSelectedDay()}`;document.getElementById('content').innerHTML=`<section class="${scheduleClass}" data-page="schedule"><div class="page-stack">${scheduleBody}</div></section><section class="page" data-page="subscription"><div class="page-stack">${renderSubscriptions()}</div></section><section class="page" data-page="category"><div class="page-stack">${renderCategoryPanel()}</div></section><section class="page" data-page="stats"><div class="page-stack">${renderStatsPanel()}</div></section>`;bindRenderedEvents();updateSummary();syncPager()}
function updateSummary(){const today=new Date(),todayStr=fmtDate(today),monthKey=state.selectedDate.slice(0,7),todayTasks=getTasksForDate(todayStr),monthTasks=state.tasks.filter(task=>task.start.slice(0,7)<=monthKey&&task.end.slice(0,7)>=monthKey),subTotal=state.subscriptions.reduce((sum,item)=>sum+Number(item.amount||0),0);document.getElementById('todayCount').textContent=`${todayTasks.length}개`;document.getElementById('monthCount').textContent=`${monthTasks.length}개`;document.getElementById('subTotalMini').textContent=money(subTotal);document.getElementById('todayLabel').textContent=`${today.getMonth()+1}월 ${today.getDate()}일 ${DAY_NAMES[today.getDay()]}요일`;document.getElementById('heroHeadline').textContent=`이번 달 일정 ${monthTasks.length}개를 정리 중이에요`}
function scrollToTab(tab){const content=document.getElementById('content');const pages=['schedule','subscription','category','stats'];const idx=pages.indexOf(tab);if(!content||idx<0)return;content.scrollTo({left:content.clientWidth*idx,behavior:'smooth'});state.activeTab=tab;updateDockActive();saveState()}
function updateDockActive(){const map={focusScheduleTab:'schedule',focusSubTab:'subscription',focusCategoryTab:'category',focusStatsTab:'stats'};Object.entries(map).forEach(([id,tab])=>document.getElementById(id)?.classList.toggle('active',state.activeTab===tab))}
function syncPager(){const content=document.getElementById('content');if(!content)return;const pages=['schedule','subscription','category','stats'];const idx=Math.max(0,pages.indexOf(state.activeTab||'schedule'));requestAnimationFrame(()=>{content.scrollLeft=content.clientWidth*idx});content.onscroll=()=>{const nextIdx=Math.round(content.scrollLeft/Math.max(content.clientWidth,1));const nextTab=pages[nextIdx]||'schedule';if(nextTab!==state.activeTab){state.activeTab=nextTab;updateDockActive();saveState()}};updateDockActive()}
function bindRenderedEvents(){document.querySelectorAll('.month-cell').forEach(cell=>cell.addEventListener('click',()=>{state.selectedDate=cell.dataset.date;state.activeTab='schedule';saveState();render()}));document.querySelectorAll('[data-toggle-task]').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();const id=Number(btn.dataset.toggleTask);state.tasks=state.tasks.map(task=>task.id===id?{...task,done:!task.done}:task);saveState();render()}));document.querySelectorAll('[data-open-task]').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();openTaskDetail(Number(btn.dataset.openTask))}));document.querySelectorAll('[data-edit-task]').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();openTaskModal(Number(btn.dataset.editTask))}));document.querySelectorAll('[data-edit-sub]').forEach(btn=>btn.addEventListener('click',()=>openSubModal(Number(btn.dataset.editSub))));const prev=document.getElementById('prevMonth');if(prev)prev.addEventListener('click',()=>{const base=new Date(state.currentMonth);state.currentMonth=startOfMonth(new Date(base.getFullYear(),base.getMonth()-1,1)).toISOString();saveState();render()});const next=document.getElementById('nextMonth');if(next)next.addEventListener('click',()=>{const base=new Date(state.currentMonth);state.currentMonth=startOfMonth(new Date(base.getFullYear(),base.getMonth()+1,1)).toISOString();saveState();render()});const prevWeek=document.getElementById('prevWeek');if(prevWeek)prevWeek.addEventListener('click',()=>{const d=getSelectedDate();state.selectedDate=fmtDate(addDays(d,-7));saveState();render()});const nextWeek=document.getElementById('nextWeek');if(nextWeek)nextWeek.addEventListener('click',()=>{const d=getSelectedDate();state.selectedDate=fmtDate(addDays(d,7));saveState();render()});document.querySelectorAll('.segment button').forEach(button=>{button.classList.toggle('active',button.dataset.view===state.currentView);button.onclick=()=>{state.currentView=button.dataset.view;saveState();render()}});document.querySelectorAll('.task-item[data-date]').forEach(card=>card.addEventListener('click',()=>{state.selectedDate=card.dataset.date;state.currentView='week';state.activeTab='schedule';saveState();render()}));document.querySelectorAll('.week-day[data-date]').forEach(day=>day.addEventListener('click',()=>{state.selectedDate=day.dataset.date;saveState();render()}));document.getElementById('subAddInline')?.addEventListener('click',()=>openSubModal());document.getElementById('routineAddInline')?.addEventListener('click',()=>openRoutineModal());document.getElementById('inlineAddBtn')?.addEventListener('click',()=>openTaskModal());document.querySelectorAll('[data-toggle-routine]').forEach(btn=>btn.addEventListener('click',()=>toggleRoutineToday(Number(btn.dataset.toggleRoutine))));document.getElementById('focusScheduleTab')?.addEventListener('click',()=>scrollToTab('schedule'));document.getElementById('focusSubTab')?.addEventListener('click',()=>scrollToTab('subscription'));document.getElementById('focusCategoryTab')?.addEventListener('click',()=>scrollToTab('category'));document.getElementById('focusStatsTab')?.addEventListener('click',()=>scrollToTab('stats'))}
function fillSelect(selectId,items){document.getElementById(selectId).innerHTML=items.map(item=>`<option value="${item.name}">${item.name}</option>`).join('')}function openModal(id){document.getElementById(id).classList.add('show')}function closeModal(id){document.getElementById(id).classList.remove('show')}
function openTaskModal(taskId=null){state.editingTaskId=taskId;const task=state.tasks.find(item=>item.id===taskId);document.getElementById('taskModalTitle').textContent=task?'일정 수정':'일정 추가';document.getElementById('taskTitle').value=task?.title||'';document.getElementById('taskStart').value=task?.start||state.selectedDate;document.getElementById('taskEnd').value=task?.end||task?.start||state.selectedDate;document.getElementById('taskTime').value=task?.time||'';document.getElementById('taskCategory').value=task?.category||TASK_CATEGORIES[0].name;document.getElementById('taskNote').value=task?.note||'';openModal('taskModal')}
function openSubModal(subId=null){state.editingSubId=subId;const sub=state.subscriptions.find(item=>item.id===subId);document.getElementById('subModalTitle').textContent=sub?'구독 수정':'구독 추가';document.getElementById('subService').value=sub?.service||'';document.getElementById('subAmount').value=sub?.amount||'';document.getElementById('subDate').value=sub?.payDay||'';document.getElementById('subCategory').value=sub?.category||SUB_CATEGORIES[0].name;openModal('subModal')}function openTaskDetail(taskId){const task=state.tasks.find(item=>item.id===taskId);if(!task)return;document.getElementById('detailTitle').textContent=task.title||'';document.getElementById('detailDate').textContent=task.start===task.end?task.start:`${task.start} ~ ${task.end}`;document.getElementById('detailTime').textContent=task.time||'종일';document.getElementById('detailCategory').textContent=task.category||'';document.getElementById('detailNote').textContent=task.note||'메모 없음';document.getElementById('detailEditBtn').onclick=()=>{closeModal('taskDetailModal');openTaskModal(taskId)};openModal('taskDetailModal')}function openRoutineModal(routineId=null){state.editingRoutineId=routineId;const routine=(state.routines||[]).find(item=>item.id===routineId);document.getElementById('routineModalTitle').textContent=routine?'루틴 수정':'루틴 추가';document.getElementById('routineTitle').value=routine?.title||'';document.getElementById('routinePattern').value=routine?.pattern||'daily';document.getElementById('routineGoal').value=routine?.goal||5;Array.from(document.getElementById('routineDays').options).forEach(opt=>opt.selected=(routine?.days||[]).map(String).includes(opt.value));openModal('routineModal')}
function saveTask(){const title=document.getElementById('taskTitle').value.trim(),start=document.getElementById('taskStart').value,end=document.getElementById('taskEnd').value||start;if(!title||!start)return;const existing=state.tasks.find(item=>item.id===state.editingTaskId);const task={id:state.editingTaskId||Date.now(),title,start,end:end<start?start:end,time:document.getElementById('taskTime').value,category:document.getElementById('taskCategory').value,note:document.getElementById('taskNote').value.trim(),done:existing?.done||false};if(state.editingTaskId)state.tasks=state.tasks.map(item=>item.id===state.editingTaskId?task:item);else state.tasks.push(task);state.selectedDate=task.start;state.currentMonth=startOfMonth(parseDate(task.start)).toISOString();saveState();closeModal('taskModal');render()}
function saveSub(){const service=document.getElementById('subService').value.trim(),amount=Number(document.getElementById('subAmount').value),payDay=Number(document.getElementById('subDate').value);if(!service||!amount||!payDay)return;const sub={id:state.editingSubId||Date.now(),service,amount,payDay,category:document.getElementById('subCategory').value};if(state.editingSubId)state.subscriptions=state.subscriptions.map(item=>item.id===state.editingSubId?sub:item);else state.subscriptions.push(sub);saveState();closeModal('subModal');render()}function saveRoutine(){const title=document.getElementById('routineTitle').value.trim();if(!title)return;const pattern=document.getElementById('routinePattern').value;const goal=Number(document.getElementById('routineGoal').value)||1;const days=Array.from(document.getElementById('routineDays').selectedOptions).map(opt=>Number(opt.value));const existing=(state.routines||[]).find(item=>item.id===state.editingRoutineId);const routine={id:state.editingRoutineId||Date.now(),title,pattern,goal,days,completedDates:existing?.completedDates||[]};if(state.editingRoutineId)state.routines=state.routines.map(item=>item.id===state.editingRoutineId?routine:item);else state.routines=[...(state.routines||[]),routine];saveState();closeModal('routineModal');render()}

document.querySelectorAll('[data-close]').forEach(btn=>btn.addEventListener('click',()=>closeModal(btn.dataset.close)));document.getElementById('openTaskBtn').addEventListener('click',()=>openTaskModal());document.getElementById('openSubBtn').addEventListener('click',()=>openSubModal());document.getElementById('openStatsBtn').addEventListener('click',()=>scrollToTab('stats'));document.getElementById('jumpToday').addEventListener('click',()=>{const today=new Date();state.selectedDate=fmtDate(today);state.currentMonth=startOfMonth(today).toISOString();state.activeTab='schedule';saveState();render()});document.getElementById('saveTaskBtn').addEventListener('click',saveTask);document.getElementById('saveSubBtn').addEventListener('click',saveSub);document.getElementById('saveRoutineBtn').addEventListener('click',saveRoutine);fillSelect('taskCategory',TASK_CATEGORIES);fillSelect('subCategory',SUB_CATEGORIES);render();
</script>
