<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset='utf-8' />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sleek Planner</title>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root {
            --ios-blue: #007AFF;
            --bg-glass: rgba(255, 255, 255, 0.7);
            --border-light: rgba(0, 0, 0, 0.05);
        }
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex; justify-content: center; min-height: 100vh;
        }
        #calendar-container {
            width: 94%; max-width: 420px;
            margin: 20px auto;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 15px;
        }
        .mac-buttons { display: flex; gap: 7px; margin-bottom: 15px; padding-left: 5px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #FF5F57; } .yellow { background: #FFBD2E; } .green { background: #28C840; }

        /* 캘린더 커스텀 */
        .fc { border: none !important; }
        .fc-toolbar-title { font-size: 1.2rem !important; font-weight: 800; color: #1d1d1f; }
        .fc-button { 
            background: rgba(0,0,0,0.05) !important; border: none !important; 
            color: #1d1d1f !important; border-radius: 12px !important;
            font-weight: 600 !important; font-size: 13px !important;
        }
        .fc-button-active { background: #000 !important; color: #fff !important; }
        
        /* 날짜칸 및 이벤트 디자인 */
        .fc-daygrid-day { border: none !important; }
        .fc-day-other { opacity: 0; pointer-events: none; } /* 다음달 숨기기 */
        .fc-daygrid-day-number { font-size: 13px; font-weight: 500; color: #86868b; }
        .fc-day-today { background: rgba(0, 122, 255, 0.05) !important; border-radius: 15px; }
        
        .event-box {
            font-size: 10px; font-weight: 700; padding: 5px;
            border-radius: 10px; color: #fff; text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: transform 0.2s;
        }
        .event-box:active { transform: scale(0.95); }
        .is-completed { 
            background: #d1d1d6 !important; text-decoration: line-through; 
            opacity: 0.5; box-shadow: none; 
        }

        /* 세련된 모달 디자인 */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2); backdrop-filter: blur(8px); z-index: 9999;
            align-items: flex-end; justify-content: center;
        }
        .modal-content {
            background: #fff; width: 100%; max-width: 420px;
            border-top-left-radius: 30px; border-top-right-radius: 30px;
            padding: 30px 20px; animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .modal-body h3 { margin-bottom: 20px; font-weight: 800; font-size: 22px; }
        .modal-body input {
            width: 100%; border: none; background: #f2f2f7; border-radius: 12px;
            padding: 15px; margin-bottom: 15px; font-size: 16px; outline: none;
        }
        .btn-main {
            width: 100%; padding: 16px; border: none; border-radius: 15px;
            font-size: 17px; font-weight: 700; cursor: pointer; margin-bottom: 10px;
        }
        .save { background: #000; color: #fff; }
        .complete { background: var(--ios-blue); color: #fff; }
        .delete { background: #fff; color: #ff3b30; }
        .cancel { background: #f2f2f7; color: #8e8e93; }
    </style>
</head>
<body>

    <div id="calendar-container">
        <div class="mac-buttons">
            <div class="dot red"></div> <div class="dot yellow"></div> <div class="dot green"></div>
        </div>
        <div id='calendar'></div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <div class="modal-body">
                <h3 id="modal-title-text">일정 편집</h3>
                <input type="text" id="m-title" placeholder="무엇을 하시나요?">
                <input type="text" id="m-loc" placeholder="어디서 하시나요?">
                <input type="datetime-local" id="m-start">
                
                <button class="btn-main save" onclick="saveEvent()">일정 저장</button>
                <button class="btn-main complete" onclick="toggleComplete()">완료 체크/해제</button>
                <button class="btn-main delete" id="btn-delete" onclick="deleteEvent()">일정 삭제</button>
                <button class="btn-main cancel" onclick="closeModal()">취소</button>
            </div>
        </div>
    </div>

    <script>
        let calendar;
        let selectedEvent = null;
        const storageKey = 'sleek_planner_v1';
        let events = JSON.parse(localStorage.getItem(storageKey)) || [
            { id: '1', title: '비전 게임 OT', start: '2026-04-01T13:00', loc: '진흥원 3층 1교육실', color: '#5856D6', completed: false },
            { id: '2', title: '포스코 탐방', start: '2026-04-02T12:30', loc: '포스코 홍보관', color: '#34C759', completed: false }
        ];

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: { left: 'today', center: 'title', right: 'dayGridMonth,timeGridWeek' },
                locale: 'ko',
                fixedWeekCount: false,
                showNonCurrentDates: false,
                height: 'auto',
                events: events.map(ev => ({
                    id: ev.id, title: ev.title, start: ev.start,
                    extendedProps: { loc: ev.loc, completed: ev.completed },
                    backgroundColor: ev.completed ? '#d1d1d6' : (ev.color || '#007AFF'),
                    borderColor: 'transparent'
                })),
                dateClick: (info) => openModal(null, info.dateStr),
                eventClick: (info) => openModal(info.event),
                eventContent: (arg) => {
                    const doneClass = arg.event.extendedProps.completed ? 'is-completed' : '';
                    return { html: `<div class="event-box ${doneClass}">${arg.event.title}</div>` };
                }
            });
            calendar.render();
        });

        function openModal(event, dateStr) {
            selectedEvent = event;
            if (event) {
                document.getElementById('m-title').value = event.title;
                document.getElementById('m-loc').value = event.extendedProps.loc;
                document.getElementById('m-start').value = event.startStr.substring(0,16);
                document.getElementById('btn-delete').style.display = "block";
            } else {
                document.getElementById('m-title').value = "";
                document.getElementById('m-loc').value = "";
                document.getElementById('m-start').value = dateStr + "T13:00";
                document.getElementById('btn-delete').style.display = "none";
            }
            document.getElementById('modal').style.display = 'flex';
        }

        function saveEvent() {
            const title = document.getElementById('m-title').value;
            const loc = document.getElementById('m-loc').value;
            const start = document.getElementById('m-start').value;
            if (!title) return alert("내용을 입력하세요!");

            if (selectedEvent) {
                const idx = events.findIndex(e => e.id === selectedEvent.id);
                events[idx] = { ...events[idx], title, loc, start };
            } else {
                events.push({ id: Date.now().toString(), title, loc, start, completed: false });
            }
            sync();
        }

        function deleteEvent() {
            events = events.filter(e => e.id !== selectedEvent.id);
            sync();
        }

        function toggleComplete() {
            const idx = events.findIndex(e => e.id === selectedEvent.id);
            events[idx].completed = !events[idx].completed;
            sync();
        }

        function sync() {
            localStorage.setItem(storageKey, JSON.stringify(events));
            location.reload();
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
