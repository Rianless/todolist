<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset='utf-8' />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS Live Planner Full Data</title>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root {
            --ios-blue: #0A84FF;
            --glass-white: rgba(255, 255, 255, 0.1);
        }
        body {
            margin: 0; padding: 0;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            color: #fff;
        }
        #app-wrapper {
            width: 100%; max-width: 430px;
            min-height: 100vh;
            background: linear-gradient(180deg, #2C2C54 0%, #000000 100%);
            padding: 20px 15px;
            box-sizing: border-box;
        }
        #calendar-container {
            background: var(--glass-white);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 28px;
            padding: 20px 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .fc { border: none !important; }
        .fc td, .fc th { border: none !important; }
        .fc-toolbar-title { font-size: 1.2rem !important; font-weight: 700; }
        .fc-button { background: transparent !important; border: none !important; color: rgba(255,255,255,0.5) !important; font-size: 14px !important; }
        .fc-button-active { color: var(--ios-blue) !important; font-weight: 700 !important; }
        .fc-col-header-cell-cushion { font-size: 11px; color: rgba(255,255,255,0.4); text-decoration: none !important; }
        .fc-daygrid-day-number { font-size: 15px; font-weight: 400; color: #fff; text-decoration: none !important; padding: 8px !important; }

        /* 오늘 날짜 자동 강조 */
        .fc-day-today { background: transparent !important; }
        .fc-day-today .fc-daygrid-day-number { 
            background-color: var(--ios-blue) !important; 
            border-radius: 50%; display: inline-block; 
            width: 28px; height: 28px; line-height: 28px; 
            text-align: center; padding: 0 !important; margin: 4px;
        }

        .fc-daygrid-event-harness { display: none; }
        .event-dot { width: 4px; height: 4px; background: rgba(255,255,255,0.5); border-radius: 50%; margin: 2px auto; }

        #list-title { margin: 25px 5px 15px; font-size: 18px; font-weight: 700; }
        .event-card {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 20px; padding: 18px; margin-bottom: 12px;
            display: flex; align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .check-circle { 
            width: 24px; height: 24px; border-radius: 50%; 
            border: 1.5px solid rgba(255,255,255,0.2); margin-right: 15px;
            display: flex; align-items: center; justify-content: center;
        }
        .check-circle.done { background: var(--ios-blue); border-color: var(--ios-blue); }
        .event-info { flex: 1; }
        .event-info h4 { margin: 0 0 4px 0; font-size: 14px; font-weight: 600; }
        .event-info p { margin: 0; font-size: 11px; color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>

<div id="app-wrapper">
    <div id="calendar-container">
        <div id='calendar'></div>
    </div>
    <div id="list-title">오늘의 일정</div>
    <div id="event-list"></div>
</div>

<script>
    let calendar;
    const storageKey = 'ios_v5_full_data';
    
    // 이미지 1 표의 모든 데이터 완벽 반영
    const fullData = [
        { id: '1', title: '비전 게임 시작!(OT)', start: '2026-04-01T13:00', loc: '3층 1교육실', completed: false },
        { id: '2', title: '비즈니스 매너 및 에티켓', start: '2026-04-01T15:00', loc: '3층 1교육실', completed: false },
        { id: '3', title: '기업탐방(포스코광양제철소)', start: '2026-04-02T12:30', loc: '포스코홍보관', completed: false },
        { id: '4', title: '스테인드글라스 트레이 만들기', start: '2026-04-06T13:00', loc: '3층 1교육실', completed: false },
        { id: '5', title: '집단심리상담(미술치료)', start: '2026-04-08T14:00', loc: '3층 1교육실', completed: false },
        { id: '6', title: '이미지메이킹(퍼스널 컬러)', start: '2026-04-13T13:00', loc: 'CL미용학원', completed: false },
        { id: '7', title: '경험과 강점으로 여는 나의 이야기', start: '2026-04-15T13:00', loc: '시민공익활동지원센터', completed: false },
        { id: '8', title: '나 사용 설명서(자기분석)', start: '2026-04-20T13:00', loc: '3층 1교육실', completed: false },
        { id: '9', title: '직업선호도 검사 및 로드맵', start: '2026-04-22T14:00', loc: '시민공익활동지원센터', completed: false },
        { id: '10', title: '순천 청년 퍼실리테이션', start: '2026-04-27T14:00', loc: '시민공익활동지원센터', completed: false },
        { id: '11', title: '중독예방교육', start: '2026-04-29T13:00', loc: '2층 교육실', completed: false },
        { id: '12', title: '나의 작은정원(원예)', start: '2026-04-29T15:00', loc: '2층 교육실', completed: false }
    ];

    let events = JSON.parse(localStorage.getItem(storageKey)) || fullData;

    document.addEventListener('DOMContentLoaded', function() {
        calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
            initialView: 'dayGridMonth',
            locale: 'ko',
            headerToolbar: { left: 'title', center: '', right: 'prev,next dayGridMonth,dayGridWeek' },
            fixedWeekCount: false,
            events: events,
            dateClick: (info) => renderList(info.dateStr),
            dayCellContent: (arg) => {
                const dateStr = arg.date.toISOString().split('T')[0];
                const hasEvent = events.some(e => e.start.startsWith(dateStr));
                return { html: `<div>${arg.dayNumberText.replace('일','')}</div>${hasEvent ? '<div class="event-dot"></div>' : ''}` };
            }
        });
        calendar.render();
        renderList(new Date().toISOString().split('T')[0]);
    });

    function renderList(dateStr) {
        const listEl = document.getElementById('event-list');
        const dayEvents = events.filter(e => e.start.startsWith(dateStr));
        document.getElementById('list-title').innerText = dateStr === new Date().toISOString().split('T')[0] ? "오늘의 일정" : `${dateStr.split('-')[2]}일의 일정`;

        listEl.innerHTML = dayEvents.length ? dayEvents.map(ev => `
            <div class="event-card" onclick="toggleDone('${ev.id}', '${dateStr}')">
                <div class="check-circle ${ev.completed ? 'done' : ''}">${ev.completed ? '✓' : ''}</div>
                <div class="event-info">
                    <h4 style="${ev.completed ? 'text-decoration:line-through; opacity:0.5;' : ''}">${ev.start.split('T')[1]} ${ev.title}</h4>
                    <p>${ev.loc}</p>
                </div>
            </div>
        `).join('') : '<div style="text-align:center; padding:30px; color:rgba(255,255,255,0.2);">일정이 없습니다.</div>';
    }

    function toggleDone(id, dateStr) {
        const idx = events.findIndex(e => e.id === id);
        events[idx].completed = !events[idx].completed;
        localStorage.setItem(storageKey, JSON.stringify(events));
        renderList(dateStr);
    }
</script>
</body>
</html>
