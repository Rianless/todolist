function loadEvents(){
  weekRef=weekStart(new Date("2026-04-01"));
  monthRef=new Date(2026,3,1);
  idbGet("ui_prefs_v1").then(p=>{ if(p){ try{ const prefs=JSON.parse(p); if(typeof prefs.showTitle==="boolean") showTitle=prefs.showTitle; }catch(e){} } }).catch(()=>{});
  idbGet("cat_groups_v1").then(saved=>{
    if(saved){ try{ const parsed=JSON.parse(saved); CAT_GROUPS.length=0; parsed.forEach(g=>CAT_GROUPS.push(g)); rebuildCAT(); }catch(e){} }
  }).catch(()=>{});
  idbGet("events_v1").then(saved=>{
    if(saved){ try{ events=JSON.parse(saved); nextId=Math.max(...events.map(e=>e.id),99)+1; }catch(e){ events=DEFAULT_EVENTS.map(e=>({...e})); } }
    else { events=DEFAULT_EVENTS.map(e=>({...e})); }
    renderView();
  }).catch(()=>{ events=DEFAULT_EVENTS.map(e=>({...e})); renderView(); });
}

function toggleDone(id){
  events=events.map(e=>e.id===id?Object.assign({},e,{done:!e.done}):e);
  saveEvents(); renderView();
  if(selectedId===id) refreshDetail();
  if(dayPanelDate) refreshDayPanel();
  // 메모 탭이 열려있으면 같이 갱신
  if(document.getElementById('memo-overlay').classList.contains('show')) renderMemoView();
}
function deleteDone(id){ events=events.filter(e=>e.id!==id); saveEvents(); renderView(); }

/* DETAIL */
function openDetail(id){ selectedId=id; refreshDetail(); document.getElementById("detail-overlay").classList.add("show"); }
function closeDetail(){ document.getElementById("detail-overlay").classList.remove("show"); }
function toggleFromDetail(){ if(selectedId) toggleDone(selectedId); }
function openEditFromDetail(){
  const ev = events.find(e => e.id === selectedId);
  if (ev && ev['__sub__']) {
    closeDetail();
    setTimeout(() => openSubView(), 80);
    return;
  }
  closeDetail(); setTimeout(()=>openEdit(selectedId),80);
}
function deleteFromDetail(){
  if(!selectedId) return;
  const ev = events.find(e => e.id === selectedId);
  if (ev && ev['__sub__']) {
    alert('구독 결제일은 구독 탭에서 삭제할 수 있어요.');
    return;
  }
  events=events.filter(e=>e.id!==selectedId); saveEvents(); closeDetail(); renderView();
}

function refreshDetail(){
  const ev=events.find(e=>e.id===selectedId); if(!ev) return;
  const isSub = !!ev['__sub__'];
  const accentColor = isSub ? (ev._color || '#FF2D55') : null;
  const ct = isSub ? { bg: accentColor, light: accentColor + '22', text: accentColor } : cat(ev.category);
  document.getElementById("detail-bar").style.background=ct.bg;
  const ce=document.getElementById("detail-cat");
  ce.textContent = isSub ? ('💳 구독') : ev.category;
  ce.style.background=ct.light; ce.style.color=ct.text;
  document.getElementById("detail-title").textContent=ev.title;
  const prio=ev.priority||'none';
  const rows=[
    ["📅","날짜", isMultiDay(ev) ? `${ev.date} – ${ev.endDate}` : ev.date, true],
    ["🕐","시간", ev.allDay?"하루종일":(ev.startTime||ev.endTime)?(ev.startTime||"")+(ev.endTime?" – "+ev.endTime:""):"", !!(ev.allDay||ev.startTime||ev.endTime)],
    ["🏷️","우선순위", prio!=='none'?`<span style="color:${PRIO_COLORS[prio]};font-weight:800">${PRIO_LABELS[prio]}</span>`:"", prio!=='none'],
    ["📚","모듈", ev.module||"", false],
    ["👤","강사", ev.instructor||"", false],
    ["📍","장소", ev.location||"", false],
    ["🚪","강의실", ev.room||"", false],
    ["📝","비고", ev.note||"", false],
    ["📋","내용", ev.content||"", false],
  ];
  let detailHtml=rows.filter(([,,val,always])=>always||val).map(([ic,lb,vl])=>
    `<div class="info-row"><span class="info-icon">${ic}</span><span class="info-lbl">${lb}</span><span class="info-val" style="white-space:pre-wrap">${typeof vl==='string'?esc(vl):vl}</span></div>`
  ).join("");
  if(ev.images&&ev.images.length){
    detailHtml+=`<div class="attach-section"><div class="attach-thumbs">${ev.images.map(src=>`<div class="attach-thumb-wrap"><img class="attach-thumb" src="${src}" onclick="window.open(this.src)"></div>`).join('')}</div></div>`;
  }
  if(ev.links&&ev.links.length){
    detailHtml+=`<div class="attach-section">${ev.links.map(url=>`<div class="link-item"><span class="link-item-url">${esc(url)}</span><button onclick="window.open('${esc(url)}')" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;font-weight:800;flex-shrink:0">열기</button></div>`).join('')}</div>`;
  }
  document.getElementById("detail-rows").innerHTML=detailHtml;
  const db=document.getElementById("detail-done-btn");
  db.textContent=ev.done?"미완료":"✓ 완료";
  db.style.background=ev.done?"rgba(142,142,147,0.12)":"rgba(52,199,89,0.12)";
  db.style.color=ev.done?"var(--ios-label3)":"var(--ios-green)";

  // 구독 이벤트는 수정 버튼 → '구독 관리'로, 삭제 버튼 숨김
  const editBtn = document.querySelector('#detail-sheet .act-btn[onclick="openEditFromDetail()"]');
  const copyBtn = document.querySelector('#detail-sheet .act-btn[onclick="copyFromDetail()"]');
  const delBtn  = document.querySelector('#detail-sheet .act-btn[onclick="deleteFromDetail()"]');
  if (editBtn) { editBtn.textContent = isSub ? '구독 관리' : '수정'; }
  if (copyBtn) { copyBtn.style.display = isSub ? 'none' : ''; }
  if (delBtn)  { delBtn.style.display  = isSub ? 'none' : ''; }
}

/* DAY PANEL */
function openDayPanel(ds){
  dayPanelDate=ds;
  refreshDayPanel();
  const d=new Date(ds+"T00:00:00");
  document.getElementById("day-panel-title").textContent=`${d.getMonth()+1}월 ${d.getDate()}일 ${DAY_KR[d.getDay()]}요일`;
  document.getElementById("day-overlay").classList.add("show");
}
function closeDayPanel(){ document.getElementById("day-overlay").classList.remove("show"); dayPanelDate=null; }
function dayPanelAdd(){ const ds=dayPanelDate; closeDayPanel(); setTimeout(()=>openAdd(ds),80); }
function refreshDayPanel(){
  if(!dayPanelDate) return;
  const evs=getEvs(dayPanelDate);
  const container=document.getElementById("day-panel-cards");
  if(!evs.length){
    container.innerHTML=`<div class="empty-state" style="padding:40px 0 20px"><div class="empty-icon">🗓️</div><div class="empty-text">일정이 없어요</div></div>`;
    return;
  }
  container.innerHTML=todoGroupHtml(evs);
}

/* SWIPE */
function setupSwipe(overlayId,sheetId,closeFn){
  const sheet=document.getElementById(sheetId);
  let startY=0,currentY=0,dragging=false;
  sheet.addEventListener("touchstart",e=>{ const isHandle=!!e.target.closest(".handle"); if(!isHandle&&sheet.scrollTop>0) return; startY=e.touches[0].clientY; currentY=0; dragging=true; sheet.style.transition="none"; },{passive:true});
  sheet.addEventListener("touchmove",e=>{ if(!dragging) return; const dy=e.touches[0].clientY-startY; if(dy<0){dragging=false;sheet.style.transform="";return;} currentY=dy; sheet.style.transform=`translateY(${dy}px)`; },{passive:true});
  sheet.addEventListener("touchend",()=>{ if(!dragging) return; dragging=false; sheet.style.transition=""; if(currentY>80){sheet.style.transform=`translateY(100%)`; setTimeout(()=>{sheet.style.transform="";closeFn();},280);}else{sheet.style.transform="";} });
}

/* SIDE PANEL SWIPE (오른쪽으로 스와이프 → 닫기) */
function setupSidePanelSwipe(panelId, closeFn) {
  const panel = document.getElementById(panelId);
  if (!panel) return;
  let startX = 0, currentX = 0, dragging = false;
  panel.addEventListener('touchstart', e => {
    if (!panel.classList.contains('active')) return;
    startX = e.touches[0].clientX;
    currentX = 0; dragging = true;
    panel.style.transition = 'none';
  }, { passive: true });
  panel.addEventListener('touchmove', e => {
    if (!dragging) return;
    const dx = e.touches[0].clientX - startX;
    if (dx < 0) { dragging = false; panel.style.transform = ''; return; }
    currentX = dx;
    panel.style.transform = `translateX(${dx}px)`;
  }, { passive: true });
  panel.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    panel.style.transition = '';
    if (currentX > 80) {
      panel.style.transform = 'translateX(100%)';
      setTimeout(() => { panel.style.transform = ''; closeFn(); }, 280);
    } else {
      panel.style.transform = '';
    }
  });
}

function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return{r,g,b};}
function lightenHex(hex,amt=0.85){const{r,g,b}=hexToRgb(hex);const lr=Math.round(r+(255-r)*amt),lg=Math.round(g+(255-g)*amt),lb=Math.round(b+(255-b)*amt);return`#${lr.toString(16).padStart(2,"0")}${lg.toString(16).padStart(2,"0")}${lb.toString(16).padStart(2,"0")}`;}
function darkenHex(hex,amt=0.3){const{r,g,b}=hexToRgb(hex);const dr=Math.round(r*(1-amt)),dg=Math.round(g*(1-amt)),db=Math.round(b*(1-amt));return`#${dr.toString(16).padStart(2,"0")}${dg.toString(16).padStart(2,"0")}${db.toString(16).padStart(2,"0")}`;}
function makeCatColors(bg){return{bg,light:lightenHex(bg),text:darkenHex(bg)};}

function applyPanelOpacity(val){
  currentPanelOpacity=parseInt(val);
  const op=currentPanelOpacity/100;
  const panelOp=Math.min(op*0.6,0.75);   // 패널 투명도 (최대 75%)
  const cellOp=Math.min(op*0.42,0.55);   // 셀 투명도
  const blur=Math.round(12+op*20);        // 블러값
  const styleId="dynamic-panel-style";
  let s=document.getElementById(styleId);
  if(!s){s=document.createElement("style");s.id=styleId;document.head.appendChild(s);}

    body.custom-bg .month-cell{background:rgba(255,255,255,${cellOp})!important;backdrop-filter:blur(${Math.round(blur*0.5)}px) saturate(150%);-webkit-backdrop-filter:blur(${Math.round(blur*0.5)}px) saturate(150%);}
    body.custom-bg .todo-item{background:rgba(255,255,255,${panelOp*0.9})!important;backdrop-filter:blur(${blur}px) saturate(160%);-webkit-backdrop-filter:blur(${blur}px) saturate(160%);}
    body.custom-bg .sheet{background:rgba(255,255,255,${Math.min(panelOp*1.1,0.82)})!important;backdrop-filter:blur(${blur+8}px) saturate(200%);-webkit-backdrop-filter:blur(${blur+8}px) saturate(200%);}
  `;

function updateSubColor(groupName,subName,hex,rowId){ const g=CAT_GROUPS.find(g=>g.group===groupName); const s=g&&g.subs.find(s=>s.name===subName); if(!s) return; s.color=makeCatColors(hex); CAT[subName]=s.color; const dot=document.querySelector(`#${rowId} .cat-color-dot`); if(dot) dot.style.background=hex; }

/* ROUTINE */
function generateRoutineDates(startDate,freq,endDateStr,maxCount=365){
  const dates=[]; const end=endDateStr?new Date(endDateStr+"T00:00:00"):null; let d;
  for(let i=1;i<=maxCount;i++){
    if(freq==='daily') d=new Date(new Date(startDate).setDate(new Date(startDate).getDate()+i));
    else if(freq==='weekly') d=new Date(new Date(startDate).setDate(new Date(startDate).getDate()+i*7));
    else{d=new Date(startDate);d.setMonth(d.getMonth()+i);}
    if(end&&d>end) break;
    dates.push(fmtLocal(d));
  }
  return dates;
}

   MULTI-DAY EVENT SUPPORT

// Normalize: get all dates for an event (single or multi-day)
function getEventDates(ev) {
  if (!ev.endDate || ev.endDate <= ev.date) return [ev.date];
  const dates = [];
  let d = new Date(ev.date + 'T00:00:00');
  const end = new Date(ev.endDate + 'T00:00:00');
  while (d <= end) {
    dates.push(fmtLocal(d));
    d.setDate(d.getDate() + 1);
  }
  return dates;
}

function isMultiDay(ev) {
  return ev.endDate && ev.endDate > ev.date;
}

// Returns multi-day events that overlap with a given date
function getMultiDayEvs(ds) {
  return events.filter(ev => isMultiDay(ev) && ev.date <= ds && ev.endDate >= ds);
}

/* ── renderMonth override with multi-day bars ── */
const _origRenderMonth = renderMonth;
renderMonth = function() {
  _origRenderMonth();
  injectMultiDayBars();
};

function injectMultiDayBars() {
  const v = document.getElementById('view');
  const grid = v.querySelector('.month-grid');
  const wrap = v.querySelector('.month-grid-wrap');
  if (!grid || !wrap) return;

  const y = monthRef.getFullYear(), m = monthRef.getMonth();
  const total = daysInMonth(y, m), first = firstDayOfMonth(y, m);

  // Build cell date map: cellIndex -> dateString
  const cells = [];
  for (let i = 0; i < first; i++) cells.push(null);
  for (let d = 1; d <= total; d++) {
    cells.push(`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  }
  while (cells.length % 7 !== 0) cells.push(null);
  const numWeeks = cells.length / 7;

  // Find multi-day events visible this month
  const firstDs = cells.find(c => c);
  const lastDs = [...cells].reverse().find(c => c);
  const mdEvs = events.filter(ev => isMultiDay(ev) && ev.date <= lastDs && ev.endDate >= firstDs);
  if (!mdEvs.length) return;

  // For each week row, assign track lanes per event
  const cellEls = grid.querySelectorAll('.month-cell:not(.empty-cell)');

  // Create a floating layer over the grid
  let layer = wrap.querySelector('.multiday-layer');
  if (!layer) {
    layer = document.createElement('div');
    layer.className = 'multiday-layer';
    wrap.appendChild(layer);
  }
  layer.innerHTML = '';

  // Get grid layout metrics
  const gridRect = grid.getBoundingClientRect();
  const wrapRect = wrap.getBoundingClientRect();

  // Get cell elements positions (by date)
  const cellMap = {};
  grid.querySelectorAll('.month-cell').forEach((el, i) => {
    const ds = cells[i];
    if (ds) cellMap[ds] = el;
  });

  // Assign lane tracks per week to avoid overlaps
  for (let week = 0; week < numWeeks; week++) {
    const weekCells = cells.slice(week * 7, week * 7 + 7).filter(Boolean);
    if (!weekCells.length) continue;

    const weekStart = weekCells[0], weekEnd = weekCells[weekCells.length - 1];

    // Events visible in this week
    const weekMd = mdEvs.filter(ev => ev.date <= weekEnd && ev.endDate >= weekStart);
    if (!weekMd.length) continue;

    // Get geometry of first cell in row
    const firstCellEl = cellMap[weekStart];
    if (!firstCellEl) continue;
    const firstRect = firstCellEl.getBoundingClientRect();

    // Cell width and row top relative to wrap (scroll-aware)
    const cellW = firstRect.width;
    const rowTop = firstRect.top - wrapRect.top + wrap.scrollTop + 22; // below date number

    // Assign lanes (simple greedy)
    const lanes = []; // lanes[i] = end date of last event assigned to lane i
    weekMd.forEach(ev => {
      // Clamp to this week first
      const barStart = ev.date < weekStart ? weekStart : ev.date;
      const barEnd = ev.endDate > weekEnd ? weekEnd : ev.endDate;

      const startIdx = weekCells.indexOf(barStart);
      const endIdx = weekCells.indexOf(barEnd);
      if (startIdx === -1 || endIdx === -1) return;

      // Find a free lane: a lane is free if it has no event or its last event ends before barStart
      let lane = 0;
      while (lanes[lane] && lanes[lane] >= barStart) lane++;
      lanes[lane] = barEnd;

      const isStart = ev.date >= weekStart;
      const isEnd = ev.endDate <= weekEnd;

      const barLeft = startIdx * cellW + 2;
      const barWidth = (endIdx - startIdx + 1) * cellW - 4;
      const barTop = rowTop + lane * 19;

      const ct = cat(ev.category);
      const posClass = isStart && isEnd ? 'bar-start bar-end' : isStart ? 'bar-start' : isEnd ? 'bar-end' : 'bar-mid';

      const bar = document.createElement('div');
      bar.className = `multiday-bar ${posClass}`;
      bar.style.cssText = `left:${barLeft}px;width:${barWidth}px;top:${barTop}px;background:${ct.bg};opacity:${ev.done ? 0.45 : 1}`;
      bar.innerHTML = `<span class="multiday-bar-label">${isStart ? esc(ev.title) : ''}</span>`;
      bar.onclick = (e) => { e.stopPropagation(); openDetail(ev.id); };
      layer.appendChild(bar);
    });
  }
}

  idbGet('subscriptions_v1').then(saved => {
    if (saved) { try { subscriptions = JSON.parse(saved); } catch(e) {} }
  }).catch(() => {});
}
loadSubs();

function getMonthlyAmount(sub) {
  if (sub.cycle === 'monthly') return sub.amount;
  if (sub.cycle === 'yearly') return Math.round(sub.amount / 12);
  if (sub.cycle === 'weekly') return Math.round(sub.amount * 4.33);
  return sub.amount;
}

function getNextPaymentDate(sub) {
  const today = new Date();
  const day = sub.payDay || 1;
  let d = new Date(today.getFullYear(), today.getMonth(), day);
  if (d <= today) d.setMonth(d.getMonth() + 1);
  return d;
}

function openSubView() {
  renderSubView();
  switchTab('sub-overlay');
  pushOverlayHistory('sub-overlay');
}
function closeSubView() {
  switchTab(null);
  if (isTopOverlay('sub-overlay')) history.back();
}

function renderSubView() {
  // Compute totals
  const monthlyTotal = subscriptions.reduce((s, sub) => s + getMonthlyAmount(sub), 0);
  const count = subscriptions.length;
  document.getElementById('sub-monthly-total').textContent = '₩' + monthlyTotal.toLocaleString();
  document.getElementById('sub-monthly-sub').textContent = `총 ${count}개 서비스`;

  // Category breakdown pills
  const catMap = {};
  subscriptions.forEach(sub => {
    if (!catMap[sub.category]) catMap[sub.category] = 0;
    catMap[sub.category] += getMonthlyAmount(sub);
  });
  const topCats = Object.entries(catMap).sort((a,b) => b[1]-a[1]).slice(0, 3);
  document.getElementById('sub-summary-row').innerHTML = topCats.map(([cat, amt]) =>
    `<div class="sub-summary-pill">${cat} ₩${amt.toLocaleString()}</div>`
  ).join('');

  // Next payment notice
  if (subscriptions.length) {
    const sorted = [...subscriptions].sort((a,b) => getNextPaymentDate(a) - getNextPaymentDate(b));
    const next = sorted[0];
    const nextDate = getNextPaymentDate(next);
    const daysLeft = Math.ceil((nextDate - new Date()) / 86400000);
    document.getElementById('sub-next-card').style.display = 'flex';
    document.getElementById('sub-next-title').textContent = next.name;
    document.getElementById('sub-next-sub').textContent = daysLeft === 0 ? '오늘 결제' : `${daysLeft}일 후 결제`;
    document.getElementById('sub-next-amt').textContent = '₩' + next.amount.toLocaleString();
  } else {
    document.getElementById('sub-next-card').style.display = 'none';
  }

  // Category filter buttons
  const cats = ['전체', ...new Set(subscriptions.map(s => s.category))];
  document.getElementById('sub-cat-seg').innerHTML = cats.map(c =>
    `<button class="sub-cat-btn${c === subCatFilter ? ' active' : ''}" onclick="setSubCat('${c}')">${c}</button>`
  ).join('');

  // Subscription list
  const filtered = subCatFilter === '전체' ? subscriptions : subscriptions.filter(s => s.category === subCatFilter);
  const listEl = document.getElementById('sub-list');

  if (!filtered.length) {
    listEl.innerHTML = `<div class="sub-empty"><div class="sub-empty-icon">💳</div><div class="sub-empty-text">${subCatFilter === '전체' ? '구독 서비스가 없어요' : `${subCatFilter} 구독이 없어요`}</div><div class="sub-empty-sub">아래 버튼으로 추가해보세요</div></div>`;
    return;
  }

  // Group by category
  const groups = {};
  filtered.forEach(sub => {
    if (!groups[sub.category]) groups[sub.category] = [];
    groups[sub.category].push(sub);
  });

  let html = '';
  Object.entries(groups).forEach(([catName, subs]) => {
    const catTotal = subs.reduce((s, sub) => s + getMonthlyAmount(sub), 0);
    html += `<div class="sub-section-hdr">${catName} · 월 ₩${catTotal.toLocaleString()}</div>`;
    html += `<div class="sub-group">`;
    subs.forEach(sub => {
      const nextDate = getNextPaymentDate(sub);
      const daysLeft = Math.ceil((nextDate - new Date()) / 86400000);
      const dayStr = daysLeft === 0 ? '오늘' : `${daysLeft}일 후`;
      const cycleLabel = sub.cycle === 'monthly' ? '월간' : sub.cycle === 'yearly' ? '연간' : '주간';
      const accentColor = SUB_CAT_COLORS[sub.category] || '#8E8E93';
      html += `<div class="sub-item" onclick="editSub(${sub.id})">
        <div class="sub-icon" style="background:${accentColor}18">${sub.icon || '💳'}</div>
        <div class="sub-body">
          <div class="sub-name">${esc(sub.name)}</div>
          <div class="sub-meta">${esc(sub.payDay)}일 결제 · ${dayStr}${sub.note ? ' · ' + esc(sub.note) : ''}</div>
        </div>
        <div class="sub-right">
          <div class="sub-amount">₩${sub.amount.toLocaleString()}</div>
          <div class="sub-cycle">${cycleLabel}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });
  listEl.innerHTML = html;
}

function setSubCat(cat) {
  subCatFilter = cat;
  renderSubView();
}

  selectedSubEmoji = '💳';
  document.getElementById('add-sub-title').textContent = '구독 추가';

  document.getElementById('sf-day').value = '';

}
function closeAddSub() {
  document.getElementById('add-sub-overlay').classList.remove('show');
  if (isTopOverlay('add-sub-overlay')) history.back();
}

function editSub(id) {
  const sub = subscriptions.find(s => s.id === id);
  if (!sub) return;
  subEditingId = id;
  selectedSubEmoji = sub.icon || '💳';
  document.getElementById('add-sub-title').textContent = '구독 수정';
  document.getElementById('sub-submit-btn').textContent = '저장';
  document.getElementById('sub-delete-btn').style.display = 'block';
  document.getElementById('sf-name').value = sub.name;
  document.getElementById('sf-amount').value = sub.amount;
  document.getElementById('sf-cycle').value = sub.cycle || 'monthly';
  document.getElementById('sf-day').value = sub.payDay || '';
  document.getElementById('sf-cat').value = sub.category || '기타';
  document.getElementById('sf-note').value = sub.note || '';
  renderEmojiGrid();
  document.getElementById('add-sub-overlay').classList.add('show');
  pushOverlayHistory('add-sub-overlay');

function deleteSubscription() {
  if (subEditingId === null) return;
  if (!confirm('이 구독을 삭제할까요? 달력의 결제일 일정도 함께 삭제됩니다.')) return;
  subscriptions = subscriptions.filter(s => s.id !== subEditingId);
  saveSubs();
  syncSubsToCalendar();
  closeAddSub();
  renderSubView();
  renderView();
}

function renderEmojiGrid() {
  document.getElementById('sub-emoji-grid').innerHTML = SUB_EMOJIS.map(e =>
    `<button class="emoji-btn${e === selectedSubEmoji ? ' selected' : ''}" onclick="pickEmoji('${e}')">${e}</button>`
  ).join('');
}

function pickEmoji(e) {
  selectedSubEmoji = e;
  renderEmojiGrid();
}

function submitSub() {
  const name = document.getElementById('sf-name').value.trim();
  const amount = parseInt(document.getElementById('sf-amount').value) || 0;
  const cycle = document.getElementById('sf-cycle').value;
  const payDay = parseInt(document.getElementById('sf-day').value) || 1;
  const category = document.getElementById('sf-cat').value;
  const note = document.getElementById('sf-note').value.trim();
  if (!name) { document.getElementById('sf-name').focus(); return; }

  const data = { name, amount, cycle, payDay, category, note, icon: selectedSubEmoji };
  if (subEditingId !== null) {
    subscriptions = subscriptions.map(s => s.id === subEditingId ? { ...s, ...data } : s);
  } else {
    subscriptions.push({ id: Date.now(), ...data });
  }
  saveSubs();
  syncSubsToCalendar();
  closeAddSub();
  renderSubView();
  renderView();
}

/* ════════════════════════════════════════════
   SUBSCRIPTION ↔ CALENDAR SYNC
   구독 결제일을 캘린더 이벤트로 자동 반영
   ════════════════════════════════════════════ */

// 구독 이벤트임을 구분하는 마커
const SUB_EVENT_TAG = '__sub__';

// 구독 색상 (카테고리별)
function getSubColor(category) {
  const map = {
    '엔터테인먼트': '#FF2D55',
    '음악':         '#AF52DE',
    '앱/소프트웨어':'#007AFF',
    '뉴스/도서':    '#FF9500',
    '쇼핑':         '#34C759',
    '피트니스':     '#FF6B35',
    '교육':         '#5856D6',
    '기타':         '#8E8E93',
  };
  return map[category] || '#8E8E93';
}

// 구독의 결제 날짜 문자열 목록 생성 (오늘~12개월)
function getSubPayDates(sub) {
  const dates = [];
  const today = new Date();
  const y = today.getFullYear(), m = today.getMonth();

  if (sub.cycle === 'monthly') {
    for (let i = 0; i < 12; i++) {
      const d = new Date(y, m + i, Math.min(sub.payDay, new Date(y, m + i + 1, 0).getDate()));
      dates.push(fmtLocal(d));
    }
  } else if (sub.cycle === 'yearly') {
    // 연간: 현재 연도 + 내년에 한 번씩
    for (let i = 0; i <= 1; i++) {
      const baseDate = sub.startMonth
        ? new Date(y + i, (sub.startMonth - 1), Math.min(sub.payDay, 28))
        : new Date(y + i, m, Math.min(sub.payDay, 28));
      dates.push(fmtLocal(baseDate));
    }
  } else if (sub.cycle === 'weekly') {
    // 주간: 오늘부터 52주
    let d = new Date(today);
    for (let i = 0; i < 52; i++) {
      dates.push(fmtLocal(d));
      d.setDate(d.getDate() + 7);
    }
  }
  return dates;
}

// 모든 구독을 캘린더와 동기화
function syncSubsToCalendar() {
  // 기존 구독 이벤트 모두 제거
  events = events.filter(ev => !ev[SUB_EVENT_TAG]);

  // 각 구독에 대해 결제일 이벤트 생성
  subscriptions.forEach(sub => {
    const color = getSubColor(sub.category);
    const payDates = getSubPayDates(sub);
    payDates.forEach(date => {
      events.push({
        id: nextId++,
        [SUB_EVENT_TAG]: true,
        subId: sub.id,
        done: false,
        date,
        title: `${sub.icon || '💳'} ${sub.name} 결제일`,
        content: `₩${sub.amount.toLocaleString()} · ${sub.cycle === 'monthly' ? '월간' : sub.cycle === 'yearly' ? '연간' : '주간'}${sub.note ? ' · ' + sub.note : ''}`,
        category: sub.category,
        _color: color,
        showTitle: true,
        allDay: true,
        priority: 'none',
      });
    });
  });

  saveEvents();
}

// 앱 시작 시 기존 구독 이벤트 동기화
idbGet('subscriptions_v1').then(saved => {
  if (saved) {
    try { subscriptions = JSON.parse(saved); } catch(e) {}
    syncSubsToCalendar();
    renderView();
  }
}).catch(() => {});

// Register sub overlays in OVERLAYS list and history management
// (patched after OVERLAYS is defined below)


/* ════════════════════════════════════════════
   MEMO / TODO LIST
   ════════════════════════════════════════════ */

let memos = [];
let memoNextId = 1000;
let memoEditingId = null;
let memoAddCat = '개인';
let memoAddPrio = 'none';
let memoFilter = '전체';
let selectedMemoId = null;

const MEMO_PRIO_COLORS = { none:'', low:'#34C759', mid:'#FF9500', high:'#FF3B30' };

function saveMemos() { idbSet('memos_v1', JSON.stringify(memos)).catch(() => {}); }
function loadMemos() {
  idbGet('memos_v1').then(saved => {
    if (saved) { try { memos = JSON.parse(saved); memoNextId = Math.max(...memos.map(m => m.id), 999) + 1; } catch(e) {} }
  }).catch(() => {});
}
loadMemos();

/* ── 메모↔할일 연동: events에서 할일 동기화 ── */
function getLinkedTodos() {
  // events 중 done 여부가 있는 것을 할일로 취급 (오늘 이후 or 완료 안된것)
  const today = getTodayStr();
  return events.filter(ev => !ev.routineId && ev.date >= today.slice(0,7) + '-01')
    .map(ev => ({
      _isEvent: true,
      id: 'ev_' + ev.id,
      evId: ev.id,
      title: ev.title,
      done: !!ev.done,
      category: ev.category || '기타',
      priority: ev.priority || 'none',
      note: ev.content || ev.note || '',
      date: ev.date,
      createdAt: 0,
    }));
}

function getAllTodos() {
  return [...memos, ...getLinkedTodos()];
}

/* ── open/close ── */
function openMemoView() {
  renderMemoView();
  switchTab('memo-overlay');
  pushOverlayHistory('memo-overlay');
}
function closeMemoView() {
  switchTab(null);
  if (isTopOverlay('memo-overlay')) history.back();
}
function openMemoDetail(id) {
  selectedMemoId = id;
  // id가 'ev_' 로 시작하면 이벤트 상세로 이동
  if (typeof id === 'string' && id.startsWith('ev_')) {
    const evId = parseInt(id.slice(3));
    closeMemoView();
    setTimeout(() => openDetail(evId), 80);
    return;
  }
  const m = memos.find(x => x.id === id);
  if (!m) return;
  memoEditingId = id;
  memoAddCat = m.category || '개인';
  memoAddPrio = m.priority || 'none';
  document.getElementById('memo-detail-head').textContent = '할일 수정';
  document.getElementById('md-title').value = m.title || '';
  document.getElementById('md-note').value = m.note || '';
  const db = document.getElementById('md-done-btn');
  db.textContent = m.done ? '미완료' : '✓ 완료';
  db.style.background = m.done ? 'rgba(142,142,147,0.12)' : 'rgba(52,199,89,0.10)';
  db.style.color = m.done ? 'var(--ios-label3)' : 'var(--ios-green)';
  setMemoPrio(memoAddPrio);
  renderMemoCatPick();
  document.getElementById('memo-detail-overlay').classList.add('show');
  pushOverlayHistory('memo-detail-overlay');
}
function closeMemoDetail() {
  document.getElementById('memo-detail-overlay').classList.remove('show');
  memoEditingId = null;
  if (isTopOverlay('memo-detail-overlay')) history.back();
}

function setAllBnavInactive() {
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
}

/* ── render ── */
function renderMemoView() {
  // Filter chips — categories from both memos and linked events
  const allTodos = getAllTodos();
  const cats = ['전체', '메모만', '일정만', ...new Set(allTodos.map(m => m.category || '개인'))];
  document.getElementById('memo-filter-row').innerHTML = cats.map(c =>
    `<button class="memo-filter-btn${c === memoFilter ? ' active' : ''}" onclick="setMemoFilter('${esc(c)}')">${esc(c)}</button>`
  ).join('');

  const listWrap = document.getElementById('memo-list-wrap');

  let filtered;
  if (memoFilter === '전체') filtered = allTodos;
  else if (memoFilter === '메모만') filtered = memos;
  else if (memoFilter === '일정만') filtered = getLinkedTodos();
  else filtered = allTodos.filter(m => (m.category || '개인') === memoFilter);

  if (!filtered.length) {
    listWrap.innerHTML = `<div class="memo-empty">
      <div class="memo-empty-icon">✅</div>
      <div class="memo-empty-text">할 일이 없어요</div>
      <div class="memo-empty-sub">위 입력창에서 바로 추가해보세요</div>
    </div>`;
    return;
  }

  // Split into pending and done
  const pending = filtered.filter(m => !m.done);
  const done    = filtered.filter(m => m.done);

  // Sort pending: high > mid > low > none, then by date for events
  const prioOrder = { high: 0, mid: 1, low: 2, none: 3 };
  pending.sort((a, b) => {
    const po = prioOrder[a.priority||'none'] - prioOrder[b.priority||'none'];
    if (po !== 0) return po;
    if (a.date && b.date) return a.date.localeCompare(b.date);
    return (a.createdAt||0) - (b.createdAt||0);
  });

  let html = '';
  if (pending.length) {
    html += `<div class="memo-section-hdr">할 일 · ${pending.length}개</div>`;
    html += `<div class="memo-group">${pending.map(m => memoItemHtml(m)).join('')}</div>`;
  }
  if (done.length) {
    html += `<div class="memo-section-hdr">완료 · ${done.length}개</div>`;
    html += `<div class="memo-group">${done.map(m => memoItemHtml(m)).join('')}</div>`;
  }
  listWrap.innerHTML = html;
}

function memoItemHtml(m) {
  const ct = cat(m.category || '개인');
  const prio = m.priority || 'none';
  const isEvent = !!m._isEvent;
  const clickAction = isEvent
    ? `openDetail(${m.evId})`
    : `openMemoDetail(${m.id})`;
  const toggleAction = isEvent
    ? `event.stopPropagation();toggleDone(${m.evId})`
    : `event.stopPropagation();toggleMemo(${m.id})`;
  const dateLabel = isEvent && m.date ? `<span style="font-size:10px;color:var(--ios-label3);margin-left:2px">${m.date.slice(5).replace('-','/')}</span>` : '';
  const eventBadge = isEvent ? `<span style="font-size:9px;font-weight:600;padding:1px 5px;border-radius:10px;background:rgba(0,122,255,0.10);color:var(--accent);margin-left:2px">일정</span>` : '';
  return `<div class="memo-item" onclick="${clickAction}">
    <button class="memo-check${m.done ? ' checked' : ''}"
      onclick="${toggleAction}">${m.done ? '✓' : ''}</button>
    <div class="memo-body">
      <div class="memo-title${m.done ? ' done' : ''}">${esc(m.title)}</div>
      <div class="memo-meta-row">
        <span class="memo-tag" style="background:${ct.light};color:${ct.text}">${esc(m.category||'개인')}</span>
        ${eventBadge}
        ${dateLabel}
        ${m.note ? `<span style="font-size:11px;color:var(--ios-label3)">📝</span>` : ''}
      </div>
    </div>
    <div class="memo-right">
      ${prio !== 'none' ? `<div class="memo-prio-dot" style="background:${MEMO_PRIO_COLORS[prio]};width:7px;height:7px;border-radius:50%"></div>` : ''}
      <span class="memo-chevron">›</span>
    </div>
  </div>`;
}

function setMemoFilter(f) {
  memoFilter = f;
  renderMemoView();
}

/* ── actions ── */
function quickAddMemo() {
  const inp = document.getElementById('memo-quick-input');
  const title = inp.value.trim();
  if (!title) return;
  memos.push({ id: memoNextId++, title, done: false, category: '개인', priority: 'none', note: '', createdAt: Date.now() });
  saveMemos();
  inp.value = '';
  inp.focus();
  renderMemoView();
}

function toggleMemo(id) {
  memos = memos.map(m => m.id === id ? { ...m, done: !m.done } : m);
  saveMemos();
  renderMemoView();
  renderView(); // 캘린더 진행률 업데이트
}

function toggleMemoFromDetail() {
  if (memoEditingId === null) return;
  memos = memos.map(m => m.id === memoEditingId ? { ...m, done: !m.done } : m);
  saveMemos();
  const m = memos.find(x => x.id === memoEditingId);
  const db = document.getElementById('md-done-btn');
  db.textContent = m.done ? '미완료' : '✓ 완료';
  db.style.background = m.done ? 'rgba(142,142,147,0.12)' : 'rgba(52,199,89,0.10)';
  db.style.color = m.done ? 'var(--ios-label3)' : 'var(--ios-green)';
  renderMemoView();
}

function saveMemoDetail() {
  const title = document.getElementById('md-title').value.trim();
  if (!title) return;
  const note = document.getElementById('md-note').value;
  if (memoEditingId !== null) {
    memos = memos.map(m => m.id === memoEditingId
      ? { ...m, title, note, category: memoAddCat, priority: memoAddPrio }
      : m);
  }
  saveMemos();
  closeMemoDetail();
  renderMemoView();
}

function deleteMemoFromDetail() {
  if (memoEditingId === null) return;
  memos = memos.filter(m => m.id !== memoEditingId);
  saveMemos();
  closeMemoDetail();
  renderMemoView();
}

function setMemoPrio(p) {
  memoAddPrio = p;
  ['none','low','mid','high'].forEach(k => {
    const btn = document.getElementById('mp-' + k);
    if (btn) btn.classList.toggle('on', k === p);
  });
}

function renderMemoCatPick() {
  let html = '';
  CAT_GROUPS.forEach(g => {
    if (g.group) {
      const groupActive = g.subs.some(s => s.name === memoAddCat);
      const groupOpen = memoAddCat && g.subs.some(s => s.name === memoAddCat);
      html += `<button class="cpbtn" style="background:${groupActive?g.color.bg:g.color.light};color:${groupActive?'#fff':g.color.text};border-color:${groupActive?g.color.bg:'transparent'}" onclick="toggleMemoCatGroup('${esc(g.group)}')">${esc(g.group)}</button>`;
      if (groupOpen) {
        html += `<div style="display:flex;flex-wrap:wrap;gap:6px;width:100%;padding:2px 0 4px 8px;border-left:3px solid ${g.color.bg};margin-left:2px">`;
        g.subs.forEach(s => {
          const sel = memoAddCat === s.name;
          html += `<button class="cpbtn" style="background:${sel?s.color.bg:s.color.light};color:${sel?'#fff':s.color.text};border-color:${sel?s.color.bg:'transparent'}" onclick="pickMemoCat('${esc(s.name)}')">${esc(s.name)}</button>`;
        });
        html += `</div>`;
      }
    } else {
      const s = g.subs[0]; const sel = memoAddCat === s.name;
      html += `<button class="cpbtn" style="background:${sel?s.color.bg:s.color.light};color:${sel?'#fff':s.color.text};border-color:${sel?s.color.bg:'transparent'}" onclick="pickMemoCat('${esc(s.name)}')">${esc(s.name)}</button>`;
    }
  });
  document.getElementById('memo-cat-pick').innerHTML = html;
}

let _memoOpenGroup = null;
function toggleMemoCatGroup(g) { _memoOpenGroup = _memoOpenGroup === g ? null : g; renderMemoCatPick(); }
function pickMemoCat(c) { memoAddCat = c; renderMemoCatPick(); }

/* ── Sheet 아래로 스와이프해서 닫기 ── */
function setupSheetSwipe(overlayId, closeFn) {
  const overlay = document.getElementById(overlayId);
  if (!overlay) return;
  const sheet = overlay.querySelector('.sheet');
  if (!sheet) return;

  let startY = 0, startScrollTop = 0, dragging = false, currentDY = 0;

  sheet.addEventListener('touchstart', e => {
    startY = e.touches[0].clientY;
    startScrollTop = sheet.scrollTop;
    dragging = true;
    currentDY = 0;
    sheet.style.transition = 'none';
  }, { passive: true });

  sheet.addEventListener('touchmove', e => {
    if (!dragging) return;
    const dy = e.touches[0].clientY - startY;
    // 스크롤이 최상단일 때만 스와이프 허용
    if (dy <= 0 || sheet.scrollTop > 2) return;
    currentDY = dy;
    sheet.style.transform = `translateY(${dy}px)`;
    // 배경 dim 살짝 줄이기
    const opacity = Math.max(0, 0.35 - (dy / 400) * 0.35);
    overlay.style.background = `rgba(0,0,0,${opacity.toFixed(2)})`;
  }, { passive: true });

  sheet.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    sheet.style.transition = '';
    if (currentDY > 100) {
      // 충분히 내렸으면 닫기 애니메이션 후 닫기
      sheet.style.transform = `translateY(110%)`;
      overlay.style.background = 'rgba(0,0,0,0)';
      setTimeout(() => {
        sheet.style.transform = '';
        overlay.style.background = '';
        closeFn();
      }, 280);
    } else {
      // 원위치 복귀
      sheet.style.transform = '';
      overlay.style.background = '';
    }
    currentDY = 0;
  });
}

// 모든 sheet overlay에 스와이프 적용
setTimeout(() => {
  setupSheetSwipe('detail-overlay',      () => closeDetail());
  setupSheetSwipe('day-overlay',         () => closeDayPanel());
  setupSheetSwipe('settings-overlay',    () => closeSettings());
  setupSheetSwipe('add-overlay',         () => closeAdd());
  setupSheetSwipe('memo-detail-overlay', () => closeMemoDetail());
  setupSheetSwipe('add-sub-overlay',     () => closeAddSub());
}, 0);

/* ── Side Panel Swipe-to-close (오른쪽으로 스와이프) ── */
function setupSidePanelSwipe(panelId, closeFn) {
  const panel = document.getElementById(panelId);
  if (!panel) return;
  let startX = 0, currentX = 0, dragging = false;
  panel.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    currentX = 0; dragging = true;
    panel.style.transition = 'none';
  }, { passive: true });
  panel.addEventListener('touchmove', e => {
    if (!dragging) return;
    const dx = e.touches[0].clientX - startX;
    if (dx < 0) { dragging = false; panel.style.transform = ''; return; }
    currentX = dx;
    panel.style.transform = `translateX(${dx}px)`;
  }, { passive: true });
  panel.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    panel.style.transition = '';
    if (currentX > 80) {
      panel.style.transform = 'translateX(100%)';
      setTimeout(() => { panel.style.transform = ''; closeFn(); }, 300);
    } else {
      panel.style.transform = '';
    }
  });
}
setupSidePanelSwipe('sub-overlay', closeSubView);
setupSidePanelSwipe('memo-overlay', closeMemoView);

/* ── BACK BUTTON (History API) ── */
// 원칙: open 시 history.pushState, 뒤로가기(popstate) 시에만 실제 닫기 실행
// 버튼으로 닫을 때는 UI만 닫고 history.back() 호출 → popstate가 닫기 재실행하지 않도록 플래그 사용

history.replaceState({ overlay: null }, '');
let _closingByButton = false; // 버튼 닫기 중 popstate 무시용 플래그

// UI 닫기 원본 함수들 (history 조작 없이 순수하게 UI만 닫음)
const _rawClose = {
  'detail-overlay':      () => { const el=document.getElementById('detail-overlay'); if(el) el.classList.remove('show'); },
  'day-overlay':         () => { const el=document.getElementById('day-overlay');    if(el) el.classList.remove('show'); dayPanelDate=null; },
  'settings-overlay':    () => { const el=document.getElementById('settings-overlay'); if(el) el.classList.remove('show'); },
  'add-overlay':         () => { clearTimeout(_autoSaveTimer); if(_autoSavedId!==null){ events=events.filter(e=>e.id!==_autoSavedId); saveEvents(); renderView(); } _autoSavedId=null; const el=document.getElementById('add-overlay'); if(el) el.classList.remove('show'); editingId=null; },
  'stats-overlay':       () => switchTab(null),
  'copy-modal':          () => { const el=document.getElementById('copy-modal'); if(el) el.classList.remove('show'); copyingId=null; },
  'sub-overlay':         () => switchTab(null),
  'add-sub-overlay':     () => { const el=document.getElementById('add-sub-overlay'); if(el) el.classList.remove('show'); },
  'memo-overlay':        () => switchTab(null),
  'memo-detail-overlay': () => { const el=document.getElementById('memo-detail-overlay'); if(el) el.classList.remove('show'); },
};

function isOverlayVisible(id) {
  const el = document.getElementById(id);
  if (!el) return false;
  return el.classList.contains('show') || el.classList.contains('active') || el.style.display === 'flex';
}

// 버튼으로 닫기: UI 닫고 history.back()
function closeByButton(id) {
  if (!isOverlayVisible(id)) return;
  _rawClose[id]();
  if (history.state && history.state.overlay === id) {
    _closingByButton = true;
    history.back();
  }
}

// 열기: UI 열고 history.pushState
function openWithHistory(id, openFn) {
  openFn();
  history.pushState({ overlay: id }, '');
}

// popstate: 버튼 닫기가 아닌 경우만 UI 닫기
window.addEventListener('popstate', e => {
  if (_closingByButton) { _closingByButton = false; return; }
  // 열려있는 오버레이 중 가장 위 것 닫기
  const order = ['add-sub-overlay','memo-detail-overlay','detail-overlay','day-overlay','copy-modal','settings-overlay','add-overlay','stats-overlay','sub-overlay','memo-overlay'];
  for (const id of order) {
    if (isOverlayVisible(id)) { _rawClose[id](); return; }
  }
});

// ── 각 open/close 함수 연결 ──
const _origOpenDetail    = openDetail;
const _origOpenDayPanel  = openDayPanel;
const _origOpenSettings  = openSettings;
const _origOpenAdd       = openAdd;
const _origOpenEdit      = openEdit;
const _origOpenStats     = openStats;
const _origCopyFromDetail= copyFromDetail;

openDetail    = function(id){ openWithHistory('detail-overlay',   ()=>_origOpenDetail(id)); };
openDayPanel  = function(ds){ openWithHistory('day-overlay',      ()=>_origOpenDayPanel(ds)); };
openSettings  = function(){   openWithHistory('settings-overlay', ()=>_origOpenSettings()); };
openAdd       = function(ds){ openWithHistory('add-overlay',      ()=>_origOpenAdd(ds)); };
openEdit      = function(id){ openWithHistory('add-overlay',      ()=>_origOpenEdit(id)); };
openStats     = function(){   openWithHistory('stats-overlay',    ()=>_origOpenStats()); };
copyFromDetail= function(){   openWithHistory('copy-modal',       ()=>_origCopyFromDetail()); };

// openAddSub / openSubView / openMemoView 내부에서 pushOverlayHistory를 직접 호출하므로
// pushOverlayHistory는 openWithHistory로 통일
function pushOverlayHistory(id) {
  history.pushState({ overlay: id }, '');
}

closeDetail    = function(){ closeByButton('detail-overlay'); };
closeDayPanel  = function(){ closeByButton('day-overlay'); };
closeSettings  = function(){ closeByButton('settings-overlay'); };
closeAdd       = function(){ closeByButton('add-overlay'); };
closeStats     = function(){ closeByButton('stats-overlay'); };
closeCopyModal = function(){ closeByButton('copy-modal'); };
closeSubView   = function(){ closeByButton('sub-overlay'); };
closeAddSub    = function(){ closeByButton('add-sub-overlay'); };
closeMemoView  = function(){ closeByButton('memo-overlay'); };
closeMemoDetail= function(){ closeByButton('memo-detail-overlay'); };

// openSubView / openMemoView 내부에서 pushOverlayHistory 이미 호출하므로 중복 push 방지
const _origCloseSubView   = function(){ _rawClose['sub-overlay'](); };
const _origCloseAddSub    = function(){ _rawClose['add-sub-overlay'](); };
const _origCloseMemoView  = function(){ _rawClose['memo-overlay'](); };
const _origCloseMemoDetail= function(){ _rawClose['memo-detail-overlay'](); };
</script>
