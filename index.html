<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>1회차 프로그램</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="To Do List">
<meta name="theme-color" content="#F2F2F7">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%; overflow: hidden;
  font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  background: transparent;
  -webkit-font-smoothing: antialiased;
}

/* ── BACKGROUND LAYER ── */
#bg-layer {
  position: fixed; inset: 0; z-index: -1;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 45%, #0f3460 80%, #533483 100%);
  background-size: cover; background-position: center;
  transition: background 0.5s ease;
}

#app { max-width: 430px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; }

/* ── HEADER (Frosted Glass) ── */
#header {
  background: rgba(255,255,255,0.12);
  backdrop-filter: saturate(200%) blur(30px);
  -webkit-backdrop-filter: saturate(200%) blur(30px);
  padding: 14px 16px 0;
  flex-shrink: 0;
  border-bottom: 0.5px solid rgba(255,255,255,0.18);
}
.hdr-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.hdr-ttl { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: -0.5px; text-shadow: 0 1px 8px rgba(0,0,0,.3); }
.hdr-right { display: flex; align-items: center; gap: 8px; }

/* progress pill */
.prog-wrap {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.2); padding: 5px 10px 5px 8px;
  border-radius: 20px;
  border: 0.5px solid rgba(255,255,255,0.3);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.prog-ring { position: relative; width: 20px; height: 20px; flex-shrink: 0; }
.prog-ring svg { transform: rotate(-90deg); }
.prog-ring-bg { fill: none; stroke: rgba(255,255,255,0.25); stroke-width: 2.5; }
.prog-ring-fill {
  fill: none; stroke: #34C759; stroke-width: 2.5; stroke-linecap: round;
  transition: stroke-dashoffset .5s cubic-bezier(.4,0,.2,1);
}
.prog-lbl { font-size: 12px; font-weight: 600; color: #34C759; }

/* icon buttons */
.ibtn {
  width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: transform .1s, opacity .15s;
}
.ibtn:active { transform: scale(.9); opacity: .6; }
.ibtn-dark { background: rgba(255,255,255,0.22); color: #fff; font-size: 20px; font-weight: 300; border: 0.5px solid rgba(255,255,255,0.3); backdrop-filter: blur(10px); }
.ibtn-gray { background: rgba(255,255,255,0.18); color: #fff; font-size: 14px; font-weight: 600; border: 0.5px solid rgba(255,255,255,0.25); }
.ibtn-refresh { background: rgba(255,255,255,0.18); color: #fff; font-size: 16px; border: 0.5px solid rgba(255,255,255,0.25); }
/* 통일된 아이콘 버튼 스타일 */
.ibtn-glass {
  background: rgba(255,255,255,0.16); color: rgba(255,255,255,0.9);
  border: 0.5px solid rgba(255,255,255,0.28);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.ibtn-blue {
  background: #007AFF; color: #fff;
  border: none;
  box-shadow: 0 3px 14px rgba(0,122,255,.4);
}
.ibtn-today {
  background: #FF3B30; color: #fff; font-size: 10px; font-weight: 700;
  width: auto; padding: 0 9px; border-radius: 10px; height: 28px;
}

/* seg control */
.seg {
  display: flex; background: rgba(255,255,255,0.12);
  border-radius: 10px; padding: 2px; margin-bottom: 12px;
  border: 0.5px solid rgba(255,255,255,0.15);
}
.seg-btn {
  flex: 1; padding: 7px 0; border-radius: 8px; border: none;
  background: transparent; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.65);
  cursor: pointer; transition: all .2s;
}
.seg-btn.active {
  background: rgba(255,255,255,0.9); color: #1C1C1E; font-weight: 600;
  box-shadow: 0 1px 0 rgba(0,0,0,.04), 0 2px 8px rgba(0,0,0,.15);
}

/* cal nav */
.cal-nav { display: flex; align-items: center; padding: 2px 0 8px; }
.nav-btn {
  background: none; border: none; cursor: pointer; padding: 4px 8px;
  color: rgba(255,255,255,0.8); font-size: 18px; line-height: 1;
  border-radius: 8px; transition: background .15s;
}
.nav-btn:active { background: rgba(255,255,255,0.15); }
.nav-lbl { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -.3px; text-shadow: 0 1px 4px rgba(0,0,0,.2); }

/* dow row */
.dow-row {
  display: grid; grid-template-columns: repeat(7,1fr);
  padding: 4px 0; border-bottom: 0.5px solid rgba(255,255,255,0.1);
}
.dow-cell { text-align: center; font-size: 11px; font-weight: 600; padding: 4px 0; color: rgba(255,255,255,0.55); }

/* week strip card */
.week-strip-card {
  margin: 8px 12px 4px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 0.5px solid rgba(255,255,255,0.22);
  border-radius: 18px;
  box-shadow: 0 4px 20px rgba(0,0,0,.15), 0 1px 0 rgba(255,255,255,.12) inset;
  overflow: hidden;
}
.week-strip {
  display: grid; grid-template-columns: repeat(7,1fr);
  padding: 8px 4px 10px;
}
.ws-day { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 2px 0; }
.ws-dow { font-size: 11px; font-weight: 500; }
.ws-num {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 500; transition: all .15s;
}
.ws-dot { width: 4px; height: 4px; border-radius: 50%; }

/* ── MONTH GRID (Glass) ── */
#view { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.month-wrap {
  flex: 1; margin: 8px 12px 12px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 0.5px solid rgba(255,255,255,0.22);
  border-radius: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,.2), 0 1px 0 rgba(255,255,255,.15) inset;
  overflow: hidden; display: flex; flex-direction: column; max-height: 68vh;
}
.month-grid { display: grid; grid-template-columns: repeat(7,1fr); flex: 1; overflow: hidden; }
.month-cell {
  border-bottom: 0.5px solid rgba(255,255,255,0.1); border-right: 0.5px solid rgba(255,255,255,0.1);
  padding: 4px 3px 3px; cursor: pointer; overflow: hidden;
  display: flex; flex-direction: column; transition: background .12s;
}
.month-cell:active { background: rgba(255,255,255,0.12); }
.month-cell:nth-child(7n) { border-right: none; }
.month-num {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 500;
  flex-shrink: 0; margin-bottom: 2px; align-self: flex-start;
  color: rgba(255,255,255,0.9);
}
.month-ev {
  border-radius: 10px; padding: 2px 5px; margin-bottom: 2px;
  overflow: hidden; cursor: pointer; flex-shrink: 0; width: 100%;
}
.month-ev-time { font-size: 8px; font-weight: 600; color: #fff; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.month-ev-title { font-size: 8px; color: rgba(255,255,255,.9); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }

/* ── WEEK CARDS ── */
.week-cards { padding: 12px 12px 48px; display: flex; flex-direction: column; }
.day-hdr { display: flex; align-items: center; gap: 7px; margin-bottom: 10px; padding: 0 2px; }
.day-hdr-date { font-size: 20px; font-weight: 700; letter-spacing: -.5px; color: #fff; text-shadow: 0 1px 6px rgba(0,0,0,.25); }
.day-hdr-dow { font-size: 15px; color: rgba(255,255,255,0.65); font-weight: 400; }
.today-pill { font-size: 11px; font-weight: 600; background: #FF3B30; color: #fff; padding: 2px 8px; border-radius: 10px; }
.add-day-btn {
  margin-left: auto; background: rgba(255,255,255,0.15); border: 0.5px solid rgba(255,255,255,0.25);
  font-size: 13px; font-weight: 500; color: #fff; cursor: pointer;
  padding: 5px 10px; border-radius: 10px; backdrop-filter: blur(10px);
}

/* cards (Glass) */
.card {
  background: rgba(255,255,255,0.16);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 0.5px solid rgba(255,255,255,0.28);
  border-radius: 16px;
  display: flex; align-items: stretch; overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,.15), 0 1px 0 rgba(255,255,255,.2) inset;
  cursor: pointer; margin-bottom: 10px;
  transition: transform .12s, box-shadow .12s;
}
.card:active { transform: scale(.984); box-shadow: 0 2px 10px rgba(0,0,0,.12); }
.card-accent { width: 4px; flex-shrink: 0; }
.card-body { flex: 1; padding: 11px 10px 11px 13px; min-width: 0; }
.card-top { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.cat-pill { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 8px; white-space: nowrap; }
.time-lbl { font-size: 11px; color: rgba(255,255,255,0.65); font-weight: 500; margin-left: auto; flex-shrink: 0; }
.card-title { font-size: 14px; font-weight: 600; line-height: 1.35; margin-bottom: 3px; color: #fff; }
.card-title.done { text-decoration: line-through; color: rgba(255,255,255,0.45); }
.card-meta { font-size: 11px; color: rgba(255,255,255,0.6); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.check-wrap { display: flex; align-items: center; padding-right: 14px; }
.check-btn {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.1);
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: #fff;
  transition: all .2s cubic-bezier(.34,1.56,.64,1);
}
.check-btn.checked { background: #34C759; border-color: #34C759; transform: scale(1.08); }

.empty { text-align: center; padding: 52px 0 32px; }
.empty-icon { font-size: 44px; margin-bottom: 10px; }
.empty-text { color: rgba(255,255,255,0.45); font-size: 14px; font-weight: 500; }

/* ── OVERLAYS ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  z-index: 100; display: none; align-items: flex-end;
}
.overlay.show { display: flex; }
.sheet {
  background: rgba(22,22,30,0.8);
  backdrop-filter: blur(40px) saturate(200%);
  -webkit-backdrop-filter: blur(40px) saturate(200%);
  border: 0.5px solid rgba(255,255,255,0.15);
  border-radius: 28px 28px 0 0;
  width: 100%; max-height: 90vh; overflow-y: auto;
  padding-bottom: 34px;
  touch-action: pan-y;
  transition: transform 0.3s cubic-bezier(.32,0,.67,0);
  will-change: transform;
}
.handle {
  width: 36px; height: 5px; background: rgba(255,255,255,0.22);
  border-radius: 3px; margin: 10px auto 0;
  cursor: grab;
}

/* detail */
.detail-bar { height: 5px; border-radius: 0; }
.sheet-cat-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px 6px; }
.detail-title { font-size: 20px; font-weight: 700; color: #fff; line-height: 1.3; letter-spacing: -.3px; padding: 4px 16px 16px; }
.info-group {
  background: rgba(255,255,255,0.08);
  border: 0.5px solid rgba(255,255,255,0.12);
  border-radius: 16px; margin: 0 16px 10px; overflow: hidden;
}
.info-row { display: flex; align-items: flex-start; padding: 11px 14px; gap: 10px; border-bottom: 0.5px solid rgba(255,255,255,0.08); }
.info-row:last-child { border-bottom: none; }
.info-icon { font-size: 15px; width: 20px; flex-shrink: 0; margin-top: 1px; }
.info-lbl { font-size: 13px; color: rgba(255,255,255,0.5); width: 46px; flex-shrink: 0; font-weight: 500; padding-top: 1px; }
.info-val { font-size: 14px; color: rgba(255,255,255,0.9); font-weight: 400; flex: 1; line-height: 1.4; }
.act-row { display: flex; gap: 8px; padding: 4px 16px 0; }
.act-btn {
  flex: 1; padding: 14px; border-radius: 14px; border: none;
  font-size: 15px; font-weight: 600; cursor: pointer;
  transition: opacity .15s;
}
.act-btn:active { opacity: .75; }

/* detail action row with 3 buttons */
.act-row-3 { display: flex; gap: 8px; padding: 4px 16px 0; }
.act-btn-sm {
  flex: 1; padding: 14px 8px; border-radius: 14px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: opacity .15s; backdrop-filter: blur(10px);
}
.act-btn-sm:active { opacity: .75; }

/* day panel */
.day-panel-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px 10px; }
.day-panel-title { font-size: 20px; font-weight: 700; color: #fff; }
.day-panel-cards { padding: 0 12px; }

/* close */
.close-btn {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,255,255,0.14); border: 0.5px solid rgba(255,255,255,0.2); cursor: pointer;
  font-size: 12px; color: rgba(255,255,255,0.8); font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.close-btn:active { background: rgba(255,255,255,0.22); }

/* add / edit sheet */
.add-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px 10px; }
.add-head-title { font-size: 17px; font-weight: 600; color: #fff; }
.fm-group {
  background: rgba(255,255,255,0.08);
  border: 0.5px solid rgba(255,255,255,0.12);
  border-radius: 16px; margin: 0 16px 12px; overflow: hidden;
}
.fm-row-in { display: flex; align-items: center; padding: 12px 14px; gap: 10px; border-bottom: 0.5px solid rgba(255,255,255,0.08); }
.fm-row-in:last-child { border-bottom: none; }
.fm-lbl-in { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.9); width: 44px; flex-shrink: 0; }
.fm-in { flex: 1; border: none; background: transparent; font-size: 14px; color: rgba(255,255,255,0.6); outline: none; font-family: inherit; text-align: right; }
.fm-in::placeholder { color: rgba(255,255,255,0.3); }
.fm-in:focus { color: #fff; }
.fm-sec-lbl { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.45); padding: 0 16px 6px; text-transform: uppercase; letter-spacing: .5px; }
.cat-pick { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 16px 14px; }
.cpbtn { font-size: 11px; font-weight: 600; padding: 6px 11px; border-radius: 10px; cursor: pointer; border: none; transition: transform .1s; }
.cpbtn:active { transform: scale(.93); }
.submit-btn {
  width: calc(100% - 32px); margin: 0 16px;
  padding: 15px; border-radius: 16px; border: none;
  background: #007AFF; color: #fff; font-size: 16px; font-weight: 600;
  cursor: pointer; transition: opacity .15s;
  box-shadow: 0 4px 20px rgba(0,122,255,.4);
}
.submit-btn:active { opacity: .8; }

/* 추가 정보 토글 */
.extra-toggle {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; cursor: pointer;
  background: rgba(255,255,255,0.08);
  border: 0.5px solid rgba(255,255,255,0.12);
  border-radius: 14px; margin: 0 16px 12px;
  width: calc(100% - 32px);
  transition: opacity .15s;
}
.extra-toggle:active { opacity: .7; }
.extra-toggle-lbl { font-size: 14px; font-weight: 500; color: #64AFFF; }
.extra-toggle-arr { font-size: 12px; color: rgba(255,255,255,0.35); transition: transform .25s; }
.extra-toggle-arr.open { transform: rotate(180deg); }
.extra-box {
  overflow: hidden;
  max-height: 0;
  transition: max-height .3s cubic-bezier(.4,0,.2,1);
}
.extra-box.open { max-height: 600px; }

/* ── SETTINGS ── */
.settings-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px 10px; }
.settings-title { font-size: 17px; font-weight: 600; color: #fff; }
.cat-row {
  display: flex; align-items: center; padding: 11px 14px; gap: 12px;
  border-bottom: 0.5px solid rgba(255,255,255,0.08);
  background: transparent;
}
.cat-row:last-child { border-bottom: none; }
.cat-color-dot {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  cursor: pointer; border: 2.5px solid rgba(255,255,255,0.25);
  transition: transform .15s;
  position: relative; overflow: hidden;
}
.cat-color-dot:active { transform: scale(.9); }
.cat-color-dot input[type=color] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.cat-name-in {
  flex: 1; border: none; background: transparent;
  font-size: 14px; font-weight: 500; color: #fff;
  outline: none; font-family: inherit;
}
.cat-del-btn {
  width: 22px; height: 22px; border-radius: 50%;
  background: #FF3B30; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 13px; font-weight: 700; flex-shrink: 0;
  transition: transform .1s, opacity .1s;
}
.cat-del-btn:active { transform: scale(.88); }
.cat-del-btn:disabled { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.35); cursor: default; }
.add-cat-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  background: rgba(255,255,255,0.06);
  border: none; cursor: pointer; width: 100%;
  font-size: 14px; font-weight: 500; color: #64AFFF;
  transition: opacity .15s;
}
.add-cat-btn:active { opacity: .6; }
.add-cat-icon {
  width: 28px; height: 28px; border-radius: 50%;
  background: #34C759; display: flex; align-items: center;
  justify-content: center; color: #fff; font-size: 18px; font-weight: 300; flex-shrink: 0;
}
.color-presets { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 16px 14px; }
.color-preset {
  width: 30px; height: 30px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); cursor: pointer;
  transition: transform .12s; flex-shrink: 0;
}
.color-preset:active { transform: scale(.88); }

/* ── BACKGROUND SETTINGS ── */
.bg-section-lbl {
  font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.5);
  padding: 0 16px 6px; text-transform: uppercase; letter-spacing: .6px;
}
.bg-gradient-grid {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 8px;
  padding: 0 16px 16px;
}
.bg-swatch {
  aspect-ratio: 1; border-radius: 12px; border: 2.5px solid transparent;
  cursor: pointer; transition: transform .12s, border-color .15s;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
}
.bg-swatch.selected { border-color: #fff; transform: scale(1.07); }
.bg-swatch:active { transform: scale(.94); }
.bg-custom-row {
  display: flex; gap: 10px; padding: 0 16px 16px; align-items: center;
}
.bg-color-btn {
  flex: 1; padding: 12px; border-radius: 14px; border: 0.5px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.08); color: #fff; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: opacity .15s; text-align: center;
  position: relative; overflow: hidden;
}
.bg-color-btn input[type=color] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.bg-img-btn {
  flex: 1; padding: 12px; border-radius: 14px; border: 0.5px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.08); color: #fff; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: opacity .15s; text-align: center;
}
.bg-img-btn:active, .bg-color-btn:active { opacity: .7; }
.bg-opacity-row {
  display: flex; align-items: center; gap: 12px; padding: 0 16px 16px;
}
.bg-opacity-lbl { font-size: 13px; color: rgba(255,255,255,0.6); font-weight: 500; white-space: nowrap; }
.bg-opacity-slider {
  flex: 1; accent-color: #007AFF; cursor: pointer;
}
.settings-divider {
  height: 0.5px; background: rgba(255,255,255,0.1); margin: 4px 16px 14px;
}
</style>
</head>
<body>
<div id="bg-layer"></div>
<div id="app">
  <div id="header">
    <div class="hdr-top">
      <span class="hdr-ttl">일정</span>
      <div class="hdr-right">
        <div class="prog-wrap">
          <div class="prog-ring">
            <svg viewBox="0 0 20 20" width="20" height="20">
              <circle class="prog-ring-bg" cx="10" cy="10" r="7"/>
              <circle class="prog-ring-fill" id="prog-ring-fill" cx="10" cy="10" r="7"
                stroke-dasharray="43.98" stroke-dashoffset="43.98"/>
            </svg>

<script>
// 카테고리: 그룹 없는 항목은 group 생략
const CAT_GROUPS = [
  {
    group: "청도활동",
    color: { bg:"#007AFF", light:"#E3EEFF", text:"#0055CC" },
    subs: [
      { name:"밀착상담",    color:{ bg:"#FF6B6B", light:"#FFE8E8", text:"#C0392B" } },
      { name:"자신감회복",  color:{ bg:"#FFD93D", light:"#FFF9E0", text:"#B8860B" } },
      { name:"취업역량강화",color:{ bg:"#34C759", light:"#E3F9EA", text:"#1A7A35" } },
      { name:"진로탐색",   color:{ bg:"#5856D6", light:"#EEEEFF", text:"#3634A3" } },
      { name:"지역맞춤형", color:{ bg:"#FF2D55", light:"#FFE3EA", text:"#C0002F" } },
      { name:"사례관리",   color:{ bg:"#AF52DE", light:"#F0E3FF", text:"#7B1FA2" } },
      { name:"자율활동",   color:{ bg:"#8E8E93", light:"#F1F1F3", text:"#48484A" } },
    ],
  },
  { group: null, subs: [{ name:"개인", color:{ bg:"#FF9500", light:"#FFF3E0", text:"#C06800" } }] },
  { group: null, subs: [{ name:"기타", color:{ bg:"#636366", light:"#EFEFEF", text:"#3A3A3C" } }] },
];

// 카테고리명 → 색상 조회용 flat 맵
let CAT = {};
CAT_GROUPS.forEach(g => {
  g.subs.forEach(s => { CAT[s.name] = s.color; });
  if(g.group) CAT[g.group] = g.color;
});
const DAY_KR   = ["일","월","화","수","목","금","토"];
const MONTH_KR = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

let events = [];

function getToday(){ return new Date(); }
function getTodayStr(){ return fmtLocal(getToday()); }
let currentView="month", weekRef, monthRef;
let nextId=100, selectedId=null, dayPanelDate=null, addCat="기타", showTitle=false, selectedWeekDay="2026-04-01";
let editingId=null;

function fmtLocal(d){ const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),day=String(d.getDate()).padStart(2,"0"); return `${y}-${m}-${day}`; }
function fmt(d){ return fmtLocal(d); }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function weekStart(d){ const r=new Date(d); r.setDate(r.getDate()-r.getDay()); return r; }
function daysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
function firstDayOfMonth(y,m){ return new Date(y,m,1).getDay(); }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function getEvs(ds){ return events.filter(e=>e.date===ds).sort((a,b)=>a.startTime.localeCompare(b.startTime)); }
function cat(k){ return CAT[k]||CAT["기타"]; }

function updateProgress(){
  const done=events.filter(e=>e.done).length, total=events.length;
  document.getElementById("prog-lbl").textContent=done+"/"+total;
  const r=7, circ=2*Math.PI*r, pct=total?done/total:0;
  document.getElementById("prog-ring-fill").style.strokeDashoffset=circ*(1-pct);
}

function setView(v){
  currentView=v;
  if(v==="week"){ const t=getToday(); weekRef=weekStart(t); selectedWeekDay=getTodayStr(); }
  document.getElementById("btn-month").className="seg-btn"+(v==="month"?" active":"");
  document.getElementById("btn-week").className="seg-btn"+(v==="week"?" active":"");
  renderView();
}
function renderView(){ updateProgress(); currentView==="month"?renderMonth():renderWeek(); }

function goToday(){
  const t=getToday();
  if(currentView==="month"){ monthRef=new Date(t.getFullYear(),t.getMonth(),1); }
  else { weekRef=weekStart(t); selectedWeekDay=getTodayStr(); }
  renderView();
}
function toggleTitle(){
  showTitle=!showTitle;
  idbSet("ui_prefs_v1", JSON.stringify({showTitle})).catch(()=>{});
  renderView();
}

function timeLbl(ev){
  if(ev.allDay) return "하루종일";
  if(!ev.startTime && !ev.endTime) return "";
  if(!ev.endTime) return ev.startTime;
  return ev.startTime+"–"+ev.endTime;
}

function cardHtml(ev, onclickStr){
  const ct=cat(ev.category), oc=onclickStr?`onclick="${onclickStr}"`:"";
  const tl=timeLbl(ev);
  return `<div class="card" style="opacity:${ev.done?.5:1}" ${oc}>
    <div class="card-accent" style="background:${ct.bg}"></div>
    <div class="card-body">
      <div class="card-top">
        <span class="cat-pill" style="background:${ct.light};color:${ct.text}">${esc(ev.category)}</span>
        ${tl?`<span class="time-lbl">${esc(tl)}</span>`:""}
      </div>
      <div class="card-title${ev.done?" done":""}">${esc(ev.title)}</div>
      ${ev.instructor?`<div class="card-meta">👤 ${esc(ev.instructor)}${ev.location?"  📍 "+esc(ev.location):""}</div>`:""}
    </div>
    <div class="check-wrap">
      <button class="check-btn${ev.done?" checked":""}" onclick="event.stopPropagation();toggleDone(${ev.id})">${ev.done?"✓":""}</button>
    </div>
  </div>`;
}

/* MONTH */
function renderMonth(){
  const v=document.getElementById("view"); v.style.overflowY="hidden"; v.style.padding="0";
  const y=monthRef.getFullYear(), m=monthRef.getMonth();
  const total=daysInMonth(y,m), first=firstDayOfMonth(y,m);
  const cells=Array.from({length:first+total},(_,i)=>i<first?null:i-first+1);
  while(cells.length%7!==0) cells.push(null);
  const todayStr=getTodayStr(), isThisMonth=(new Date().getFullYear()===y&&new Date().getMonth()===m);

  document.getElementById("header-cal").innerHTML=`<div class="cal-nav">
    <button class="nav-btn" onclick="monthPrev()">‹</button>
    <div style="display:flex;flex:1;align-items:center;justify-content:center;position:relative">
      <span class="nav-lbl">${y}년 ${MONTH_KR[m]}</span>
      <div style="position:absolute;right:0;display:flex;align-items:center;gap:5px">
        <button class="ibtn ibtn-gray" onclick="toggleTitle()" style="font-size:10px;width:auto;padding:0 8px;height:26px;border-radius:10px">${showTitle?"숨김":"제목"}</button>
        ${!isThisMonth?`<button class="ibtn ibtn-today" onclick="goToday()">오늘</button>`:""}
      </div>
    </div>
    <button class="nav-btn" onclick="monthNext()">›</button>
  </div>`;

  let h=`<div class="month-wrap"><div class="dow-row">`;
  DAY_KR.forEach((d,i)=>{ h+=`<div class="dow-cell" style="color:${i===0?"rgba(255,100,100,0.9)":i===6?"rgba(100,175,255,0.9)":"rgba(255,255,255,0.55)"}">${d}</div>`; });
  h+=`</div><div class="month-grid">`;
  cells.forEach((day,ci)=>{
    if(!day){ h+=`<div class="month-cell" style="cursor:default;background:rgba(0,0,0,0.08)"></div>`; return; }
    const ds=`${y}-${String(m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const isT=ds===todayStr, dow=ci%7, evs=getEvs(ds);
    h+=`<div class="month-cell" onclick="openDayPanel('${ds}')">
      <div class="month-num" style="background:${isT?"#FF3B30":"transparent"};color:${isT?"#fff":dow===0?"rgba(255,100,100,0.9)":dow===6?"rgba(100,175,255,0.9)":"rgba(255,255,255,0.9)"};font-weight:${isT?"700":"500"}">${day}</div>`;
    evs.forEach(ev=>{
      const c=cat(ev.category);
      h+=`<div class="month-ev" style="background:${c.bg};opacity:${ev.done?.45:1}" onclick="event.stopPropagation();openDetail(${ev.id})">
        <span class="month-ev-time">${esc(ev.startTime)}</span>${showTitle?`<span class="month-ev-title">${esc(ev.title)}</span>`:""}
      </div>`;
    });
    h+=`</div>`;
  });
  h+=`</div></div>`;
  document.getElementById("view").innerHTML=h;
}
function monthPrev(){ monthRef=new Date(monthRef.getFullYear(),monthRef.getMonth()-1,1); renderView(); }
function monthNext(){ monthRef=new Date(monthRef.getFullYear(),monthRef.getMonth()+1,1); renderView(); }

/* WEEK */
function renderWeek(){
  const todayStr=getTodayStr();
  const v=document.getElementById("view"); v.style.overflowY="auto"; v.style.padding="0";
  const days=Array.from({length:7},(_,i)=>addDays(weekRef,i));
  const isThisWeek=days.some(d=>fmt(d)===todayStr);
  if(!days.some(d=>fmt(d)===selectedWeekDay)){
    const withEv=days.find(d=>events.some(e=>e.date===fmt(d)));
    selectedWeekDay=isThisWeek?todayStr:(withEv?fmt(withEv):fmt(days[0]));
  }

  let hh=`<div class="cal-nav">
    <button class="nav-btn" onclick="weekPrev()">‹</button>
    <div style="display:flex;flex:1;align-items:center;justify-content:center;position:relative">
      <span class="nav-lbl">${days[0].getMonth()+1}/${days[0].getDate()} – ${days[6].getMonth()+1}/${days[6].getDate()}</span>
      <div style="position:absolute;right:0">
        ${!isThisWeek?`<button class="ibtn ibtn-today" onclick="goToday()">오늘</button>`:""}
      </div>
    </div>
    <button class="nav-btn" onclick="weekNext()">›</button>
  </div>`;
  document.getElementById("header-cal").innerHTML=hh;

  // week-strip을 #view 상단에 카드로 렌더링
  let stripHtml=`<div class="week-strip-card"><div class="week-strip">`;
  days.forEach((d,i)=>{
    const ds=fmt(d), isT=ds===todayStr, isSel=ds===selectedWeekDay;
    const hasEv=events.some(e=>e.date===ds);
    const dc=i===0?"rgba(255,100,100,0.9)":i===6?"rgba(100,175,255,0.9)":"rgba(255,255,255,0.65)";
    const numBg=isT?"#FF3B30":isSel?"rgba(255,255,255,0.88)":"transparent";
    const numCol=isT?"#fff":isSel?"#1C1C1E":i===0?"rgba(255,100,100,0.9)":i===6?"rgba(100,175,255,0.9)":"rgba(255,255,255,0.9)";
    stripHtml+=`<div class="ws-day" onclick="selectWeekDay('${ds}')">
      <span class="ws-dow" style="color:${dc};font-weight:${isSel?"700":"500"}">${DAY_KR[d.getDay()]}</span>
      <div class="ws-num" style="background:${numBg};color:${numCol}">${d.getDate()}</div>
      <div class="ws-dot" style="background:${hasEv?(isT?"#FF3B30":"rgba(255,255,255,0.5)"):"transparent"}"></div>
    </div>`;
  });
  stripHtml+=`</div></div>`;

  const selD=days.find(d=>fmt(d)===selectedWeekDay)||days[0];
  const selDs=fmt(selD), selEvs=getEvs(selDs), isSelT=selDs===todayStr;
  let h=stripHtml+`<div class="week-cards">
    <div class="day-hdr">
      <span class="day-hdr-date" style="color:${isSelT?"#FF6B6B":"#fff"}">${selD.getMonth()+1}월 ${selD.getDate()}일</span>
      <span class="day-hdr-dow">${DAY_KR[selD.getDay()]}요일</span>
      ${isSelT?`<span class="today-pill">오늘</span>`:""}
      <button class="add-day-btn" onclick="openAdd('${selDs}')">+ 추가</button>
    </div>`;
  h+=selEvs.length
    ? selEvs.map(ev=>cardHtml(ev,`openDetail(${ev.id})`)).join("")
    : `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">일정이 없어요</div></div>`;
  h+=`</div>`;
  document.getElementById("view").innerHTML=h;
}
function selectWeekDay(ds){ selectedWeekDay=ds; renderWeek(); }
function weekPrev(){ weekRef=addDays(weekRef,-7); renderView(); }
function weekNext(){ weekRef=addDays(weekRef,7); renderView(); }

/* TOGGLE / DELETE */
const DEFAULT_EVENTS = [

// ── IndexedDB 저장소 (안드로이드 file:// 포함 모든 환경에서 동작) ──
const DB_NAME = "TodoApp", DB_VER = 1, STORE = "kv";
let _db = null;

function openDB(){
  return new Promise((res, rej) => {
    if(_db){ res(_db); return; }
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore(STORE);
    req.onsuccess = e => { _db = e.target.result; res(_db); };
    req.onerror = () => rej(req.error);
  });
}
function idbSet(key, val){
  return openDB().then(db => new Promise((res, rej) => {
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).put(val, key);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  }));
}
function idbGet(key){
  return openDB().then(db => new Promise((res, rej) => {
    const req = db.transaction(STORE, "readonly").objectStore(STORE).get(key);
    req.onsuccess = () => res(req.result); req.onerror = () => rej(req.error);
  }));
}

function saveEvents(){
  idbSet("events_v1", JSON.stringify(events)).catch(e => console.warn("IDB 저장 실패", e));
}

function loadEvents(){
  weekRef = weekStart(new Date("2026-04-01"));

  // UI 설정(제목 표시 여부 등) 먼저 불러오기
  idbGet("ui_prefs_v1").then(p => {
    if(p){ try{ const prefs=JSON.parse(p); if(typeof prefs.showTitle==="boolean") showTitle=prefs.showTitle; }catch(e){} }
  }).catch(()=>{});
  idbGet("events_v1").then(saved => {
    if(saved){
      try {
        events = JSON.parse(saved);
        nextId = Math.max(...events.map(e=>e.id), 99) + 1;
      } catch(e){
        events = DEFAULT_EVENTS.map(e=>({...e}));
      }
    } else {
      events = DEFAULT_EVENTS.map(e=>({...e}));
    }
    renderView();
  }).catch(() => {
    events = DEFAULT_EVENTS.map(e=>({...e}));
    renderView();
  });
}

/* ── SWIPE TO CLOSE ── */
function setupSwipe(overlayId, sheetId, closeFn){
  const sheet=document.getElementById(sheetId);
  let startY=0, currentY=0, dragging=false;

  sheet.addEventListener("touchstart", e=>{
    const isHandle = !!e.target.closest(".handle");
    // 핸들: 언제나 / 그 외: 스크롤이 맨 위일 때만 (스크롤과 충돌 방지)
    if(!isHandle && sheet.scrollTop > 0) return;
    startY=e.touches[0].clientY; currentY=0; dragging=true;
    sheet.style.transition="none";
  }, {passive:true});

  sheet.addEventListener("touchmove", e=>{
    if(!dragging) return;
    const dy=e.touches[0].clientY - startY;
    if(dy < 0){ dragging=false; sheet.style.transform=""; return; }
    currentY=dy;
    sheet.style.transform=`translateY(${dy}px)`;
  }, {passive:true});

  sheet.addEventListener("touchend", ()=>{
    if(!dragging) return;
    dragging=false;
    sheet.style.transition="";
    if(currentY > 80){
      sheet.style.transform=`translateY(100%)`;
      setTimeout(()=>{ sheet.style.transform=""; closeFn(); }, 280);
    } else {
      sheet.style.transform="";
    }
  });
}

function hexToRgb(hex){ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return {r,g,b}; }
function lightenHex(hex, amt=0.85){
  const {r,g,b}=hexToRgb(hex);
  const lr=Math.round(r+(255-r)*amt), lg=Math.round(g+(255-g)*amt), lb=Math.round(b+(255-b)*amt);
  return `#${lr.toString(16).padStart(2,"0")}${lg.toString(16).padStart(2,"0")}${lb.toString(16).padStart(2,"0")}`;
}
function darkenHex(hex, amt=0.3){
  const {r,g,b}=hexToRgb(hex);
  const dr=Math.round(r*(1-amt)), dg=Math.round(g*(1-amt)), db=Math.round(b*(1-amt));
  return `#${dr.toString(16).padStart(2,"0")}${dg.toString(16).padStart(2,"0")}${db.toString(16).padStart(2,"0")}`;
}
function makeCatColors(bg){ return { bg, light: lightenHex(bg), text: darkenHex(bg) }; }

      html += `<div class="cat-row" id="${rowId}" style="margin:0 16px 8px;border-radius:12px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.14)">
        <div class="cat-color-dot" style="background:${s.color.bg}" onclick="focusedCatKey='${esc(s.name)}'">
          <input type="color" value="${s.color.bg}"
            oninput="updateSoloColor('${esc(s.name)}',this.value,'${rowId}')"
            onchange="updateSoloColor('${esc(s.name)}',this.value,'${rowId}')">
        </div>
        <input class="cat-name-in" data-group="" data-key="${esc(s.name)}" value="${esc(s.name)}" placeholder="카테고리명">
        <button class="cat-del-btn" onclick="deleteSoloGroup('${esc(s.name)}')">−</button>
      </div>`;
    }
  });
  document.getElementById("cat-list").innerHTML = html;
}

function renderColorPresets(){
  document.getElementById("color-presets").innerHTML=PALETTE.map(c=>
    `<button class="color-preset" style="background:${c}" onclick="applyPresetColor('${c}')"></button>`
  ).join("");
}

let focusedCatKey = null;
document.addEventListener("focusin", e=>{ if(e.target.classList.contains("cat-name-in")) focusedCatKey=e.target.dataset.key; });

// 청도활동 세부 항목 색상 변경
function updateSubColor(groupName, subName, hex, rowId){
  const g = CAT_GROUPS.find(g=>g.group===groupName);
  const s = g && g.subs.find(s=>s.name===subName);
  if(!s) return;
  s.color = makeCatColors(hex);
  CAT[subName] = s.color;
  const dot = document.querySelector(`#${rowId} .cat-color-dot`);
  if(dot) dot.style.background = hex;
}

// 개인/기타 색상 변경
function updateSoloColor(name, hex, rowId){
  const g = CAT_GROUPS.find(g=>!g.group && g.subs[0].name===name);
  if(!g) return;
  g.subs[0].color = makeCatColors(hex);
  CAT[name] = g.subs[0].color;
  const dot = document.querySelector(`#${rowId} .cat-color-dot`);
  if(dot) dot.style.background = hex;
}

// 팔레트 클릭 → 포커스된 카테고리에 적용
function applyPresetColor(hex){
  if(!focusedCatKey) return;
  // 세부 항목인지 solo인지 찾기
  for(const g of CAT_GROUPS){
    if(g.group){
      const s = g.subs.find(s=>s.name===focusedCatKey);
      if(s){ s.color=makeCatColors(hex); CAT[s.name]=s.color; renderCatList(); return; }
    } else {
      if(g.subs[0].name===focusedCatKey){ g.subs[0].color=makeCatColors(hex); CAT[focusedCatKey]=g.subs[0].color; renderCatList(); return; }
    }
  }
}

// 청도활동 세부 항목 추가
function addSubCat(groupName){
  const g = CAT_GROUPS.find(g=>g.group===groupName);
  if(!g) return;
  const usedNames = g.subs.map(s=>s.name);
  const newName = ["새항목","항목A","항목B","항목C","항목D"].find(n=>!usedNames.includes(n)) || "항목"+(g.subs.length+1);
  const color = makeCatColors(PALETTE[g.subs.length % PALETTE.length]);
  g.subs.push({ name:newName, color });
  CAT[newName] = color;
  focusedCatKey = newName;
  renderCatList();
  setTimeout(()=>{
    const inputs = document.querySelectorAll(".cat-name-in");
    const last = inputs[inputs.length-1];
    if(last){ last.focus(); last.select(); }
  }, 50);
}

// 독립 카테고리 추가
function addSoloGroup(){
  const existing = CAT_GROUPS.flatMap(g=>g.subs.map(s=>s.name));
  const newName = ["새카테고리","카테고리A","카테고리B","카테고리C","카테고리D"]
    .find(n=>!existing.includes(n)) || "카테고리"+(CAT_GROUPS.length+1);
  const color = makeCatColors(PALETTE[CAT_GROUPS.length % PALETTE.length]);
  CAT_GROUPS.push({ group:null, subs:[{ name:newName, color }] });
  CAT[newName] = color;
  focusedCatKey = newName;
  renderCatList();
}

// 독립 카테고리 삭제
function deleteSoloGroup(name){
  const idx = CAT_GROUPS.findIndex(g=>!g.group && g.subs[0].name===name);
  if(idx===-1) return;
  const fallback = CAT_GROUPS.find(g=>g.subs.some(s=>s.name!==name))?.subs[0]?.name || "기타";
  events = events.map(e=>e.category===name?{...e,category:fallback}:e);
  CAT_GROUPS.splice(idx,1);
  delete CAT[name];
  if(focusedCatKey===name) focusedCatKey=null;
  renderCatList();
}

// 청도활동 세부 항목 삭제
function deleteSub(groupName, subName){
  const g = CAT_GROUPS.find(g=>g.group===groupName);
  if(!g || g.subs.length<=1) return;
  const fallback = g.subs.find(s=>s.name!==subName)?.name || "기타";
  events = events.map(e=>e.category===subName?{...e,category:fallback}:e);
  g.subs = g.subs.filter(s=>s.name!==subName);
  delete CAT[subName];
  if(focusedCatKey===subName) focusedCatKey=null;
  renderCatList();
}

/* ── BACKGROUND SETTINGS ── */
const BG_PRESETS = [
  { name:"심우주",  css:"linear-gradient(135deg,#1a1a2e 0%,#16213e 45%,#0f3460 80%,#533483 100%)" },
  { name:"오로라",  css:"linear-gradient(135deg,#0d324d 0%,#7f5a83 50%,#a64ba2 100%)" },
  { name:"선셋",    css:"linear-gradient(135deg,#c94b4b 0%,#4b134f 100%)" },
  { name:"오션",    css:"linear-gradient(135deg,#005c97 0%,#363795 100%)" },
  { name:"포레스트",css:"linear-gradient(135deg,#0f2027 0%,#203a43 50%,#2c5364 100%)" },
  { name:"코랄",    css:"linear-gradient(135deg,#f7971e 0%,#ffd200 50%,#f7971e 100%)" },
  { name:"로즈",    css:"linear-gradient(135deg,#ee0979 0%,#ff6a00 100%)" },
  { name:"민트",    css:"linear-gradient(135deg,#11998e 0%,#38ef7d 100%)" },
];
let currentBgType = "preset"; // "preset" | "solid" | "image"
let currentBgValue = BG_PRESETS[0].css;
let currentBgPresetIdx = 0;
let currentPanelOpacity = 16; // percentage (8-40)

function renderBgGradientGrid(){
  const el = document.getElementById("bg-gradient-grid"); if(!el) return;
  el.innerHTML = BG_PRESETS.map((p,i)=>
    `<div class="bg-swatch${currentBgType==="preset"&&currentBgPresetIdx===i?" selected":""}"
      style="background:${p.css}"
      title="${p.name}"
      onclick="applyBgPreset(${i})"></div>`
  ).join("");
}

function applyBgPreset(idx){
  currentBgType = "preset";
  currentBgPresetIdx = idx;
  currentBgValue = BG_PRESETS[idx].css;
  document.getElementById("bg-layer").style.background = currentBgValue;
  document.getElementById("bg-layer").style.backgroundSize = "cover";
  renderBgGradientGrid();
  saveBgSettings();
}

function applyBgSolid(hex){
  currentBgType = "solid";
  currentBgValue = hex;
  document.getElementById("bg-layer").style.background = hex;
  renderBgGradientGrid();
  saveBgSettings();
}

function applyBgImage(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    currentBgType = "image";
    currentBgValue = e.target.result;
    const layer = document.getElementById("bg-layer");
    layer.style.background = `url(${e.target.result}) center/cover no-repeat`;
    renderBgGradientGrid();
    saveBgSettings();
  };
  reader.readAsDataURL(file);
}

function applyPanelOpacity(val){
  currentPanelOpacity = parseInt(val);
  const op = currentPanelOpacity;
  document.documentElement.style.setProperty("--panel-opacity", op/100);
  // Update card/month-wrap opacity dynamically
  const styleId = "dynamic-panel-style";
  let s = document.getElementById(styleId);
  if(!s){ s = document.createElement("style"); s.id=styleId; document.head.appendChild(s); }
  s.textContent = `
    .card { background: rgba(255,255,255,${op/100}) !important; }
    .month-wrap { background: rgba(255,255,255,${op/100}) !important; }
    #header { background: rgba(255,255,255,${Math.max(op-4,4)/100}) !important; }
  `;
}

function saveBgSettings(){
  const settings = { type:currentBgType, value:currentBgValue, presetIdx:currentBgPresetIdx, opacity:currentPanelOpacity };
  idbSet("bg_settings_v1", JSON.stringify(settings)).catch(()=>{});
}

function loadBgSettings(){
  idbGet("bg_settings_v1").then(saved => {
    if(saved){
      try {
        const s = JSON.parse(saved);
        currentBgType = s.type || "preset";
        currentBgValue = s.value || BG_PRESETS[0].css;
        currentBgPresetIdx = s.presetIdx || 0;
        currentPanelOpacity = s.opacity || 16;
        const layer = document.getElementById("bg-layer");
        if(currentBgType === "image"){
          layer.style.background = `url(${currentBgValue}) center/cover no-repeat`;
        } else {
          layer.style.background = currentBgValue;
          layer.style.backgroundSize = "cover";
        }
        if(document.getElementById("bg-opacity-slider"))
          document.getElementById("bg-opacity-slider").value = currentPanelOpacity;
        applyPanelOpacity(currentPanelOpacity);
      } catch(e){}
    }
  }).catch(()=>{});
}

const _origOpenSettings = openSettings;
openSettings = function(){
  _origOpenSettings();
  renderBgGradientGrid();
  if(document.getElementById("bg-opacity-slider"))
    document.getElementById("bg-opacity-slider").value = currentPanelOpacity;
};

loadBgSettings();
loadEvents(); // IDB는 비동기 - loadEvents 내부에서 renderView 호출
window.addEventListener("resize", renderView);

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(()=>console.log('SW 등록 완료'))
      .catch(err=>console.log('SW 등록 실패:',err));
  });
}
</script>
