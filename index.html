<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>1회차 프로그램</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="To Do List">
<meta name="theme-color" content="#ffffff">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F7FA;
  --surface: #FFFFFF;
  --surface2: #F2F2F7;
  --border: rgba(0,0,0,0.07);
  --text: #1C1C1E;
  --text2: #8E8E93;
  --text3: #C7C7CC;
  --accent: #7B61FF;
  --accent-light: #EEE9FF;
  --green: #34C759;
  --red: #FF3B30;
  --orange: #FF9500;
  --blue: #007AFF;
  --radius: 20px;
  --radius-sm: 14px;
  --shadow: 0 2px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.14);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%; overflow: hidden;
  font-family: 'Nunito', -apple-system, 'Helvetica Neue', sans-serif;
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  color: var(--text);
}

#app {
  max-width: 430px; margin: 0 auto;
  height: calc(100% - 70px); display: flex; flex-direction: column;
  overflow: hidden; position: relative;
}

/* ── TOP BAR ── */
#topbar {
  background: var(--surface);
  padding: 36px 20px 0;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}

.tb-row1 {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.tb-title {
  font-size: 22px; font-weight: 900; color: var(--text);
  letter-spacing: -0.5px;
}
.tb-actions { display: flex; align-items: center; gap: 8px; }

.tb-btn {
  width: 36px; height: 36px; border-radius: 50%; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: transform .1s, background .15s;
  background: var(--surface2); color: var(--text2);
}
.tb-btn:active { transform: scale(.88); }
.tb-btn.accent { background: var(--accent); color: #fff; box-shadow: 0 4px 14px rgba(123,97,255,0.4); }

/* progress pill */
.prog-pill {
  display: flex; align-items: center; gap: 6px;
  background: var(--accent-light); padding: 6px 12px 6px 8px;
  border-radius: 20px;
}
.prog-ring { width: 22px; height: 22px; flex-shrink: 0; }
.prog-ring svg { transform: rotate(-90deg); display: block; }
.prog-ring-bg { fill: none; stroke: rgba(123,97,255,0.2); stroke-width: 3; }
.prog-ring-fill { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset .5s cubic-bezier(.4,0,.2,1); }
.prog-lbl { font-size: 12px; font-weight: 800; color: var(--accent); }

.streak-badge {
  display: none; align-items: center; gap: 3px;
  background: #FFF3E0; padding: 5px 10px; border-radius: 20px;
  font-size: 12px; font-weight: 800; color: #F57C00;
}

/* seg tabs */
.seg {
  display: flex; gap: 0;
  margin-bottom: -1px;
}
.seg-btn {
  flex: none; padding: 7px 18px; border: none; background: transparent;
  font-size: 14px; font-weight: 700; color: var(--text3); cursor: pointer;
  border-bottom: 3px solid transparent; transition: all .2s;
  font-family: 'Nunito', sans-serif;
}
.seg-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── MAIN VIEW ── */
#view {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  background: var(--bg);
  -webkit-overflow-scrolling: touch;
  min-height: 0;
}

/* ── WEEK STRIP ── */
.week-nav-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px 10px; background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.wn-lbl { font-size: 14px; font-weight: 700; color: var(--text2); }
.wn-btn { background: none; border: none; cursor: pointer; color: var(--text2); font-size: 18px; padding: 4px 8px; border-radius: 8px; }
.wn-btn:active { background: var(--surface2); }

.week-strip-wrap {
  background: var(--surface); padding: 0 12px 14px;
  flex-shrink: 0; border-bottom: 1px solid var(--border);
}
.week-strip { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
.ws-day { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; padding: 4px 2px; }
.ws-dow { font-size: 11px; font-weight: 700; color: var(--text3); }
.ws-num {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 800; color: var(--text2);
  transition: all .15s;
}
.ws-num.today { background: var(--red); color: #fff; }
.ws-num.selected { background: var(--accent); color: #fff; box-shadow: 0 4px 12px rgba(123,97,255,0.4); }
.ws-dot-row { display: flex; gap: 2px; min-height: 6px; align-items: center; justify-content: center; }
.ws-dot { width: 5px; height: 5px; border-radius: 50%; }

/* ── DAY HEADER ── */
.day-hdr-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px;
}
.dh-left {}
.dh-date { font-size: 22px; font-weight: 900; color: var(--text); letter-spacing: -0.5px; }
.dh-sub { font-size: 12px; font-weight: 600; color: var(--text3); margin-top: 1px; }
.dh-right { display: flex; align-items: center; gap: 10px; }
.dh-prog-ring { position: relative; width: 42px; height: 42px; }
.dh-prog-ring svg { transform: rotate(-90deg); display: block; }
.dh-prog-bg { fill: none; stroke: var(--surface2); stroke-width: 3.5; }
.dh-prog-fill { fill: none; stroke: var(--green); stroke-width: 3.5; stroke-linecap: round; transition: stroke-dashoffset .5s ease; }
.dh-prog-txt { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: var(--text2); }
.add-day-btn {
  background: var(--accent); color: #fff; border: none; cursor: pointer;
  font-size: 13px; font-weight: 800; padding: 8px 16px; border-radius: 22px;
  box-shadow: 0 4px 12px rgba(123,97,255,0.35); font-family: 'Nunito', sans-serif;
  transition: transform .1s;
}
.add-day-btn:active { transform: scale(.94); }

/* ── TODO ITEM ── */
.todo-list { padding: 0 16px 80px; }
.todo-item {
  background: var(--surface); border-radius: var(--radius-sm);
  margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
  padding: 14px 14px 14px 0; cursor: pointer;
  box-shadow: var(--shadow); overflow: hidden;
  transition: transform .1s, box-shadow .1s; position: relative;
}
.todo-item:active { transform: scale(.98); box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
.todo-item.done-item { opacity: .55; }
.todo-color-bar { width: 5px; height: 100%; flex-shrink: 0; align-self: stretch; border-radius: 0 4px 4px 0; min-height: 46px; }
.todo-check-area { flex-shrink: 0; }
.todo-check {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2.5px solid var(--text3); background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: #fff; transition: all .2s cubic-bezier(.34,1.56,.64,1);
}
.todo-check.checked { background: var(--green); border-color: var(--green); }
.todo-body { flex: 1; min-width: 0; }
.todo-title { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.35; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.todo-title.done { text-decoration: line-through; color: var(--text3); }
.todo-meta { display: flex; align-items: center; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
.todo-cat-chip {
  font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 20px;
}
.todo-time { font-size: 11px; font-weight: 600; color: var(--text3); }
.todo-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; padding-right: 4px; }
.prio-dot-sm { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* empty state */
.empty-state {
  text-align: center; padding: 60px 0 40px;
}
.empty-icon { font-size: 52px; margin-bottom: 12px; }
.empty-text { font-size: 15px; font-weight: 700; color: var(--text3); }
.empty-sub { font-size: 12px; font-weight: 600; color: var(--text3); margin-top: 4px; opacity: .6; }

/* ── MONTH GRID ── */
.month-container {
  padding: 0; background: var(--surface);
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}
.month-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px 6px;
}
.month-nav-lbl { font-size: 16px; font-weight: 900; color: var(--text); }
.month-nav-side { display: flex; align-items: center; gap: 4px; }
.mnav-btn {
  background: var(--surface2); border: none; cursor: pointer;
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; color: var(--text2); font-weight: 700;
  transition: background .12s;
}
.mnav-btn:active { background: var(--border); }
.today-chip {
  background: var(--red); color: #fff; border: none; cursor: pointer;
  font-size: 10px; font-weight: 800; padding: 4px 10px;
  border-radius: 20px; font-family: 'Nunito', sans-serif;
}

.dow-row {
  display: grid; grid-template-columns: repeat(7,1fr);
  padding: 0 4px; border-bottom: 1px solid var(--border);
}
.dow-cell {
  text-align: center; font-size: 11px; font-weight: 800;
  padding: 4px 0; color: var(--text3);
}

.month-grid-wrap { flex: 1; overflow-y: hidden; padding: 3px; display: flex; flex-direction: column; }
.month-grid { flex: 1; display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.month-cell {
  background: var(--surface); border-radius: 10px;
  padding: 4px 3px 3px; cursor: pointer;
  display: flex; flex-direction: column; transition: background .12s;
  overflow: hidden;
}
.month-cell:active { background: var(--accent-light); }
.month-cell.empty-cell { background: transparent; cursor: default; }
.month-num {
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; color: var(--text2);
  flex-shrink: 0; margin-bottom: 3px; align-self: flex-start;
}
.month-num.today-num { background: var(--red); color: #fff; }
.month-ev {
  border-radius: 6px; padding: 2px 5px; margin-bottom: 2px;
  overflow: hidden; cursor: pointer; flex-shrink: 0; width: 100%;
}
.month-ev-time { font-size: 8px; font-weight: 800; color: #fff; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.month-ev-title { font-size: 8px; color: rgba(255,255,255,.9); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; font-weight: 600; }

/* ── BOTTOM NAV ── */
#bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: var(--surface); border-top: 1px solid var(--border);
  display: flex; padding: 8px 0 env(safe-area-inset-bottom,0);
  z-index: 50;
}
.bnav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 3px; border: none; background: transparent; cursor: pointer;
  padding: 6px 0; color: var(--text3); font-family: 'Nunito', sans-serif;
  transition: color .15s;
}
.bnav-btn.active { color: var(--accent); }
.bnav-btn svg { transition: transform .15s; }
.bnav-btn.active svg { transform: scale(1.1); }
.bnav-label { font-size: 10px; font-weight: 800; }
.bnav-fab {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  border: none; background: transparent; cursor: pointer; padding: 0;
}
.bnav-fab-inner {
  width: 52px; height: 52px; background: var(--accent); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 20px rgba(123,97,255,0.5);
  transform: translateY(-12px); transition: transform .1s;
  flex-shrink: 0;
}
.bnav-fab:active .bnav-fab-inner { transform: translateY(-12px) scale(.9); }

/* ── OVERLAYS ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(8px);
  z-index: 100; display: none; align-items: flex-end;
}
.overlay.show { display: flex; }

.sheet {
  background: var(--surface);
  border-radius: 28px 28px 0 0;
  width: 100%; max-height: 92vh; overflow-y: auto;
  padding-bottom: env(safe-area-inset-bottom, 24px);
  touch-action: pan-y;
  box-shadow: 0 -8px 40px rgba(0,0,0,0.15);
  will-change: transform;
  transition: transform 0.3s cubic-bezier(.32,0,.67,0);
}
.handle {
  width: 40px; height: 5px; background: var(--border);
  border-radius: 3px; margin: 12px auto 0;
}

/* Sheet header */
.sheet-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px 12px;
}
.sheet-title { font-size: 17px; font-weight: 900; color: var(--text); }
.sheet-close {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--surface2); border: none; cursor: pointer;
  font-size: 13px; color: var(--text2); font-weight: 800;
  display: flex; align-items: center; justify-content: center;
}
.sheet-close:active { background: var(--border); }
.sheet-divider { height: 1px; background: var(--border); margin: 0 20px; }

/* Detail sheet */
.detail-color-bar { height: 6px; border-radius: 0; }
.detail-cat-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px 6px; }
.detail-cat-chip { font-size: 11px; font-weight: 800; padding: 4px 12px; border-radius: 20px; }
.detail-title { font-size: 20px; font-weight: 900; color: var(--text); line-height: 1.3; letter-spacing: -0.3px; padding: 4px 20px 16px; }

.info-group { background: var(--surface2); border-radius: var(--radius-sm); margin: 0 16px 12px; overflow: hidden; }
.info-row { display: flex; align-items: flex-start; padding: 12px 14px; gap: 10px; border-bottom: 1px solid var(--border); }
.info-row:last-child { border-bottom: none; }
.info-icon { font-size: 15px; width: 20px; flex-shrink: 0; margin-top: 1px; }
.info-lbl { font-size: 12px; color: var(--text3); width: 46px; flex-shrink: 0; font-weight: 700; padding-top: 2px; }
.info-val { font-size: 14px; color: var(--text); font-weight: 600; flex: 1; line-height: 1.4; }

.act-row { display: flex; gap: 8px; padding: 4px 16px 0; }
.act-btn { flex: 1; padding: 14px; border-radius: var(--radius-sm); border: none; font-size: 14px; font-weight: 800; cursor: pointer; transition: opacity .15s; font-family: 'Nunito', sans-serif; }
.act-btn:active { opacity: .7; }

/* Day Panel */
.day-panel-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px 10px; }
.day-panel-title { font-size: 18px; font-weight: 900; color: var(--text); }
.day-panel-cards { padding: 0 14px; }

/* Form */
.fm-section-lbl { font-size: 11px; font-weight: 800; color: var(--text3); padding: 6px 20px 6px; text-transform: uppercase; letter-spacing: .5px; }
.fm-group { background: var(--surface2); border-radius: var(--radius-sm); margin: 0 16px 12px; overflow: hidden; }
.fm-row { display: flex; align-items: center; padding: 13px 14px; gap: 10px; border-bottom: 1px solid var(--border); }
.fm-row:last-child { border-bottom: none; }
.fm-lbl { font-size: 14px; font-weight: 700; color: var(--text); width: 44px; flex-shrink: 0; }
.fm-in {
  flex: 1; border: none; background: transparent;
  font-size: 14px; color: var(--text2); outline: none;
  font-family: 'Nunito', sans-serif; text-align: right;
  font-weight: 600;
}
.fm-in::placeholder { color: var(--text3); }
.fm-in:focus { color: var(--text); }

.submit-btn {
  width: calc(100% - 32px); margin: 8px 16px 4px;
  padding: 16px; border-radius: var(--radius-sm);
  border: none; cursor: pointer; font-size: 16px; font-weight: 900;
  background: var(--accent); color: #fff;
  box-shadow: 0 6px 20px rgba(123,97,255,0.4);
  font-family: 'Nunito', sans-serif; transition: opacity .15s;
}
.submit-btn:active { opacity: .8; }

/* cat pick */
.cat-pick { display: flex; flex-wrap: wrap; gap: 7px; padding: 10px 16px 14px; }
.cpbtn { font-size: 11px; font-weight: 800; padding: 6px 12px; border-radius: 20px; cursor: pointer; border: 2px solid transparent; transition: transform .1s; font-family: 'Nunito', sans-serif; }
.cpbtn:active { transform: scale(.93); }

/* priority */
.prio-row { display: flex; gap: 7px; padding: 6px 16px 14px; }
.prio-btn { flex: 1; padding: 9px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 800; border: 2px solid transparent; cursor: pointer; text-align: center; font-family: 'Nunito', sans-serif; transition: all .15s; background: var(--surface2); color: var(--text3); }
.prio-btn.on { border-color: currentColor; }
.p-none.on { background: var(--surface2); color: var(--text2); }
.p-low.on { background: rgba(52,199,89,0.12); color: var(--green); }
.p-mid.on { background: rgba(255,149,0,0.12); color: var(--orange); }
.p-high.on { background: rgba(255,59,48,0.12); color: var(--red); }

/* extra toggle */
.extra-toggle {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; background: transparent; border: none; cursor: pointer; width: 100%;
  font-family: 'Nunito', sans-serif;
}
.extra-toggle-lbl { font-size: 13px; font-weight: 800; color: var(--accent); }
.extra-toggle-arr { font-size: 12px; color: var(--text3); transition: transform .2s; }
.extra-toggle-arr.open { transform: rotate(180deg); }
.extra-box { display: none; }
.extra-box.open { display: block; }

/* Settings */
.settings-section-lbl { font-size: 11px; font-weight: 800; color: var(--text3); padding: 6px 20px 6px; text-transform: uppercase; letter-spacing: .5px; }
.bg-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; padding: 0 16px 14px; }
.bg-swatch { border-radius: 14px; aspect-ratio: 1; cursor: pointer; border: 3px solid transparent; transition: transform .1s; }
.bg-swatch:active { transform: scale(.93); }
.bg-swatch.selected { border-color: var(--accent); box-shadow: 0 4px 12px rgba(123,97,255,0.4); }
.bg-custom-row { display: flex; gap: 8px; padding: 0 16px 14px; }
.bg-color-btn, .bg-img-btn {
  flex: 1; padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--surface2); font-size: 12px; font-weight: 800; color: var(--text2);
  cursor: pointer; position: relative; overflow: hidden; font-family: 'Nunito', sans-serif;
}
.bg-color-btn input[type=color] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.bg-opacity-row { display: flex; align-items: center; gap: 12px; padding: 0 16px 14px; }
.bg-opacity-lbl { font-size: 13px; font-weight: 700; color: var(--text2); white-space: nowrap; }
.bg-opacity-slider { flex: 1; accent-color: var(--accent); }
.cat-row { display: flex; align-items: center; padding: 11px 14px; gap: 10px; border-bottom: 1px solid var(--border); }
.cat-row:last-child { border-bottom: none; }
.cat-color-dot { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; cursor: pointer; position: relative; overflow: hidden; }
.cat-color-dot input[type=color] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.cat-name-in { flex: 1; border: none; background: transparent; font-size: 14px; color: var(--text); font-weight: 700; outline: none; font-family: 'Nunito', sans-serif; }
.cat-del-btn { background: rgba(255,59,48,0.1); border: none; cursor: pointer; width: 28px; height: 28px; border-radius: 50%; color: var(--red); font-size: 16px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.cat-del-btn:disabled { opacity: .3; cursor: default; }
.add-cat-btn { width: 100%; padding: 13px; border-radius: var(--radius-sm); border: 1.5px dashed var(--border); background: transparent; font-size: 13px; font-weight: 800; color: var(--accent); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; font-family: 'Nunito', sans-serif; }
.color-palette { display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 16px 14px; }
.color-preset { width: 30px; height: 30px; border-radius: 50%; border: none; cursor: pointer; transition: transform .1s; }
.color-preset:active { transform: scale(.88); }

/* Stats */
.stats-seg { display: flex; background: var(--surface2); border-radius: 12px; padding: 3px; margin: 12px 16px; }
.stats-seg-btn { flex: 1; padding: 7px 0; border-radius: 9px; border: none; background: transparent; font-size: 13px; font-weight: 800; color: var(--text3); cursor: pointer; transition: all .2s; font-family: 'Nunito', sans-serif; }
.stats-seg-btn.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }
.stats-chart { padding: 0 16px 8px; display: flex; flex-direction: column; gap: 10px; }
.stats-row { display: flex; align-items: center; gap: 10px; }
.stats-lbl { font-size: 11px; font-weight: 700; color: var(--text3); width: 32px; flex-shrink: 0; text-align: right; }
.stats-bar-bg { flex: 1; height: 10px; background: var(--surface2); border-radius: 6px; overflow: hidden; }
.stats-bar-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--accent), var(--green)); transition: width .5s cubic-bezier(.4,0,.2,1); }
.stats-pct { font-size: 11px; font-weight: 800; color: var(--text2); width: 32px; flex-shrink: 0; }
.stats-summary { display: flex; gap: 10px; padding: 8px 16px 16px; }
.stats-card { flex: 1; background: var(--surface2); border-radius: 14px; padding: 14px; text-align: center; }
.stats-card-num { font-size: 22px; font-weight: 900; color: var(--text); }
.stats-card-lbl { font-size: 11px; font-weight: 700; color: var(--text3); margin-top: 3px; }

/* heatmap */
.heatmap-outer { padding: 0 16px 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.heatmap-inner { display: flex; gap: 0; min-width: max-content; }
.heatmap-dow-col { display: flex; flex-direction: column; gap: 3px; margin-right: 4px; padding-top: 16px; }
.heatmap-dow-lbl { font-size: 9px; font-weight: 700; color: var(--text3); height: 12px; line-height: 12px; width: 14px; }
.heatmap-weeks { display: flex; flex-direction: column; gap: 0; }
.heatmap-month-row { display: flex; gap: 3px; margin-bottom: 4px; }
.heatmap-grid { display: flex; gap: 3px; }
.heatmap-col { display: flex; flex-direction: column; gap: 3px; }
.heatmap-cell { width: 12px; height: 12px; border-radius: 3px; cursor: default; }

/* copy modal */
#copy-modal { position: fixed; inset: 0; z-index: 200; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,.5); backdrop-filter: blur(12px); }
#copy-modal.show { display: flex; }
.copy-box { background: var(--surface); border-radius: 24px; padding: 24px 20px; width: 290px; box-shadow: var(--shadow-lg); }
.copy-box h3 { font-size: 16px; font-weight: 900; color: var(--text); margin-bottom: 16px; text-align: center; }
.copy-date-in { width: 100%; padding: 13px; border-radius: 12px; border: 1.5px solid var(--border); background: var(--surface2); color: var(--text); font-size: 15px; text-align: center; margin-bottom: 14px; outline: none; font-family: 'Nunito', sans-serif; font-weight: 700; }
.copy-btns { display: flex; gap: 8px; }
.copy-btn { flex: 1; padding: 13px; border-radius: 12px; border: none; font-size: 14px; font-weight: 800; cursor: pointer; font-family: 'Nunito', sans-serif; }

/* drag */
.month-cell.drag-over { background: var(--accent-light) !important; outline: 2.5px dashed var(--accent); outline-offset: -2px; }
.month-ev[draggable] { cursor: grab; }
.month-ev.dragging { opacity: .3 !important; transform: scale(.94); }
.todo-item.dragging { opacity: .4; }

/* attach */
.attach-section { padding: 8px 14px 4px; }
.attach-thumbs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
.attach-thumb-wrap { position: relative; }
.attach-thumb { width: 64px; height: 64px; border-radius: 12px; object-fit: cover; border: 1px solid var(--border); cursor: pointer; display: block; }
.attach-del-btn { position: absolute; top: -5px; right: -5px; width: 18px; height: 18px; border-radius: 50%; background: var(--red); border: none; color: #fff; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.link-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--surface2); border-radius: 10px; margin-bottom: 6px; border: 1px solid var(--border); }
.link-item-url { font-size: 12px; color: var(--accent); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 700; }

/* routine */
.freq-btns { display: flex; gap: 6px; padding: 4px 14px 10px; }
.freq-btn { flex: 1; padding: 9px 4px; border-radius: 10px; border: 2px solid transparent; background: var(--surface2); color: var(--text3); font-size: 12px; font-weight: 800; cursor: pointer; text-align: center; transition: all .15s; font-family: 'Nunito', sans-serif; }
.freq-btn.on { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

/* scroll adjustments */
#view::-webkit-scrollbar { display: none; }
.sheet::-webkit-scrollbar { display: none; }
.month-grid-wrap::-webkit-scrollbar { display: none; }

/* animations */
@keyframes pop-in {
  0% { transform: scale(.5); opacity: 0; }
  70% { transform: scale(1.08); }
  100% { transform: scale(1); opacity: 1; }
}
.todo-check.checked { animation: pop-in .25s cubic-bezier(.34,1.56,.64,1); }

/* Background layer for custom BG */
#bg-layer {
  position: fixed; inset: 0; z-index: -1;
  transition: background 0.5s ease;
}
body.custom-bg {
  background: transparent;
}
body.custom-bg #app { background: transparent; }

/* iOS frosted glass: panels are translucent, bg shines through */
body.custom-bg #topbar {
  background: rgba(255,255,255,0.55) !important;

}
body.custom-bg #bottom-nav {

}
body.custom-bg .month-container {
  background: transparent !important;
}
body.custom-bg .month-nav,
body.custom-bg .dow-row {
  background: transparent !important;
}
body.custom-bg .month-grid-wrap {
  background: transparent !important;
}
body.custom-bg .month-cell {
  background: rgba(255,255,255,0.38) !important;
  backdrop-filter: blur(12px) saturate(150%);
  -webkit-backdrop-filter: blur(12px) saturate(150%);
  border: 1px solid rgba(255,255,255,0.45);
}
body.custom-bg .month-cell.empty-cell {
  background: transparent !important;
  backdrop-filter: none !important;
  border: none !important;
}
body.custom-bg .week-nav-bar,
body.custom-bg .week-strip-wrap {
  background: rgba(255,255,255,0.55) !important;
  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);
}
body.custom-bg .todo-item {

  -webkit-backdrop-filter: blur(16px) saturate(160%);
  border: 1px solid rgba(255,255,255,0.5);
}
body.custom-bg .sheet {

  -webkit-backdrop-filter: blur(36px) saturate(200%);
}
body.custom-bg #view { background: transparent; }
body.custom-bg .day-hdr-bar { background: transparent; }

/* 텍스트 가시성: 어두운 배경에서도 잘 보이게 */
body.custom-bg .tb-title,
body.custom-bg .month-nav-lbl,
body.custom-bg .month-num,
body.custom-bg .wn-lbl,
body.custom-bg .ws-dow,

body.custom-bg .dow-cell,
body.custom-bg .dh-date,
body.custom-bg .dh-sub,

<script>
const CAT_GROUPS = [
  {
    group: "청도활동",
    color: { bg:"#7B61FF", light:"#EEE9FF", text:"#5B41DF" },
    subs: [
      { name:"밀착상담",    color:{ bg:"#FF6B6B", light:"#FFE8E8", text:"#C0392B" } },
      { name:"자신감회복",  color:{ bg:"#FFD93D", light:"#FFF9E0", text:"#B8860B" } },
      { name:"취업역량강화",color:{ bg:"#34C759", light:"#E3F9EA", text:"#1A7A35" } },
      { name:"진로탐색",   color:{ bg:"#5856D6", light:"#EEEEFF", text:"#3634A3" } },
      { name:"지역맞춤형", color:{ bg:"#FF2D55", light:"#FFE3EA", text:"#C0002F" } },
      { name:"사례관리",   color:{ bg:"#AF52DE", light:"#F0E3FF", text:"#7B1FA2" } },
      { name:"자율활동",   color:{ bg:"#8E8E93", light:"#F1F1F3", text:"#48484A" } },
    ],
  },
  { group: null, subs: [{ name:"개인", color:{ bg:"#FF9500", light:"#FFF3E0", text:"#C06800" } }] },
  { group: null, subs: [{ name:"기타", color:{ bg:"#636366", light:"#EFEFEF", text:"#3A3A3C" } }] },
];

let CAT = {};
CAT_GROUPS.forEach(g => {
  g.subs.forEach(s => { CAT[s.name] = s.color; });
  if(g.group) CAT[g.group] = g.color;
});

const DAY_KR   = ["일","월","화","수","목","금","토"];
const MONTH_KR = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

let events = [];
function getToday(){ return new Date(); }
function getTodayStr(){ return fmtLocal(getToday()); }
let currentView="month", weekRef, monthRef;
let nextId=100, selectedId=null, dayPanelDate=null, addCat="기타", showTitle=false, selectedWeekDay="2026-04-01";
let editingId=null;
const PRIO_COLORS = { none:'', low:'#34C759', mid:'#FF9500', high:'#FF3B30' };
const PRIO_LABELS = { none:'없음', low:'낮음', mid:'중간', high:'높음' };
let addPrio = 'none';
let formPhotos = [];
let formLinks = [];
let copyingId = null;
let statsMode = 'week';
let addRoutine = false, addRoutineFreq = 'daily';

function fmtLocal(d){ const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),day=String(d.getDate()).padStart(2,"0"); return `${y}-${m}-${day}`; }
function fmt(d){ return fmtLocal(d); }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function weekStart(d){ const r=new Date(d); r.setDate(r.getDate()-r.getDay()); return r; }
function daysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
function firstDayOfMonth(y,m){ return new Date(y,m,1).getDay(); }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function getEvs(ds){ return events.filter(e=>e.date===ds).sort((a,b)=>(a.startTime||"").localeCompare(b.startTime||"")); }
function cat(k){ return CAT[k]||CAT["기타"]||{bg:"#636366",light:"#EFEFEF",text:"#3A3A3C"}; }

function updateProgress(){
  const done=events.filter(e=>e.done).length, total=events.length;
  document.getElementById("prog-lbl").textContent=done+"/"+total;
  const r=8, circ=2*Math.PI*r, pct=total?done/total:0;
  document.getElementById("prog-ring-fill").style.strokeDashoffset=circ*(1-pct);
  updateStreakUI();
}

function setView(v){
  currentView=v;
  if(v==="week"){ const t=getToday(); weekRef=weekStart(t); selectedWeekDay=getTodayStr(); }
  document.getElementById("btn-month").className="seg-btn"+(v==="month"?" active":"");
  document.getElementById("btn-week").className="seg-btn"+(v==="week"?" active":"");
  renderView();
}
function renderView(){ updateProgress(); currentView==="month"?renderMonth():renderWeek(); updateTodayBtn(); }
function updateTodayBtn(){
  const wrap=document.getElementById("today-btn-wrap"); if(!wrap) return;
  const t=getToday(); let show=false;
  if(currentView==="month"){ show=!(monthRef.getFullYear()===t.getFullYear()&&monthRef.getMonth()===t.getMonth()); }
  else { const days=Array.from({length:7},(_,i)=>addDays(weekRef,i)); show=!days.some(d=>fmt(d)===getTodayStr()); }
  wrap.innerHTML=show?`<button class="today-chip" onclick="goToday()">오늘</button>`:"";
}

function goToday(){
  const t=getToday();
  if(currentView==="month"){ monthRef=new Date(t.getFullYear(),t.getMonth(),1); }
  else { weekRef=weekStart(t); selectedWeekDay=getTodayStr(); }
  renderView();
}
function toggleTitle(){
  showTitle=!showTitle;
  idbSet("ui_prefs_v1", JSON.stringify({showTitle})).catch(()=>{});
  renderView();
}

function timeLbl(ev){
  if(ev.allDay) return "하루종일";
  if(!ev.startTime && !ev.endTime) return "";
  if(!ev.endTime) return ev.startTime;
  return ev.startTime+"–"+ev.endTime;
}

function todoItemHtml(ev){
  const ct=cat(ev.category), tl=timeLbl(ev);
  const prio=ev.priority||'none';
  const hasImg=ev.images&&ev.images.length, hasLnk=ev.links&&ev.links.length;
  return `<div class="todo-item${ev.done?' done-item':''}" onclick="openDetail(${ev.id})">
    <div class="todo-color-bar" style="background:${ct.bg}"></div>
    <div class="todo-check-area">
      <button class="todo-check${ev.done?' checked':''}" onclick="event.stopPropagation();toggleDone(${ev.id})">${ev.done?'✓':''}</button>
    </div>
    <div class="todo-body">
      <div class="todo-title${ev.done?' done':''}">${esc(ev.title)}</div>
      <div class="todo-meta">
        <span class="todo-cat-chip" style="background:${ct.light};color:${ct.text}">${esc(ev.category)}</span>
        ${tl?`<span class="todo-time">⏰ ${esc(tl)}</span>`:''}
        ${(hasImg||hasLnk)?`<span class="todo-time">${hasImg?'📷':''} ${hasLnk?'🔗':''}</span>`:''}
      </div>
    </div>
    ${prio!=='none'?`<div class="prio-dot-sm" style="background:${PRIO_COLORS[prio]}"></div>`:''}
  </div>`;
}

/* MONTH */
function renderMonth(){
  const v=document.getElementById("view");
  v.style.overflowY="hidden"; v.style.padding="0"; v.style.paddingBottom="0"; v.style.display="flex"; v.style.flexDirection="column";
  const y=monthRef.getFullYear(), m=monthRef.getMonth();
  const total=daysInMonth(y,m), first=firstDayOfMonth(y,m);
  const cells=Array.from({length:first+total},(_,i)=>i<first?null:i-first+1);
  while(cells.length%7!==0) cells.push(null);
  const todayStr=getTodayStr(), isThisMonth=(new Date().getFullYear()===y&&new Date().getMonth()===m);

  let h=`<div class="month-container">
    <div class="month-nav">
      <div class="month-nav-side">
        <button class="mnav-btn" onclick="monthPrev()">‹</button>
      </div>
      <span class="month-nav-lbl">${y}년 ${MONTH_KR[m]}</span>
      <div class="month-nav-side">
        <button class="mnav-btn" onclick="monthNext()">›</button>
      </div>
    </div>
    <div class="dow-row">`;
  DAY_KR.forEach((d,i)=>{
    const col = i===0?"var(--red)":i===6?"var(--blue)":"var(--text3)";
    h+=`<div class="dow-cell" style="color:${col}">${d}</div>`;
  });
  const numWeeks = cells.length / 7;
  h+=`</div><div class="month-grid-wrap"><div class="month-grid" style="grid-template-rows:repeat(${numWeeks},1fr)">`;
  cells.forEach((day,ci)=>{
    if(!day){ h+=`<div class="month-cell empty-cell"></div>`; return; }
    const ds=`${y}-${String(m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const isT=ds===todayStr, dow=ci%7, evs=getEvs(ds);
    const numColor=dow===0?"var(--red)":dow===6?"var(--blue)":"var(--text2)";
    h+=`<div class="month-cell" onclick="openDayPanel('${ds}')">
      <div class="month-num${isT?' today-num':''}" style="${!isT?`color:${numColor}`:''}">${day}</div>`;
    evs.forEach(ev=>{
      const c=cat(ev.category);
      h+=`<div class="month-ev" draggable="true" data-evid="${ev.id}" style="background:${c.bg};opacity:${ev.done?.4:1}" onclick="event.stopPropagation();openDetail(${ev.id})">
        ${ev.startTime?`<span class="month-ev-time">${esc(ev.startTime)}</span>`:''}
        ${ev.showTitle?`<span class="month-ev-title">${esc(ev.title)}</span>`:''}
      </div>`;
    });
    h+=`</div>`;
  });
  h+=`</div></div></div>`;
  v.innerHTML=h;
  setupMonthDrag();
}
function monthPrev(){ monthRef=new Date(monthRef.getFullYear(),monthRef.getMonth()-1,1); renderView(); }
function monthNext(){ monthRef=new Date(monthRef.getFullYear(),monthRef.getMonth()+1,1); renderView(); }

/* WEEK */
function renderWeek(){
  const todayStr=getTodayStr();
  const v=document.getElementById("view"); v.style.overflowY="auto"; v.style.padding="0"; v.style.paddingBottom=""; v.style.display="block";
  const days=Array.from({length:7},(_,i)=>addDays(weekRef,i));
  const isThisWeek=days.some(d=>fmt(d)===todayStr);
  if(!days.some(d=>fmt(d)===selectedWeekDay)){
    const withEv=days.find(d=>events.some(e=>e.date===fmt(d)));
    selectedWeekDay=isThisWeek?todayStr:(withEv?fmt(withEv):fmt(days[0]));
  }

  let stripHtml=`<div class="week-nav-bar" style="flex-shrink:0">
    <button class="wn-btn" onclick="weekPrev()">‹</button>
    <span class="wn-lbl">${days[0].getMonth()+1}/${days[0].getDate()} – ${days[6].getMonth()+1}/${days[6].getDate()}</span>
    <button class="wn-btn" onclick="weekNext()">›</button>
  </div>
  <div class="week-strip-wrap" style="flex-shrink:0"><div class="week-strip">`;

  days.forEach((d,i)=>{
    const ds=fmt(d), isT=ds===todayStr, isSel=ds===selectedWeekDay;
    const hasEv=events.some(e=>e.date===ds);
    const evsDots=getEvs(ds).slice(0,3);
    const dowColor=i===0?"var(--red)":i===6?"var(--blue)":"var(--text3)";
    let numClass="ws-num"; if(isT) numClass+=" today"; else if(isSel) numClass+=" selected";
    let numStyle=""; if(!isT&&!isSel) numStyle=`color:${i===0?"var(--red)":i===6?"var(--blue)":"var(--text2)"}`;
    stripHtml+=`<div class="ws-day" onclick="selectWeekDay('${ds}')">
      <span class="ws-dow" style="color:${isSel?'var(--accent)':dowColor};font-weight:${isSel?'900':'700'}">${DAY_KR[d.getDay()]}</span>
      <div class="${numClass}" style="${numStyle}">${d.getDate()}</div>
      <div class="ws-dot-row">${evsDots.map(e=>`<div class="ws-dot" style="background:${cat(e.category).bg}"></div>`).join('')}</div>
    </div>`;
  });
  stripHtml+=`</div></div>`;

  const selD=days.find(d=>fmt(d)===selectedWeekDay)||days[0];
  const selDs=fmt(selD), selEvs=getEvs(selDs), isSelT=selDs===todayStr;
  const selDone=selEvs.filter(e=>e.done).length, selTotal=selEvs.length;
  const selPct=selTotal?selDone/selTotal:0;
  const r=18, circ=2*Math.PI*r, offset=circ*(1-selPct);

  let h=stripHtml+`<div class="day-hdr-bar">
    <div class="dh-left">
      <div class="dh-date" style="${isSelT?'color:var(--red)':''}">${selD.getMonth()+1}월 ${selD.getDate()}일 <span style="font-size:15px;font-weight:700;color:var(--text3)">${DAY_KR[selD.getDay()]}요일</span>${isSelT?`<span style="font-size:10px;font-weight:800;background:var(--red);color:#fff;padding:2px 8px;border-radius:20px;margin-left:6px">오늘</span>`:""}</div>
      <div class="dh-sub">${selTotal?selDone+"/"+selTotal+" 완료":"일정 없음"}</div>
    </div>
    <div class="dh-right">
      <div class="dh-prog-ring">
        <svg width="42" height="42" viewBox="0 0 42 42">
          <circle class="dh-prog-bg" cx="21" cy="21" r="${r}"/>
          <circle class="dh-prog-fill" cx="21" cy="21" r="${r}" stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"/>
        </svg>
        <div class="dh-prog-txt">${selTotal?Math.round(selPct*100)+'%':''}</div>
      </div>
      <button class="add-day-btn" onclick="openAdd('${selDs}')">+ 추가</button>
    </div>
  </div>
  <div class="todo-list">`;
  h+=selEvs.length
    ? selEvs.map(ev=>todoItemHtml(ev)).join("")
    : `<div class="empty-state"><div class="empty-icon">🗓️</div><div class="empty-text">오늘의 할 일을 추가해보세요</div><div class="empty-sub">+ 추가 버튼을 눌러 시작하세요</div></div>`;
  h+=`</div>`;
  v.innerHTML=h;
}

function selectWeekDay(ds){ selectedWeekDay=ds; renderWeek(); }
function weekPrev(){ weekRef=addDays(weekRef,-7); renderView(); }
function weekNext(){ weekRef=addDays(weekRef,7); renderView(); }

/* IDB */
const DB_NAME="TodoApp", DB_VER=1, STORE="kv";
let _db=null;
function openDB(){ return new Promise((res,rej)=>{ if(_db){res(_db);return;} const req=indexedDB.open(DB_NAME,DB_VER); req.onupgradeneeded=e=>e.target.result.createObjectStore(STORE); req.onsuccess=e=>{_db=e.target.result;res(_db);}; req.onerror=()=>rej(req.error); }); }
function idbSet(key,val){ return openDB().then(db=>new Promise((res,rej)=>{ const tx=db.transaction(STORE,"readwrite"); tx.objectStore(STORE).put(val,key); tx.oncomplete=res; tx.onerror=()=>rej(tx.error); })); }
function idbGet(key){ return openDB().then(db=>new Promise((res,rej)=>{ const req=db.transaction(STORE,"readonly").objectStore(STORE).get(key); req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error); })); }

function loadEvents(){
  weekRef=weekStart(new Date("2026-04-01"));
  monthRef=new Date(2026,3,1);
  idbGet("ui_prefs_v1").then(p=>{ if(p){ try{ const prefs=JSON.parse(p); if(typeof prefs.showTitle==="boolean") showTitle=prefs.showTitle; }catch(e){} } }).catch(()=>{});

/* SWIPE */
function setupSwipe(overlayId,sheetId,closeFn){
  const sheet=document.getElementById(sheetId);
  let startY=0,currentY=0,dragging=false;
  sheet.addEventListener("touchstart",e=>{ const isHandle=!!e.target.closest(".handle"); if(!isHandle&&sheet.scrollTop>0) return; startY=e.touches[0].clientY; currentY=0; dragging=true; sheet.style.transition="none"; },{passive:true});
  sheet.addEventListener("touchmove",e=>{ if(!dragging) return; const dy=e.touches[0].clientY-startY; if(dy<0){dragging=false;sheet.style.transform="";return;} currentY=dy; sheet.style.transform=`translateY(${dy}px)`; },{passive:true});
  sheet.addEventListener("touchend",()=>{ if(!dragging) return; dragging=false; sheet.style.transition=""; if(currentY>80){sheet.style.transform=`translateY(100%)`; setTimeout(()=>{sheet.style.transform="";closeFn();},280);}else{sheet.style.transform="";} });
}

function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return{r,g,b};}
function lightenHex(hex,amt=0.85){const{r,g,b}=hexToRgb(hex);const lr=Math.round(r+(255-r)*amt),lg=Math.round(g+(255-g)*amt),lb=Math.round(b+(255-b)*amt);return`#${lr.toString(16).padStart(2,"0")}${lg.toString(16).padStart(2,"0")}${lb.toString(16).padStart(2,"0")}`;}
function darkenHex(hex,amt=0.3){const{r,g,b}=hexToRgb(hex);const dr=Math.round(r*(1-amt)),dg=Math.round(g*(1-amt)),db=Math.round(b*(1-amt));return`#${dr.toString(16).padStart(2,"0")}${dg.toString(16).padStart(2,"0")}${db.toString(16).padStart(2,"0")}`;}
function makeCatColors(bg){return{bg,light:lightenHex(bg),text:darkenHex(bg)};}

function applyPanelOpacity(val){
  currentPanelOpacity=parseInt(val);
  const op=currentPanelOpacity/100;
  const panelOp=Math.min(op*0.6,0.75);   // 패널 투명도 (최대 75%)
  const cellOp=Math.min(op*0.42,0.55);   // 셀 투명도
  const blur=Math.round(12+op*20);        // 블러값
  const styleId="dynamic-panel-style";
  let s=document.getElementById(styleId);
  if(!s){s=document.createElement("style");s.id=styleId;document.head.appendChild(s);}

    body.custom-bg .month-cell{background:rgba(255,255,255,${cellOp})!important;backdrop-filter:blur(${Math.round(blur*0.5)}px) saturate(150%);-webkit-backdrop-filter:blur(${Math.round(blur*0.5)}px) saturate(150%);}
    body.custom-bg .todo-item{background:rgba(255,255,255,${panelOp*0.9})!important;backdrop-filter:blur(${blur}px) saturate(160%);-webkit-backdrop-filter:blur(${blur}px) saturate(160%);}
    body.custom-bg .sheet{background:rgba(255,255,255,${Math.min(panelOp*1.1,0.82)})!important;backdrop-filter:blur(${blur+8}px) saturate(200%);-webkit-backdrop-filter:blur(${blur+8}px) saturate(200%);}

document.addEventListener("focusin",e=>{if(e.target.classList.contains("cat-name-in")) focusedCatKey=e.target.dataset.key;});
function updateSubColor(groupName,subName,hex,rowId){ const g=CAT_GROUPS.find(g=>g.group===groupName); const s=g&&g.subs.find(s=>s.name===subName); if(!s) return; s.color=makeCatColors(hex); CAT[subName]=s.color; const dot=document.querySelector(`#${rowId} .cat-color-dot`); if(dot) dot.style.background=hex; }
function updateSoloColor(name,hex,rowId){ const g=CAT_GROUPS.find(g=>!g.group&&g.subs[0].name===name); if(!g) return; g.subs[0].color=makeCatColors(hex); CAT[name]=g.subs[0].color; const dot=document.querySelector(`#${rowId} .cat-color-dot`); if(dot) dot.style.background=hex; }
function applyPresetColor(hex){ if(!focusedCatKey) return; for(const g of CAT_GROUPS){ if(g.group){ const s=g.subs.find(s=>s.name===focusedCatKey); if(s){s.color=makeCatColors(hex);CAT[s.name]=s.color;renderCatList();return;} }else{ if(g.subs[0].name===focusedCatKey){g.subs[0].color=makeCatColors(hex);CAT[focusedCatKey]=g.subs[0].color;renderCatList();return;} } } }
function addSoloGroup(){ const existing=CAT_GROUPS.flatMap(g=>g.subs.map(s=>s.name)); const newName=["새카테고리","카테고리A","카테고리B","카테고리C"].find(n=>!existing.includes(n))||"카테고리"+(CAT_GROUPS.length+1); const color=makeCatColors(PALETTE[CAT_GROUPS.length%PALETTE.length]); CAT_GROUPS.push({group:null,subs:[{name:newName,color}]}); CAT[newName]=color; focusedCatKey=newName; renderCatList(); }
function deleteSoloGroup(name){ const idx=CAT_GROUPS.findIndex(g=>!g.group&&g.subs[0].name===name); if(idx===-1) return; const fallback=CAT_GROUPS.find(g=>g.subs.some(s=>s.name!==name))?.subs[0]?.name||"기타"; events=events.map(e=>e.category===name?{...e,category:fallback}:e); CAT_GROUPS.splice(idx,1); delete CAT[name]; if(focusedCatKey===name) focusedCatKey=null; renderCatList(); }
function deleteSub(groupName,subName){ const g=CAT_GROUPS.find(g=>g.group===groupName); if(!g||g.subs.length<=1) return; const fallback=g.subs.find(s=>s.name!==subName)?.name||"기타"; events=events.map(e=>e.category===subName?{...e,category:fallback}:e); g.subs=g.subs.filter(s=>s.name!==subName); delete CAT[subName]; if(focusedCatKey===subName) focusedCatKey=null; renderCatList(); }

/* ROUTINE */
function generateRoutineDates(startDate,freq,endDateStr,maxCount=365){
  const dates=[]; const end=endDateStr?new Date(endDateStr+"T00:00:00"):null; let d;
  for(let i=1;i<=maxCount;i++){
    if(freq==='daily') d=new Date(new Date(startDate).setDate(new Date(startDate).getDate()+i));
    else if(freq==='weekly') d=new Date(new Date(startDate).setDate(new Date(startDate).getDate()+i*7));
    else{d=new Date(startDate);d.setMonth(d.getMonth()+i);}
    if(end&&d>end) break;
    dates.push(fmtLocal(d));
  }
  return dates;
}

/* PHOTO / LINK */
function handlePhotoSelect(input){ const files=Array.from(input.files); files.forEach(f=>{ const reader=new FileReader(); reader.onload=e=>{formPhotos.push(e.target.result);renderFormAttachPreview();}; reader.readAsDataURL(f); }); input.value=''; }
function addFormLink(){ const inp=document.getElementById('f-link-in'); const url=(inp.value||'').trim(); if(!url) return; formLinks.push(url); inp.value=''; renderFormAttachPreview(); }
function renderFormAttachPreview(){
  const pp=document.getElementById('form-photo-preview'); const lp=document.getElementById('form-link-preview'); if(!pp||!lp) return;
  pp.innerHTML=formPhotos.map((src,i)=>`<div class="attach-thumb-wrap"><img class="attach-thumb" src="${src}" style="width:48px;height:48px;border-radius:10px;object-fit:cover;cursor:pointer" onclick="window.open(this.src)"><button class="attach-del-btn" onclick="formPhotos.splice(${i},1);renderFormAttachPreview()">✕</button></div>`).join('');
  lp.innerHTML=formLinks.length?`<div style="padding:4px 14px 4px">`+formLinks.map((url,i)=>`<div class="link-item"><span class="link-item-url">${esc(url)}</span><button onclick="formLinks.splice(${i},1);renderFormAttachPreview()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;flex-shrink:0">✕</button></div>`).join('')+`</div>`:'';
}

/* STREAK */
function calcStreak(){ const todayStr=getTodayStr(); let streak=0, d=new Date(todayStr); while(true){ const ds=fmtLocal(d); const dayEvs=events.filter(e=>e.date===ds); if(dayEvs.length===0){if(ds===todayStr){d=addDays(d,-1);continue;}else break;} if(!dayEvs.every(e=>e.done)) break; streak++; d=addDays(d,-1); if(streak>365) break; } return streak; }
function updateStreakUI(){ const s=calcStreak(); const pill=document.getElementById('streak-pill'); const num=document.getElementById('streak-num'); if(!pill||!num) return; if(s>=1){pill.style.display='flex';num.textContent=s+'일';}else{pill.style.display='none';} }

/* COPY */
function copyFromDetail(){ if(!selectedId) return; copyingId=selectedId; const ev=events.find(e=>e.id===copyingId); document.getElementById('copy-date-in').value=ev?ev.date:getTodayStr(); closeDetail(); setTimeout(()=>{document.getElementById('copy-modal').classList.add('show');},80); }
function closeCopyModal(){ document.getElementById('copy-modal').classList.remove('show'); copyingId=null; }
function confirmCopy(){ if(!copyingId) return; const ev=events.find(e=>e.id===copyingId); if(!ev){closeCopyModal();return;} const newDate=document.getElementById('copy-date-in').value; if(!newDate){alert('날짜를 선택해주세요');return;} events.push({...ev,id:nextId++,date:newDate,done:false}); saveEvents(); renderView(); closeCopyModal(); }

/* STATS */
function openStats(){ renderStats(); document.getElementById('stats-overlay').classList.add('show'); }
function closeStats(){ document.getElementById('stats-overlay').classList.remove('show'); }
function setStatsMode(mode){ statsMode=mode; ['week','month','heatmap'].forEach(m=>{ const b=document.getElementById('stats-btn-'+m); if(b) b.classList.toggle('active',m===mode); }); if(mode==='heatmap') renderHeatmap(); else renderStats(); }
function renderStats(){
  const today=new Date(getTodayStr()); const chart=document.getElementById('stats-chart'); const summary=document.getElementById('stats-summary'); if(!chart||!summary) return;
  let bars=[];
  if(statsMode==='week'){ for(let w=6;w>=0;w--){ const end=new Date(today); end.setDate(end.getDate()-w*7); const start=new Date(end); start.setDate(start.getDate()-6); const label=(start.getMonth()+1)+'/'+(start.getDate()); const dayEvs=events.filter(e=>{const ed=new Date(e.date);return ed>=start&&ed<=end;}); const done=dayEvs.filter(e=>e.done).length,total=dayEvs.length; bars.push({label,done,total,pct:total?Math.round(done/total*100):0}); } }
  else { for(let mo=5;mo>=0;mo--){ const d=new Date(today.getFullYear(),today.getMonth()-mo,1); const y=d.getFullYear(),m=d.getMonth(); const dayEvs=events.filter(e=>{const[ey,em]=e.date.split('-').map(Number);return ey===y&&em-1===m;}); const done=dayEvs.filter(e=>e.done).length,total=dayEvs.length; bars.push({label:(m+1)+'월',done,total,pct:total?Math.round(done/total*100):0}); } }
  chart.innerHTML=bars.map(b=>`<div class="stats-row"><span class="stats-lbl">${b.label}</span><div class="stats-bar-bg"><div class="stats-bar-fill" style="width:${b.pct}%"></div></div><span class="stats-pct">${b.total?b.pct+'%':'–'}</span></div>`).join('');
  const totalAll=events.length,doneAll=events.filter(e=>e.done).length,streak=calcStreak();
  summary.innerHTML=`<div class="stats-card"><div class="stats-card-num">${doneAll}</div><div class="stats-card-lbl">완료된 일정</div></div><div class="stats-card"><div class="stats-card-num">${totalAll?Math.round(doneAll/totalAll*100):0}%</div><div class="stats-card-lbl">전체 완료율</div></div><div class="stats-card"><div class="stats-card-num">${streak}🔥</div><div class="stats-card-lbl">연속 달성</div></div>`;
}
function renderHeatmap(){
  const chart=document.getElementById('stats-chart'); const summary=document.getElementById('stats-summary'); if(!chart||!summary) return;
  const today=new Date(getTodayStr()); const startDay=new Date(today); startDay.setDate(startDay.getDate()-364); startDay.setDate(startDay.getDate()-startDay.getDay());
  const dayMap={}; events.forEach(e=>{ if(!dayMap[e.date]) dayMap[e.date]={total:0,done:0}; dayMap[e.date].total++; if(e.done) dayMap[e.date].done++; });
  const heatColor=(entry)=>{ if(!entry||entry.total===0) return 'rgba(0,0,0,0.05)'; const pct=entry.done/entry.total; if(pct===0) return 'rgba(123,97,255,0.15)'; if(pct<0.5) return 'rgba(123,97,255,0.4)'; if(pct<1) return 'rgba(123,97,255,0.7)'; return 'var(--accent)'; };
  let cols=[],monthLabels=[],curMonth=-1,d=new Date(startDay);
  while(d<=today||d.getDay()!==0){ const weekCells=[]; for(let dow=0;dow<7;dow++){ const ds=fmtLocal(d); const isFuture=d>today; weekCells.push(isFuture?'rgba(0,0,0,0.03)':heatColor(dayMap[ds])); d.setDate(d.getDate()+1); if(d>today&&d.getDay()===0) break; } const ws=new Date(d); ws.setDate(ws.getDate()-7+1); const mo=ws.getMonth(); if(mo!==curMonth){monthLabels.push({mo,idx:cols.length});curMonth=mo;}else monthLabels.push(null); cols.push(weekCells); }
  const MO_KR=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const DOW_SH=['일','월','화','수','목','금','토'];
  let html=`<div class="heatmap-outer"><div class="heatmap-inner"><div class="heatmap-dow-col"><div style="height:16px"></div>${DOW_SH.map(d=>`<div class="heatmap-dow-lbl">${d}</div>`).join('')}</div><div class="heatmap-weeks"><div class="heatmap-month-row">${cols.map((c,i)=>{const m=monthLabels[i];return`<div style="width:12px;margin-right:3px;font-size:10px;color:var(--text3);white-space:nowrap;overflow:visible">${m?MO_KR[m.mo]:''}</div>`;}).join('')}</div><div class="heatmap-grid">${cols.map(cells=>`<div class="heatmap-col">${cells.map(c=>`<div class="heatmap-cell" style="background:${c}"></div>`).join('')}</div>`).join('')}</div></div></div></div>`;
  chart.innerHTML=html;
  const totalAll=events.length,doneAll=events.filter(e=>e.done).length,streak=calcStreak();
  summary.innerHTML=`<div class="stats-card"><div class="stats-card-num">${doneAll}</div><div class="stats-card-lbl">완료된 일정</div></div><div class="stats-card"><div class="stats-card-num">${streak}🔥</div><div class="stats-card-lbl">연속 달성</div></div><div class="stats-card"><div class="stats-card-num">${totalAll?Math.round(doneAll/totalAll*100):0}%</div><div class="stats-card-lbl">전체 완료율</div></div>`;
}

/* MONTH DRAG */
let _dragEvId=null;
function setupMonthDrag(){
  const view=document.getElementById('view'); if(!view) return;
  view.querySelectorAll('.month-ev[draggable]').forEach(el=>{
    el.addEventListener('dragstart',e=>{ _dragEvId=parseInt(el.dataset.evid); el.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    el.addEventListener('dragend',()=>el.classList.remove('dragging'));
  });
  view.querySelectorAll('.month-cell').forEach(cell=>{
    cell.addEventListener('dragover',e=>{e.preventDefault();cell.classList.add('drag-over');});
    cell.addEventListener('dragleave',()=>cell.classList.remove('drag-over'));
    cell.addEventListener('drop',e=>{ e.preventDefault();e.stopPropagation();cell.classList.remove('drag-over'); if(!_dragEvId) return; const clickAttr=cell.getAttribute('onclick')||''; const m=clickAttr.match(/openDayPanel\('([^']+)'\)/); if(!m) return; events=events.map(ev=>ev.id===_dragEvId?{...ev,date:m[1]}:ev); _dragEvId=null; saveEvents(); renderView(); });
  });
}

loadBgSettings();
loadEvents();
function adjustAppHeight(){
  const bnav=document.getElementById("bottom-nav");
  const app=document.getElementById("app");
  if(bnav&&app){ app.style.height=`calc(100% - ${bnav.offsetHeight}px)`; }
}
window.addEventListener("resize",()=>{ adjustAppHeight(); renderView(); });
setTimeout(adjustAppHeight, 0);
