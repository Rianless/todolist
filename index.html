<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>1회차 프로그램</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #F2F2F7; }

#app { max-width: 430px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; }

/* ── HEADER ── */
#header { background: #fff; padding: 12px 14px 0; box-shadow: 0 1px 0 rgba(0,0,0,.08); flex-shrink: 0; }
.hdr-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.hdr-left { display: flex; align-items: baseline; gap: 5px; }
.hdr-sub  { font-size: 11px; color: #8E8E93; font-weight: 500; }
.hdr-ttl  { font-size: 17px; font-weight: 800; color: #1C1C1E; letter-spacing: -.5px; }
.hdr-right { display: flex; align-items: center; gap: 7px; }
.prog-wrap { display: flex; align-items: center; gap: 5px; }
.prog-bar  { width: 54px; height: 4px; background: #E5E5EA; border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg,#34C759,#30D158); border-radius: 2px; transition: width .4s; }
.prog-lbl  { font-size: 11px; font-weight: 700; color: #34C759; min-width: 28px; }

/* icon buttons */
.ibtn { width: 28px; height: 28px; border-radius: 14px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.ibtn-dark { background: #1C1C1E; color: #fff; font-size: 20px; }
.ibtn-gray { background: #F2F2F7; color: #8E8E93; font-weight: 700; }
.ibtn-today { background: #FF6B6B; color: #fff; font-size: 10px; font-weight: 800; letter-spacing: -.3px; width: auto; padding: 0 7px; border-radius: 8px; height: 24px; }

/* seg */
.seg { display: flex; background: #F2F2F7; border-radius: 10px; padding: 2px; margin-bottom: 5px; }
.seg-btn { flex: 1; padding: 5px 0; border-radius: 8px; border: none; background: transparent; font-size: 12px; font-weight: 600; color: #8E8E93; cursor: pointer; }
.seg-btn.active { background: #fff; color: #1C1C1E; box-shadow: 0 1px 4px rgba(0,0,0,.12); }

/* legend */
.legend { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 6px; scrollbar-width: none; }
.legend::-webkit-scrollbar { display: none; }
.legend-item { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
.legend-dot  { width: 6px; height: 6px; border-radius: 3px; }
.legend-lbl  { font-size: 9px; color: #8E8E93; white-space: nowrap; }

/* cal nav (inside header) */
.cal-nav { display: flex; align-items: center; justify-content: space-between; padding: 3px 0 5px; }
.nav-btn  { background: none; border: none; font-size: 22px; color: #8E8E93; cursor: pointer; padding: 0 6px; line-height: 1; }
.nav-lbl  { font-size: 14px; font-weight: 700; color: #1C1C1E; }

/* dow row */
.dow-row { display: grid; grid-template-columns: repeat(7,1fr); background: #F9F9F9; border-bottom: 1px solid #F2F2F7; border-radius: 16px 16px 0 0; }
.dow-cell { text-align: center; font-size: 10px; font-weight: 700; padding: 6px 0; letter-spacing: .3px; }

/* week strip */
.week-strip { display: grid; grid-template-columns: repeat(7,1fr); border-top: 1px solid #F2F2F7; padding: 5px 0 7px; }
.ws-day { display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; }
.ws-dow { font-size: 10px; font-weight: 600; }
.ws-num { width: 24px; height: 24px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
.ws-dot { width: 4px; height: 4px; border-radius: 2px; }

/* ── MONTH GRID ── */
#view { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.month-wrap {
  flex: 1;
  margin: 6px 14px 8px;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 1px 6px rgba(0,0,0,.07);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.month-grid { display: grid; grid-template-columns: repeat(7,1fr); flex: 1; }
.month-cell { border-bottom: 1px solid #F2F2F7; border-right: 1px solid #F2F2F7; padding: 3px 3px 2px; cursor: pointer; overflow: hidden; display: flex; flex-direction: column; }
.month-cell:nth-child(7n) { border-right: none; }
.month-num { width: 20px; height: 20px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; margin-bottom: 1px; align-self: flex-start; }
.month-ev { border-radius: 3px; padding: 1px 4px; margin-bottom: 1px; overflow: hidden; cursor: pointer; flex-shrink: 0; width: fit-content; max-width: 100%; }
.month-ev-time { font-size: 8px; font-weight: 700; color: #fff; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.month-more { font-size: 8px; color: #8E8E93; padding-left: 1px; }

/* ── WEEK CARDS ── */
.week-cards { padding: 10px 14px 40px; display: flex; flex-direction: column; gap: 14px; }
.day-hdr { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; padding-left: 2px; }
.day-hdr-date { font-size: 14px; font-weight: 700; }
.day-hdr-sub { font-size: 12px; color: #8E8E93; font-weight: 500; }
.today-badge { font-size: 9px; font-weight: 800; background: #FF6B6B; color: #fff; padding: 2px 6px; border-radius: 7px; }

/* cards */
.card { background: #fff; border-radius: 12px; display: flex; align-items: center; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.06); cursor: pointer; margin-bottom: 7px; }
.card-line { width: 4px; align-self: stretch; flex-shrink: 0; }
.card-body { flex: 1; padding: 9px 8px 9px 11px; min-width: 0; }
.card-top  { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
.cat-badge { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 7px; white-space: nowrap; }
.time-tag  { font-size: 10px; color: #8E8E93; font-weight: 500; margin-left: auto; flex-shrink: 0; }
.card-title { font-size: 13px; font-weight: 600; line-height: 1.3; margin-bottom: 3px; }
.card-meta  { font-size: 10px; color: #8E8E93; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.check-btn  { width: 22px; height: 22px; border-radius: 11px; border: 2px solid #D1D1D6; background: transparent; cursor: pointer; margin-right: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; }
.empty { text-align: center; padding: 40px 0; }
.empty-icon { font-size: 38px; margin-bottom: 8px; }
.empty-text { color: #8E8E93; font-size: 13px; }

/* ── OVERLAYS ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: flex-end; }
.overlay.show { display: flex; }
.sheet { background: #fff; border-radius: 22px 22px 0 0; width: 100%; max-height: 88vh; overflow-y: auto; padding: 0 18px 30px; }
.sheet-bar { height: 4px; margin: 0 -18px; }
.handle { width: 34px; height: 4px; background: #E5E5EA; border-radius: 2px; margin: 11px auto 14px; }
.sheet-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 11px; }
.sheet-title { font-size: 18px; font-weight: 800; color: #1C1C1E; line-height: 1.3; margin-bottom: 14px; letter-spacing: -.3px; }
.close-btn { background: #F2F2F7; border: none; border-radius: 14px; width: 26px; height: 26px; cursor: pointer; font-size: 11px; color: #8E8E93; font-weight: 700; }
.divider { height: 1px; background: #F2F2F7; margin: 0 -18px 12px; }
.info-row { display: flex; align-items: flex-start; gap: 9px; margin-bottom: 11px; }
.info-icon { font-size: 14px; width: 18px; flex-shrink: 0; }
.info-lbl  { font-size: 12px; color: #8E8E93; width: 44px; flex-shrink: 0; font-weight: 500; }
.info-val  { font-size: 13px; color: #1C1C1E; font-weight: 500; flex: 1; }
.act-row { display: flex; gap: 9px; margin-top: 18px; }
.act-btn { flex: 1; padding: 12px; border-radius: 13px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; }

/* form */
.fm-lbl { font-size: 10px; font-weight: 600; color: #8E8E93; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; display: block; }
.fm-in  { width: 100%; padding: 10px 12px; border-radius: 11px; border: 1.5px solid #E5E5EA; font-size: 14px; color: #1C1C1E; background: #F9F9F9; outline: none; font-family: inherit; }
.fm-row { margin-bottom: 11px; }
.submit-btn { width: 100%; padding: 14px; border-radius: 13px; border: none; background: #1C1C1E; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px; }
.cat-pick { display: flex; flex-wrap: wrap; gap: 5px; }
.cpbtn { font-size: 10px; font-weight: 700; padding: 5px 9px; border-radius: 9px; cursor: pointer; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="hdr-top">
      <div class="hdr-left">
        <span class="hdr-sub">중기 3기 · 14명</span>
        <span class="hdr-ttl">1회차 프로그램</span>
      </div>
      <div class="hdr-right">
        <div class="prog-wrap">
          <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
          <span class="prog-lbl" id="prog-lbl">0/12</span>
        </div>
        <button class="ibtn ibtn-dark" id="plus-btn" title="일정 추가">＋</button>
      </div>
    </div>
    <div class="seg">
      <button class="seg-btn active" id="btn-month" onclick="setView('month')">📅 월간</button>
      <button class="seg-btn" id="btn-week" onclick="setView('week')">📋 주간</button>
    </div>
    <div class="legend" id="legend"></div>
    <div id="header-cal"></div>
  </div>
  <div id="view"></div>
</div>

<!-- Detail Modal -->
<div class="overlay" id="detail-overlay" onclick="closeDetail()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-bar" id="detail-bar"></div>
    <div class="handle"></div>
    <div class="sheet-head">
      <span class="cat-badge" id="detail-cat"></span>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div class="sheet-title" id="detail-title"></div>
    <div class="divider"></div>
    <div id="detail-rows"></div>
    <div class="act-row">
      <button class="act-btn" id="detail-done-btn" onclick="toggleFromDetail()"></button>
      <button class="act-btn" style="background:#FFE8E8;color:#FF3B30" onclick="deleteFromDetail()">삭제</button>
    </div>
  </div>
</div>

<!-- Day Panel -->
<div class="overlay" id="day-overlay" onclick="closeDayPanel()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="handle"></div>
    <div class="sheet-head">
      <span id="day-panel-title" style="font-weight:800;font-size:19px;color:#1C1C1E"></span>
      <div style="display:flex;gap:7px;align-items:center">
        <button class="ibtn ibtn-dark" onclick="dayPanelAdd()" style="font-size:18px">＋</button>
        <button class="close-btn" onclick="closeDayPanel()">✕</button>
      </div>
    </div>
    <div class="divider"></div>
    <div id="day-panel-cards"></div>
  </div>
</div>

<!-- Add Modal -->
<div class="overlay" id="add-overlay" onclick="closeAdd()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="handle"></div>
    <div class="sheet-head">
      <span style="font-weight:700;font-size:17px;color:#1C1C1E">새 일정 추가</span>
      <button class="close-btn" onclick="closeAdd()">✕</button>
    </div>
    <div class="fm-row"><label class="fm-lbl">날짜</label><input class="fm-in" type="date" id="f-date"></div>
    <div class="fm-row"><label class="fm-lbl">제목</label><input class="fm-in" type="text" id="f-title" placeholder="제목 입력"></div>
    <div style="display:flex;gap:8px;margin-bottom:11px">
      <div style="flex:1"><label class="fm-lbl">시작</label><input class="fm-in" type="time" id="f-start" value="09:00"></div>
      <div style="flex:1"><label class="fm-lbl">종료</label><input class="fm-in" type="time" id="f-end" value="10:00"></div>
    </div>
    <div class="fm-row"><label class="fm-lbl">카테고리</label><div class="cat-pick" id="cat-pick"></div></div>
    <div class="fm-row"><label class="fm-lbl">강사</label><input class="fm-in" type="text" id="f-instructor" placeholder="이름 입력"></div>
    <div class="fm-row"><label class="fm-lbl">장소</label><input class="fm-in" type="text" id="f-location" placeholder="장소 입력"></div>
    <div class="fm-row"><label class="fm-lbl">메모</label><input class="fm-in" type="text" id="f-note" placeholder="비고 입력"></div>
    <button class="submit-btn" onclick="submitAdd()">추가하기</button>
  </div>
</div>

<script>

  "개인":        { bg:"#F97316", light:"#FFF0E6", text:"#C2410C" },
  "기타":        { bg:"#64748B", light:"#F1F5F9", text:"#334155" },
};
const DAY_KR   = ["일","월","화","수","목","금","토"];
const MONTH_KR = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

let events = [
  { id:1,  date:"2026-04-01", startTime:"13:00", endTime:"15:00", title:"청년 도전! 비전 게임 시작!(OT)",             module:"대인관계이해", category:"자신감회복",  instructor:"담당자", room:"3층 1교육실", location:"미래기술산업진흥원", done:false },
  { id:2,  date:"2026-04-01", startTime:"15:00", endTime:"17:00", title:"사회초년생을 위한 비즈니스 매너 및 에티켓", module:"구직기초",    category:"취업역량강화", instructor:"한호원", room:"3층 1교육실", location:"미래기술산업진흥원", done:false },
  { id:3,  date:"2026-04-02", startTime:"12:30", endTime:"17:30", title:"기업탐방(포스코광양제철소)",                module:"직업탐색",    category:"진로탐색",    instructor:"담당자", room:"", location:"포스코홍보관 | 광양 금로 187-7", done:false, note:"외부활동" },
  { id:4,  date:"2026-04-06", startTime:"13:00", endTime:"17:00", title:"찬란한 순간 '스테인드글라스 트레이'(성장)", module:"동기부여",    category:"자신감회복",  instructor:"재가람", room:"3층 1교육실", location:"미래기술산업진흥원", done:false, note:"외부활동" },

  { id:6,  date:"2026-04-13", startTime:"13:00", endTime:"17:00", title:"이미지메이킹(퍼스널 컬러)으로 지역인재되기", module:"지역특화",   category:"지역맞춤형",  instructor:"김은미", room:"CL미용학원", location:"중앙로 48-1 2층", done:false },

  { id:9,  date:"2026-04-22", startTime:"14:00", endTime:"17:00", title:"직업선호도 검사 및 직업군 탐색으로 진로 로드맵", module:"지역특화", category:"지역맞춤형", instructor:"장필경", room:"시민공익활동지원센터", location:"중앙시장길 31 2층", done:false },
  { id:10, date:"2026-04-27", startTime:"14:00", endTime:"17:00", title:"순천 청년 퍼실리테이션",                    module:"진로계획",    category:"진로탐색",    instructor:"한호원", room:"시민공익활동지원센터", location:"중앙시장길 31 2층", done:false },
  { id:11, date:"2026-04-29", startTime:"13:00", endTime:"15:00", title:"중독예방교육(알코올,약물,게임등)",           module:"생활관리",    category:"사례관리",    instructor:"이호빈", room:"2층 교육실", location:"미래기술산업진흥원", done:false },
  { id:12, date:"2026-04-29", startTime:"15:00", endTime:"17:00", title:"나의 작은정원 나의 큰 성장(원예)",          module:"지역특화",    category:"지역맞춤형",  instructor:"김선재", room:"2층 교육실", location:"미래기술산업진흥원", done:false, note:"강사비20만원 재료비20" },
];

const TODAY    = new Date("2026-04-02");
const todayStr = fmt(TODAY);
let currentView = "month";
let weekRef  = weekStart(TODAY);
let monthRef = new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);
let nextId = 100;
let selectedId = null;
let dayPanelDate = null;
let addCat = "기타";
let showTitle = false; // 달력 제목 표시 토글

/* ── helpers ── */
function fmt(d){ return d.toISOString().split("T")[0]; }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function weekStart(d){ const r=new Date(d); r.setDate(r.getDate()-r.getDay()); return r; }
function daysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
function firstDayOfMonth(y,m){ return new Date(y,m,1).getDay(); }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function getEvs(ds){ return events.filter(e=>e.date===ds).sort((a,b)=>a.startTime.localeCompare(b.startTime)); }
function cat(k){ return CAT[k]||CAT["기타"]; }

/* ── progress ── */
function updateProgress(){
  const done=events.filter(e=>e.done).length, total=events.length;
  document.getElementById("prog-lbl").textContent=done+"/"+total;
  document.getElementById("prog-fill").style.width=(total?done/total*100:0)+"%";
}

/* ── legend ── */
function renderLegend(){
  document.getElementById("legend").innerHTML=Object.entries(CAT).map(([k,v])=>
    `<div class="legend-item"><div class="legend-dot" style="background:${v.bg}"></div><span class="legend-lbl">${k}</span></div>`
  ).join("");
}

/* ── view switch ── */
function setView(v){
  currentView=v;
  document.getElementById("btn-month").className="seg-btn"+(v==="month"?" active":"");
  document.getElementById("btn-week").className="seg-btn"+(v==="week"?" active":"");
  renderView();
}

function renderView(){
  updateProgress();
  currentView==="month" ? renderMonth() : renderWeek();
}

/* ── go today ── */
function goToday(){
  if(currentView==="month"){
    monthRef=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
  } else {
    weekRef=weekStart(TODAY);
  }
  renderView();
}

/* ── title toggle ── */
function toggleTitle(){
  showTitle=!showTitle;
  renderView();
}

/* ── card HTML ── */
function cardHtml(ev, onclickStr){
  const ct=cat(ev.category);
  const oc=onclickStr?`onclick="${onclickStr}"`:"";
  return `<div class="card" style="opacity:${ev.done?.55:1}" ${oc}>
    <div class="card-line" style="background:${ct.bg}"></div>
    <div class="card-body">
      <div class="card-top">
        <span class="cat-badge" style="background:${ct.light};color:${ct.text}">${esc(ev.category)}</span>
        <span class="time-tag">${esc(ev.startTime)}–${esc(ev.endTime)}</span>
      </div>
      <div class="card-title" style="${ev.done?"text-decoration:line-through;color:#AEAEB2":"color:#1C1C1E"}">${esc(ev.title)}</div>
      ${ev.instructor?`<div class="card-meta">👤 ${esc(ev.instructor)}${ev.location?"  📍 "+esc(ev.location):""}</div>`:""}
    </div>
    <button class="check-btn" style="background:${ev.done?"#34C759":"transparent"};border-color:${ev.done?"#34C759":"#D1D1D6"}"
      onclick="event.stopPropagation();toggleDone(${ev.id})">${ev.done?"✓":""}</button>
  </div>`;
}

/* ── MONTH ── */
function renderMonth(){
  const v=document.getElementById("view");
  v.style.overflowY="hidden";
  v.style.padding="0";
  const y=monthRef.getFullYear(), m=monthRef.getMonth();
  const total=daysInMonth(y,m), first=firstDayOfMonth(y,m);
  const cells=Array.from({length:first+total},(_,i)=>i<first?null:i-first+1);
  while(cells.length%7!==0) cells.push(null);

  /* header-cal: nav only */
  const isThisMonth=(y===TODAY.getFullYear()&&m===TODAY.getMonth());
  let hh=`<div class="cal-nav">
    <button class="nav-btn" onclick="monthPrev()">‹</button>
    <span class="nav-lbl">${y}년 ${MONTH_KR[m]}</span>
    <div style="display:flex;align-items:center;gap:5px">
      <button class="ibtn ibtn-gray" onclick="toggleTitle()" style="font-size:10px;width:auto;padding:0 7px;height:24px;border-radius:8px">${showTitle?"제목 숨김":"제목 표시"}</button>
      ${!isThisMonth?`<button class="ibtn ibtn-today" onclick="goToday()">오늘</button>`:""}
      <button class="nav-btn" onclick="monthNext()">›</button>
    </div>
  </div>`;
  document.getElementById("header-cal").innerHTML=hh;

  /* view: wrap > dow-row + grid */
  let h=`<div class="month-wrap"><div class="dow-row">`;
  DAY_KR.forEach((d,i)=>{ h+=`<div class="dow-cell" style="color:${i===0?"#FF6B6B":i===6?"#4D96FF":"#8E8E93"}">${d}</div>`; });
  h+=`</div><div class="month-grid">`;

  cells.forEach((day,ci)=>{
    if(!day){ h+=`<div class="month-cell" style="cursor:default"></div>`; return; }
    const ds=`${y}-${String(m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const isT=ds===todayStr, dow=ci%7, evs=getEvs(ds);
    h+=`<div class="month-cell" onclick="openDayPanel('${ds}')">
      <div class="month-num" style="background:${isT?"#FF6B6B":"transparent"};color:${isT?"#fff":dow===0?"#FF6B6B":dow===6?"#4D96FF":"#1C1C1E"}">${day}</div>`;
    evs.forEach(ev=>{
      const c=cat(ev.category);
      h+=`<div class="month-ev" style="background:${c.bg};opacity:${ev.done?.5:1}" onclick="event.stopPropagation();openDetail(${ev.id})">
        <span class="month-ev-time">${esc(ev.startTime)}${showTitle?" "+esc(ev.title):""}</span>
      </div>`;
    });
    h+=`</div>`;
  });
  h+=`</div></div>`;
  document.getElementById("view").innerHTML=h;
}
function monthPrev(){ monthRef=new Date(monthRef.getFullYear(),monthRef.getMonth()-1,1); renderView(); }
function monthNext(){ monthRef=new Date(monthRef.getFullYear(),monthRef.getMonth()+1,1); renderView(); }

/* ── WEEK ── */
function renderWeek(){
  const v=document.getElementById("view");
  v.style.overflowY="auto";
  v.style.padding="0";
  const days=Array.from({length:7},(_,i)=>addDays(weekRef,i));
  const isThisWeek=days.some(d=>fmt(d)===todayStr);

  /* header-cal */
  let hh=`<div class="cal-nav">
    <button class="nav-btn" onclick="weekPrev()">‹</button>
    <span class="nav-lbl">${days[0].getMonth()+1}/${days[0].getDate()} – ${days[6].getMonth()+1}/${days[6].getDate()}</span>
    <div style="display:flex;align-items:center;gap:5px">
      ${!isThisWeek?`<button class="ibtn ibtn-today" onclick="goToday()">오늘</button>`:""}
      <button class="nav-btn" onclick="weekNext()">›</button>
    </div>
  </div><div class="week-strip">`;
  days.forEach((d,i)=>{
    const ds=fmt(d), isT=ds===todayStr, hasEv=events.some(e=>e.date===ds);
    const dc=i===0?"#FF6B6B":i===6?"#4D96FF":"#8E8E93";
    hh+=`<div class="ws-day" onclick="openDayPanel('${ds}')">
      <span class="ws-dow" style="color:${dc}">${DAY_KR[d.getDay()]}</span>
      <div class="ws-num" style="background:${isT?"#FF6B6B":"transparent"};color:${isT?"#fff":i===0?"#FF6B6B":i===6?"#4D96FF":"#1C1C1E"}">${d.getDate()}</div>
      <div class="ws-dot" style="background:${hasEv?(isT?"#FF6B6B":"#C7C7CC"):"transparent"}"></div>
    </div>`;
  });
  hh+=`</div>`;
  document.getElementById("header-cal").innerHTML=hh;

  /* view */
  let h=`<div class="week-cards">`, hasAny=false;
  days.forEach(d=>{
    const ds=fmt(d), evs=getEvs(ds), isT=ds===todayStr;
    if(!evs.length) return;
    hasAny=true;
    h+=`<div><div class="day-hdr">
      <span class="day-hdr-date" style="color:${isT?"#FF6B6B":"#1C1C1E"}">${d.getMonth()+1}월 ${d.getDate()}일</span>
      <span class="day-hdr-sub">${DAY_KR[d.getDay()]}요일</span>
      ${isT?`<span class="today-badge">오늘</span>`:""}
    </div>${evs.map(ev=>cardHtml(ev,`openDetail(${ev.id})`)).join("")}</div>`;
  });
  if(!hasAny) h+=`<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">이 주에는 일정이 없어요</div></div>`;
  h+=`</div>`;
  document.getElementById("view").innerHTML=h;
}
function weekPrev(){ weekRef=addDays(weekRef,-7); renderView(); }
function weekNext(){ weekRef=addDays(weekRef,7); renderView(); }

/* ── TOGGLE / DELETE ── */
function toggleDone(id){
  events=events.map(e=>e.id===id?Object.assign({},e,{done:!e.done}):e);
  renderView();
  if(selectedId===id) refreshDetail();
  if(dayPanelDate) refreshDayPanel();
}
function deleteDone(id){ events=events.filter(e=>e.id!==id); renderView(); }

/* ── DETAIL ── */
function openDetail(id){ selectedId=id; refreshDetail(); document.getElementById("detail-overlay").classList.add("show"); }
function refreshDetail(){
  const ev=events.find(e=>e.id===selectedId); if(!ev) return;
  const ct=cat(ev.category);
  document.getElementById("detail-bar").style.background=ct.bg;
  const ce=document.getElementById("detail-cat");
  ce.textContent=ev.category; ce.style.background=ct.light; ce.style.color=ct.text;
  document.getElementById("detail-title").textContent=ev.title;
  document.getElementById("detail-rows").innerHTML=[
    ["🕐","시간",ev.startTime+" – "+ev.endTime],
    ["📚","모듈",ev.module||"-"],
    ["👤","강사",ev.instructor||"-"],
    ["📍","장소",ev.location||"-"],
    ["🚪","강의실",ev.room||"-"],
    ...(ev.note?[["📝","비고",ev.note]]:[]),
  ].map(([ic,lb,vl])=>
    `<div class="info-row"><span class="info-icon">${ic}</span><span class="info-lbl">${lb}</span><span class="info-val">${esc(vl)}</span></div>`
  ).join("");
  const btn=document.getElementById("detail-done-btn");
  btn.textContent=ev.done?"✓ 완료됨 (취소)":"완료 처리";
  btn.style.background=ev.done?"#E5E5EA":"#34C759";
  btn.style.color=ev.done?"#1C1C1E":"#fff";
}
function closeDetail(){ document.getElementById("detail-overlay").classList.remove("show"); selectedId=null; }
function toggleFromDetail(){ if(selectedId) toggleDone(selectedId); }
function deleteFromDetail(){ if(selectedId){ deleteDone(selectedId); closeDetail(); } }

/* ── DAY PANEL ── */
function openDayPanel(ds){ dayPanelDate=ds; refreshDayPanel(); document.getElementById("day-overlay").classList.add("show"); }
function refreshDayPanel(){
  const ds=dayPanelDate, d=new Date(ds), dow=d.getDay(), p=ds.split("-");
  document.getElementById("day-panel-title").innerHTML=
    `${+p[1]}월 ${+p[2]}일 <span style="color:#8E8E93;font-weight:500;font-size:15px">${DAY_KR[dow]}요일</span>`;
  const evs=getEvs(ds);
  document.getElementById("day-panel-cards").innerHTML=evs.length
    ? evs.map(ev=>cardHtml(ev,`closeDayPanel();setTimeout(function(){openDetail(${ev.id})},80)`)).join("")
    : `<div style="text-align:center;padding:28px 0;color:#8E8E93;font-size:13px">일정이 없어요</div>`;
}
function closeDayPanel(){ document.getElementById("day-overlay").classList.remove("show"); dayPanelDate=null; }
function dayPanelAdd(){ const ds=dayPanelDate; closeDayPanel(); setTimeout(()=>openAdd(ds),80); }

/* ── ADD ── */
function openAdd(dateStr){
  addCat="기타";
  document.getElementById("f-date").value=dateStr||todayStr;
  document.getElementById("f-title").value="";
  document.getElementById("f-start").value="09:00";
  document.getElementById("f-end").value="10:00";
  document.getElementById("f-instructor").value="";
  document.getElementById("f-location").value="";
  document.getElementById("f-note").value="";
  renderCatPick();
  document.getElementById("add-overlay").classList.add("show");
}
function renderCatPick(){
  document.getElementById("cat-pick").innerHTML=Object.entries(CAT).map(([k,v])=>{
    const sel=addCat===k;
    return `<button class="cpbtn" style="background:${sel?v.bg:v.light};color:${sel?"#fff":v.text};border:2px solid ${sel?v.bg:"transparent"}" onclick="pickCat('${k}')">${k}</button>`;
  }).join("");
}
function pickCat(c){ addCat=c; renderCatPick(); }
function closeAdd(){ document.getElementById("add-overlay").classList.remove("show"); }
function submitAdd(){
  const title=document.getElementById("f-title").value.trim(); if(!title) return;
  events.push({ id:nextId++, done:false,
    date:document.getElementById("f-date").value,
    startTime:document.getElementById("f-start").value,
    endTime:document.getElementById("f-end").value,
    title, category:addCat,
    instructor:document.getElementById("f-instructor").value,
    location:document.getElementById("f-location").value,
    note:document.getElementById("f-note").value,
    module:"", room:"" });
  closeAdd(); renderView();
}

document.getElementById("plus-btn").onclick=()=>openAdd();

/* ── init ── */
renderLegend();
// Wait for layout then render (so clientHeight is accurate)
requestAnimationFrame(()=>{ requestAnimationFrame(renderView); });
window.addEventListener("resize", renderView);
</script>
</body>
</html>
