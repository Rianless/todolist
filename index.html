<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>캘린더 앱</title>

  <!-- React CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel (JSX 변환) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const CATEGORY_COLORS = {
      "밀착상담": { bg:"#FF6B6B", light:"#FFE8E8", text:"#C0392B" },
      "자신감회복": { bg:"#FFD93D", light:"#FFF9E0", text:"#B8860B" },
      "취업역량강화": { bg:"#6BCB77", light:"#E8F8EA", text:"#1E7E34" },
      "진로탐색": { bg:"#4D96FF", light:"#E3EEFF", text:"#1A5DB8" },
      "지역맞춤형": { bg:"#FF6FC8", light:"#FFE3F3", text:"#B5006C" },
      "사례관리": { bg:"#A66CFF", light:"#EFE3FF", text:"#6A0DAD" },
      "자율활동": { bg:"#94A3B8", light:"#F1F5F9", text:"#475569" },
      "개인": { bg:"#F97316", light:"#FFF0E6", text:"#C2410C" },
      "기타": { bg:"#64748B", light:"#F1F5F9", text:"#334155" },
    };

    const INITIAL_EVENTS = [
      { id:1, date:"2026-04-01", startTime:"13:00", endTime:"15:00", title:"OT", category:"자신감회복", done:false },
      { id:2, date:"2026-04-02", startTime:"12:30", endTime:"17:30", title:"기업탐방", category:"진로탐색", done:false }
    ];

    function App(){
      const [events,setEvents] = useState(INITIAL_EVENTS);

      const toggle = id=>{
        setEvents(prev=>prev.map(e=>e.id===id?{...e,done:!e.done}:e));
      };

      return (
        <div style={{padding:20,fontFamily:"sans-serif"}}>
          <h2>📅 일정</h2>

          {events.map(ev=>{
            const cat = CATEGORY_COLORS[ev.category];
            return (
              <div key={ev.id}
                style={{
                  padding:10,
                  marginBottom:10,
                  borderRadius:10,
                  background:"#fff",
                  boxShadow:"0 2px 5px rgba(0,0,0,0.1)"
                }}>
                
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <div>
                    <div style={{
                      fontSize:12,
                      background:cat.light,
                      color:cat.text,
                      display:"inline-block",
                      padding:"2px 6px",
                      borderRadius:6
                    }}>
                      {ev.category}
                    </div>

                    <div style={{
                      fontWeight:"bold",
                      textDecoration:ev.done?"line-through":"none"
                    }}>
                      {ev.title}
                    </div>

                    <div style={{fontSize:12,color:"#888"}}>
                      {ev.startTime} ~ {ev.endTime}
                    </div>
                  </div>

                  <button onClick={()=>toggle(ev.id)}>
                    {ev.done?"✔":"○"}
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
