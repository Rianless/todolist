<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>1회차 프로그램</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="To Do List">
<meta name="theme-color" content="#F2F2F7">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%; overflow: hidden;
  font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  background: #F2F2F7;
  -webkit-font-smoothing: antialiased;
}
#app { max-width: 430px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; }

/* ── HEADER ── */
#header {
  background: rgba(242,242,247,0.94);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  padding: 14px 16px 0;
  flex-shrink: 0;
  border-bottom: 0.5px solid rgba(0,0,0,0.1);
}
.hdr-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.hdr-ttl { font-size: 28px; font-weight: 700; color: #1C1C1E; letter-spacing: -0.5px; }
.hdr-right { display: flex; align-items: center; gap: 8px; }

/* progress pill */
.prog-wrap {
  display: flex; align-items: center; gap: 6px;
  background: #fff; padding: 5px 10px 5px 8px;
  border-radius: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
.prog-ring { position: relative; width: 20px; height: 20px; flex-shrink: 0; }
.prog-ring svg { transform: rotate(-90deg); }
.prog-ring-bg { fill: none; stroke: #E5E5EA; stroke-width: 2.5; }
.prog-ring-fill {
  fill: none; stroke: #34C759; stroke-width: 2.5; stroke-linecap: round;
  transition: stroke-dashoffset .5s cubic-bezier(.4,0,.2,1);
}
.prog-lbl { font-size: 12px; font-weight: 600; color: #34C759; }

/* icon buttons */
.ibtn {
  width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: transform .1s, opacity .15s;
}
.ibtn:active { transform: scale(.9); opacity: .6; }
.ibtn-dark { background: #1C1C1E; color: #fff; font-size: 20px; font-weight: 300; }
.ibtn-gray { background: #E5E5EA; color: #636366; font-size: 14px; font-weight: 600; }
.ibtn-refresh { background: #E5E5EA; color: #636366; font-size: 16px; }
.ibtn-today {
  background: #FF3B30; color: #fff; font-size: 10px; font-weight: 700;
  width: auto; padding: 0 9px; border-radius: 10px; height: 28px;
}

/* seg control */
.seg {
  display: flex; background: rgba(118,118,128,.12);
  border-radius: 10px; padding: 2px; margin-bottom: 12px;
}
.seg-btn {
  flex: 1; padding: 7px 0; border-radius: 8px; border: none;
  background: transparent; font-size: 13px; font-weight: 500; color: #3C3C43;
  cursor: pointer; transition: all .2s;
}
.seg-btn.active {
  background: #fff; color: #1C1C1E; font-weight: 600;
  box-shadow: 0 1px 0 rgba(0,0,0,.04), 0 2px 6px rgba(0,0,0,.1);
}

/* cal nav */
.cal-nav { display: flex; align-items: center; padding: 2px 0 8px; }
.nav-btn {
  background: none; border: none; cursor: pointer; padding: 4px 8px;
  color: #007AFF; font-size: 18px; line-height: 1;
  border-radius: 8px; transition: background .15s;
}
.nav-btn:active { background: rgba(0,122,255,.1); }
.nav-lbl { font-size: 15px; font-weight: 600; color: #1C1C1E; letter-spacing: -.3px; }

/* dow row */
.dow-row {
  display: grid; grid-template-columns: repeat(7,1fr);
  padding: 4px 0; border-bottom: 0.5px solid rgba(0,0,0,.07);
}
.dow-cell { text-align: center; font-size: 11px; font-weight: 600; padding: 4px 0; color: #8E8E93; }

/* week strip */
.week-strip {
  display: grid; grid-template-columns: repeat(7,1fr);
  padding: 6px 0 8px; border-top: 0.5px solid rgba(0,0,0,.06);
}
.ws-day { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 2px 0; }
.ws-dow { font-size: 11px; font-weight: 500; }
.ws-num {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 500; transition: all .15s;
}
.ws-dot { width: 4px; height: 4px; border-radius: 50%; }

/* ── MONTH GRID ── */
#view { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.month-wrap {
  flex: 1; margin: 8px 12px 12px;
  background: #fff; border-radius: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
  overflow: hidden; display: flex; flex-direction: column; max-height: 68vh;
}
.month-grid { display: grid; grid-template-columns: repeat(7,1fr); flex: 1; overflow: hidden; }
.month-cell {
  border-bottom: 0.5px solid #F2F2F7; border-right: 0.5px solid #F2F2F7;
  padding: 4px 3px 3px; cursor: pointer; overflow: hidden;
  display: flex; flex-direction: column; transition: background .12s;
}
.month-cell:active { background: #F2F2F7; }
.month-cell:nth-child(7n) { border-right: none; }
.month-num {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 500;
  flex-shrink: 0; margin-bottom: 2px; align-self: flex-start;
}
.month-ev {
  border-radius: 4px; padding: 1px 4px; margin-bottom: 1px;
  overflow: hidden; cursor: pointer; flex-shrink: 0; width: 100%;
}
.month-ev-time { font-size: 8px; font-weight: 600; color: #fff; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.month-ev-title { font-size: 8px; color: rgba(255,255,255,.9); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }

/* ── WEEK CARDS ── */
.week-cards { padding: 12px 12px 48px; display: flex; flex-direction: column; }
.day-hdr { display: flex; align-items: center; gap: 7px; margin-bottom: 10px; padding: 0 2px; }
.day-hdr-date { font-size: 20px; font-weight: 700; letter-spacing: -.5px; }
.day-hdr-dow { font-size: 15px; color: #8E8E93; font-weight: 400; }
.today-pill { font-size: 11px; font-weight: 600; background: #FF3B30; color: #fff; padding: 2px 8px; border-radius: 10px; }
.add-day-btn {
  margin-left: auto; background: transparent; border: none;
  font-size: 14px; font-weight: 500; color: #007AFF; cursor: pointer;
  padding: 4px 2px;
}

/* cards */
.card {
  background: #fff; border-radius: 14px;
  display: flex; align-items: stretch; overflow: hidden;
  box-shadow: 0 1px 0 rgba(0,0,0,.04), 0 2px 8px rgba(0,0,0,.06);
  cursor: pointer; margin-bottom: 8px;
  transition: transform .12s, box-shadow .12s;
}
.card:active { transform: scale(.984); box-shadow: 0 1px 4px rgba(0,0,0,.07); }
.card-accent { width: 4px; flex-shrink: 0; }
.card-body { flex: 1; padding: 11px 10px 11px 13px; min-width: 0; }
.card-top { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.cat-pill { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 8px; white-space: nowrap; }
.time-lbl { font-size: 11px; color: #8E8E93; font-weight: 500; margin-left: auto; flex-shrink: 0; }
.card-title { font-size: 14px; font-weight: 600; line-height: 1.35; margin-bottom: 3px; color: #1C1C1E; }
.card-title.done { text-decoration: line-through; color: #AEAEB2; }
.card-meta { font-size: 11px; color: #8E8E93; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.check-wrap { display: flex; align-items: center; padding-right: 14px; }
.check-btn {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid #C7C7CC; background: transparent;
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: #fff;
  transition: all .2s cubic-bezier(.34,1.56,.64,1);
}
.check-btn.checked { background: #34C759; border-color: #34C759; transform: scale(1.08); }

.empty { text-align: center; padding: 52px 0 32px; }
.empty-icon { font-size: 44px; margin-bottom: 10px; }
.empty-text { color: #C7C7CC; font-size: 14px; font-weight: 500; }

/* ── OVERLAYS ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.38);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  z-index: 100; display: none; align-items: flex-end;
}
.overlay.show { display: flex; }
.sheet {
  background: #F2F2F7; border-radius: 22px 22px 0 0;
  width: 100%; max-height: 90vh; overflow-y: auto;
  padding-bottom: 34px;
  touch-action: pan-y;
  transition: transform 0.3s cubic-bezier(.32,0,.67,0);
  will-change: transform;
}
.handle {
  width: 36px; height: 5px; background: rgba(0,0,0,.16);
  border-radius: 3px; margin: 10px auto 0;
  cursor: grab;
}

/* detail */
.detail-bar { height: 5px; border-radius: 0; }
.sheet-cat-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px 6px; }
.detail-title { font-size: 20px; font-weight: 700; color: #1C1C1E; line-height: 1.3; letter-spacing: -.3px; padding: 4px 16px 16px; }
.info-group { background: #fff; border-radius: 14px; margin: 0 16px 10px; overflow: hidden; }
.info-row { display: flex; align-items: flex-start; padding: 11px 14px; gap: 10px; border-bottom: 0.5px solid #F2F2F7; }
.info-row:last-child { border-bottom: none; }
.info-icon { font-size: 15px; width: 20px; flex-shrink: 0; margin-top: 1px; }
.info-lbl { font-size: 13px; color: #8E8E93; width: 46px; flex-shrink: 0; font-weight: 500; padding-top: 1px; }
.info-val { font-size: 14px; color: #1C1C1E; font-weight: 400; flex: 1; line-height: 1.4; }
.act-row { display: flex; gap: 8px; padding: 4px 16px 0; }
.act-btn {
  flex: 1; padding: 14px; border-radius: 14px; border: none;
  font-size: 15px; font-weight: 600; cursor: pointer;
  transition: opacity .15s;
}
.act-btn:active { opacity: .75; }

/* detail action row with 3 buttons */
.act-row-3 { display: flex; gap: 8px; padding: 4px 16px 0; }
.act-btn-sm {
  flex: 1; padding: 14px 8px; border-radius: 14px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: opacity .15s;
}
.act-btn-sm:active { opacity: .75; }

/* day panel */
.day-panel-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px 10px; }
.day-panel-title { font-size: 20px; font-weight: 700; color: #1C1C1E; }
.day-panel-cards { padding: 0 12px; }

/* close */
.close-btn {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(0,0,0,.08); border: none; cursor: pointer;
  font-size: 12px; color: #636366; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.close-btn:active { background: rgba(0,0,0,.15); }

/* add / edit sheet */
.add-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px 10px; }
.add-head-title { font-size: 17px; font-weight: 600; color: #1C1C1E; }
.fm-group { background: #fff; border-radius: 14px; margin: 0 16px 12px; overflow: hidden; }
.fm-row-in { display: flex; align-items: center; padding: 12px 14px; gap: 10px; border-bottom: 0.5px solid #F2F2F7; }
.fm-row-in:last-child { border-bottom: none; }
.fm-lbl-in { font-size: 14px; font-weight: 500; color: #1C1C1E; width: 44px; flex-shrink: 0; }
.fm-in { flex: 1; border: none; background: transparent; font-size: 14px; color: #8E8E93; outline: none; font-family: inherit; text-align: right; }
.fm-in::placeholder { color: #C7C7CC; }
.fm-in:focus { color: #1C1C1E; }
.fm-sec-lbl { font-size: 12px; font-weight: 500; color: #8E8E93; padding: 0 16px 6px; text-transform: uppercase; letter-spacing: .5px; }
.cat-pick { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 16px 14px; }
.cpbtn { font-size: 11px; font-weight: 600; padding: 6px 11px; border-radius: 10px; cursor: pointer; border: none; transition: transform .1s; }
.cpbtn:active { transform: scale(.93); }
.submit-btn {
  width: calc(100% - 32px); margin: 0 16px;
  padding: 15px; border-radius: 14px; border: none;
  background: #007AFF; color: #fff; font-size: 16px; font-weight: 600;
  cursor: pointer; transition: opacity .15s;
}
.submit-btn:active { opacity: .8; }

/* ── SETTINGS ── */
.settings-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px 10px; }
.settings-title { font-size: 17px; font-weight: 600; color: #1C1C1E; }
.cat-row {
  display: flex; align-items: center; padding: 11px 14px; gap: 12px;
  border-bottom: 0.5px solid #F2F2F7; background: #fff;
}
.cat-row:last-child { border-bottom: none; }
.cat-color-dot {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  cursor: pointer; border: 2.5px solid rgba(0,0,0,.08);
  transition: transform .15s;
  position: relative; overflow: hidden;
}
.cat-color-dot:active { transform: scale(.9); }
.cat-color-dot input[type=color] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.cat-name-in {
  flex: 1; border: none; background: transparent;
  font-size: 14px; font-weight: 500; color: #1C1C1E;
  outline: none; font-family: inherit;
}
.cat-del-btn {
  width: 22px; height: 22px; border-radius: 50%;
  background: #FF3B30; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 13px; font-weight: 700; flex-shrink: 0;
  transition: transform .1s, opacity .1s;
}
.cat-del-btn:active { transform: scale(.88); }
.cat-del-btn:disabled { background: #E5E5EA; color: #C7C7CC; cursor: default; }
.add-cat-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; background: #fff;
  border: none; cursor: pointer; width: 100%;
  font-size: 14px; font-weight: 500; color: #007AFF;
  transition: opacity .15s;
}
.add-cat-btn:active { opacity: .6; }
.add-cat-icon {
  width: 28px; height: 28px; border-radius: 50%;
  background: #34C759; display: flex; align-items: center;
  justify-content: center; color: #fff; font-size: 18px; font-weight: 300; flex-shrink: 0;
}
.color-presets { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 16px 14px; }
.color-preset {
  width: 30px; height: 30px; border-radius: 50%; border: none; cursor: pointer;
  transition: transform .12s; flex-shrink: 0;
}
.color-preset:active { transform: scale(.88); }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="hdr-top">
      <span class="hdr-ttl">일정</span>
      <div class="hdr-right">
        <div class="prog-wrap">
          <div class="prog-ring">
            <svg viewBox="0 0 20 20" width="20" height="20">
              <circle class="prog-ring-bg" cx="10" cy="10" r="7"/>
              <circle class="prog-ring-fill" id="prog-ring-fill" cx="10" cy="10" r="7"
                stroke-dasharray="43.98" stroke-dashoffset="43.98"/>
            </svg>
          </div>
          <span class="prog-lbl" id="prog-lbl">0/12</span>
        </div>
        <button class="ibtn ibtn-refresh" onclick="location.reload()" title="새로고침">↺</button>
        <button class="ibtn ibtn-gray" onclick="openSettings()" title="설정" style="font-size:15px">⚙︎</button>
        <button class="ibtn ibtn-dark" id="plus-btn" title="일정 추가">＋</button>
      </div>
    </div>
    <div class="seg">
      <button class="seg-btn active" id="btn-month" onclick="setView('month')">월간</button>
      <button class="seg-btn" id="btn-week" onclick="setView('week')">주간</button>
    </div>
    <div id="header-cal"></div>
  </div>
  <div id="view"></div>
</div>

<!-- Detail -->
<div class="overlay" id="detail-overlay" onclick="closeDetail()">
  <div class="sheet" id="detail-sheet" onclick="event.stopPropagation()">
    <div class="detail-bar" id="detail-bar"></div>
    <div class="handle"></div>
    <div class="sheet-cat-row">
      <span class="cat-pill" id="detail-cat"></span>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-title" id="detail-title"></div>
    <div class="info-group" id="detail-rows"></div>
    <div class="act-row-3">
      <button class="act-btn-sm" id="detail-done-btn" onclick="toggleFromDetail()"></button>
      <button class="act-btn-sm" style="background:#E3EEFF;color:#007AFF" onclick="openEditFromDetail()">수정</button>
      <button class="act-btn-sm" style="background:#FFE5E5;color:#FF3B30" onclick="deleteFromDetail()">삭제</button>
    </div>
  </div>
</div>

<!-- Day Panel -->
<div class="overlay" id="day-overlay" onclick="closeDayPanel()">
  <div class="sheet" id="day-sheet" onclick="event.stopPropagation()">
    <div class="handle"></div>
    <div class="day-panel-head">
      <span class="day-panel-title" id="day-panel-title"></span>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="ibtn ibtn-dark" onclick="dayPanelAdd()" style="font-size:18px">＋</button>
        <button class="close-btn" onclick="closeDayPanel()">✕</button>
      </div>
    </div>
    <div style="height:.5px;background:rgba(0,0,0,.08);margin:0 16px 10px"></div>
    <div class="day-panel-cards" id="day-panel-cards"></div>
  </div>
</div>

<!-- Settings -->
<div class="overlay" id="settings-overlay" onclick="closeSettings()">
  <div class="sheet" id="settings-sheet" onclick="event.stopPropagation()">
    <div class="handle"></div>
    <div class="settings-head">
      <span class="settings-title">카테고리 설정</span>
      <button class="close-btn" onclick="closeSettings()">✕</button>
    </div>
    <div style="height:.5px;background:rgba(0,0,0,.08);margin:0 16px 12px"></div>
    <div class="fm-sec-lbl" style="margin-bottom:4px">카테고리 목록</div>
    <div class="info-group" id="cat-list" style="margin-bottom:0;border-radius:14px 14px 0 0"></div>
    <div style="background:#fff;border-radius:0 0 14px 14px;margin:0 16px 16px;border-top:.5px solid #F2F2F7">
      <button class="add-cat-btn" onclick="addNewCat()">
        <div class="add-cat-icon">＋</div>
        새 카테고리 추가
      </button>
    </div>
    <div class="fm-sec-lbl" style="margin-bottom:4px">색상 팔레트</div>
    <div class="color-presets" id="color-presets"></div>
    <div style="height:8px"></div>
  </div>
</div>

<!-- Add / Edit -->
<div class="overlay" id="add-overlay" onclick="closeAdd()">
  <div class="sheet" id="add-sheet" onclick="event.stopPropagation()">
    <div class="handle"></div>
    <div class="add-head">
      <span class="add-head-title" id="add-head-title">새 일정</span>
      <button class="close-btn" onclick="closeAdd()">✕</button>
    </div>
    <div class="fm-group">
      <div class="fm-row-in"><span class="fm-lbl-in">날짜</span><input class="fm-in" type="date" id="f-date"></div>
      <div class="fm-row-in"><span class="fm-lbl-in">제목</span><input class="fm-in" type="text" id="f-title" placeholder="제목 입력"></div>
      <div class="fm-row-in"><span class="fm-lbl-in">시작</span><input class="fm-in" type="time" id="f-start" value="09:00"></div>
      <div class="fm-row-in"><span class="fm-lbl-in">종료</span><input class="fm-in" type="time" id="f-end" value="10:00"></div>
      <div class="fm-row-in"><span class="fm-lbl-in">모듈</span><input class="fm-in" type="text" id="f-module" placeholder="모듈명"></div>
      <div class="fm-row-in"><span class="fm-lbl-in">강사</span><input class="fm-in" type="text" id="f-instructor" placeholder="이름"></div>
      <div class="fm-row-in"><span class="fm-lbl-in">장소</span><input class="fm-in" type="text" id="f-location" placeholder="장소"></div>
      <div class="fm-row-in"><span class="fm-lbl-in">강의실</span><input class="fm-in" type="text" id="f-room" placeholder="강의실"></div>
      <div class="fm-row-in"><span class="fm-lbl-in">비고</span><input class="fm-in" type="text" id="f-note" placeholder="비고"></div>
    </div>
    <div class="fm-sec-lbl">카테고리</div>
    <div class="cat-pick" id="cat-pick"></div>
    <button class="submit-btn" id="submit-btn" onclick="submitAdd()">추가</button>
  </div>
</div>

<script>
let CAT = {
  "밀착상담":    { bg:"#FF6B6B", light:"#FFE8E8", text:"#C0392B" },
  "자신감회복":  { bg:"#FFD93D", light:"#FFF9E0", text:"#B8860B" },
  "취업역량강화":{ bg:"#34C759", light:"#E3F9EA", text:"#1A7A35" },
  "진로탐색":    { bg:"#007AFF", light:"#E3EEFF", text:"#0055CC" },

function getToday(){ return new Date(); }
function getTodayStr(){ return fmtLocal(getToday()); }
let currentView="month", weekRef=weekStart(new Date("2026-04-01")), monthRef=new Date(2026,3,1);
let nextId=100, selectedId=null, dayPanelDate=null, addCat="기타", showTitle=false, selectedWeekDay="2026-04-01";
let editingId=null; // null = 새 일정, id = 수정 중

function fmtLocal(d){ const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),day=String(d.getDate()).padStart(2,"0"); return `${y}-${m}-${day}`; }
function fmt(d){ return fmtLocal(d); }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function weekStart(d){ const r=new Date(d); r.setDate(r.getDate()-r.getDay()); return r; }
function daysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
function firstDayOfMonth(y,m){ return new Date(y,m,1).getDay(); }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function getEvs(ds){ return events.filter(e=>e.date===ds).sort((a,b)=>a.startTime.localeCompare(b.startTime)); }
function cat(k){ return CAT[k]||CAT["기타"]; }

function updateProgress(){
  const done=events.filter(e=>e.done).length, total=events.length;
  document.getElementById("prog-lbl").textContent=done+"/"+total;
  const r=7, circ=2*Math.PI*r, pct=total?done/total:0;
  document.getElementById("prog-ring-fill").style.strokeDashoffset=circ*(1-pct);
}

function setView(v){
  currentView=v;
  if(v==="week"){ const t=getToday(); weekRef=weekStart(t); selectedWeekDay=getTodayStr(); }
  document.getElementById("btn-month").className="seg-btn"+(v==="month"?" active":"");
  document.getElementById("btn-week").className="seg-btn"+(v==="week"?" active":"");
  renderView();
}
function renderView(){ updateProgress(); currentView==="month"?renderMonth():renderWeek(); }

function goToday(){
  const t=getToday();
  if(currentView==="month"){ monthRef=new Date(t.getFullYear(),t.getMonth(),1); }
  else { weekRef=weekStart(t); selectedWeekDay=getTodayStr(); }
  renderView();
}
function toggleTitle(){ showTitle=!showTitle; renderView(); }

function cardHtml(ev, onclickStr){
  const ct=cat(ev.category), oc=onclickStr?`onclick="${onclickStr}"`:"";
  return `<div class="card" style="opacity:${ev.done?.5:1}" ${oc}>
    <div class="card-accent" style="background:${ct.bg}"></div>
    <div class="card-body">
      <div class="card-top">
        <span class="cat-pill" style="background:${ct.light};color:${ct.text}">${esc(ev.category)}</span>
        <span class="time-lbl">${esc(ev.startTime)}–${esc(ev.endTime)}</span>
      </div>
      <div class="card-title${ev.done?" done":""}">${esc(ev.title)}</div>
      ${ev.instructor?`<div class="card-meta">👤 ${esc(ev.instructor)}${ev.location?"  📍 "+esc(ev.location):""}</div>`:""}
    </div>
    <div class="check-wrap">
      <button class="check-btn${ev.done?" checked":""}" onclick="event.stopPropagation();toggleDone(${ev.id})">${ev.done?"✓":""}</button>

}

/* MONTH */
function renderMonth(){
  const v=document.getElementById("view"); v.style.overflowY="hidden"; v.style.padding="0";
  const y=monthRef.getFullYear(), m=monthRef.getMonth();
  const total=daysInMonth(y,m), first=firstDayOfMonth(y,m);
  const cells=Array.from({length:first+total},(_,i)=>i<first?null:i-first+1);
  while(cells.length%7!==0) cells.push(null);
  const todayStr=getTodayStr(), isThisMonth=(new Date().getFullYear()===y&&new Date().getMonth()===m);

  document.getElementById("header-cal").innerHTML=`<div class="cal-nav">
    <button class="nav-btn" onclick="monthPrev()">‹</button>
    <div style="display:flex;flex:1;align-items:center;justify-content:center;position:relative">
      <span class="nav-lbl">${y}년 ${MONTH_KR[m]}</span>
      <div style="position:absolute;right:0;display:flex;align-items:center;gap:5px">
        <button class="ibtn ibtn-gray" onclick="toggleTitle()" style="font-size:10px;width:auto;padding:0 8px;height:26px;border-radius:10px">${showTitle?"숨김":"제목"}</button>
        ${!isThisMonth?`<button class="ibtn ibtn-today" onclick="goToday()">오늘</button>`:""}
      </div>
    </div>
    <button class="nav-btn" onclick="monthNext()">›</button>
  </div>`;

  let h=`<div class="month-wrap"><div class="dow-row">`;
  DAY_KR.forEach((d,i)=>{ h+=`<div class="dow-cell" style="color:${i===0?"#FF3B30":i===6?"#007AFF":"#8E8E93"}">${d}</div>`; });
  h+=`</div><div class="month-grid">`;
  cells.forEach((day,ci)=>{
    if(!day){ h+=`<div class="month-cell" style="cursor:default;background:#FAFAFA"></div>`; return; }
    const ds=`${y}-${String(m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const isT=ds===todayStr, dow=ci%7, evs=getEvs(ds);
    h+=`<div class="month-cell" onclick="openDayPanel('${ds}')">
      <div class="month-num" style="background:${isT?"#FF3B30":"transparent"};color:${isT?"#fff":dow===0?"#FF3B30":dow===6?"#007AFF":"#1C1C1E"};font-weight:${isT?"700":"500"}">${day}</div>`;
    evs.forEach(ev=>{
      const c=cat(ev.category);
      h+=`<div class="month-ev" style="background:${c.bg};opacity:${ev.done?.45:1}" onclick="event.stopPropagation();openDetail(${ev.id})">
        <span class="month-ev-time">${esc(ev.startTime)}</span>${showTitle?`<span class="month-ev-title">${esc(ev.title)}</span>`:""}
      </div>`;
    });
    h+=`</div>`;
  });
  h+=`</div></div>`;
  document.getElementById("view").innerHTML=h;
}
function monthPrev(){ monthRef=new Date(monthRef.getFullYear(),monthRef.getMonth()-1,1); renderView(); }
function monthNext(){ monthRef=new Date(monthRef.getFullYear(),monthRef.getMonth()+1,1); renderView(); }

/* WEEK */
function renderWeek(){
  const todayStr=getTodayStr();
  const v=document.getElementById("view"); v.style.overflowY="auto"; v.style.padding="0";
  const days=Array.from({length:7},(_,i)=>addDays(weekRef,i));
  const isThisWeek=days.some(d=>fmt(d)===todayStr);
  if(!days.some(d=>fmt(d)===selectedWeekDay)){
    const withEv=days.find(d=>events.some(e=>e.date===fmt(d)));
    selectedWeekDay=isThisWeek?todayStr:(withEv?fmt(withEv):fmt(days[0]));
  }

  let hh=`<div class="cal-nav">
    <button class="nav-btn" onclick="weekPrev()">‹</button>
    <div style="display:flex;flex:1;align-items:center;justify-content:center;position:relative">
      <span class="nav-lbl">${days[0].getMonth()+1}/${days[0].getDate()} – ${days[6].getMonth()+1}/${days[6].getDate()}</span>
      <div style="position:absolute;right:0">
        ${!isThisWeek?`<button class="ibtn ibtn-today" onclick="goToday()">오늘</button>`:""}
      </div>
    </div>
    <button class="nav-btn" onclick="weekNext()">›</button>
  </div><div class="week-strip">`;
  days.forEach((d,i)=>{
    const ds=fmt(d), isT=ds===todayStr, isSel=ds===selectedWeekDay;
    const hasEv=events.some(e=>e.date===ds);
    const dc=i===0?"#FF3B30":i===6?"#007AFF":"#8E8E93";
    const numBg=isT?"#FF3B30":isSel?"#1C1C1E":"transparent";
    const numCol=isT||isSel?"#fff":i===0?"#FF3B30":i===6?"#007AFF":"#1C1C1E";
    hh+=`<div class="ws-day" onclick="selectWeekDay('${ds}')">
      <span class="ws-dow" style="color:${isSel&&!isT?"#1C1C1E":dc};font-weight:${isSel?"600":"500"}">${DAY_KR[d.getDay()]}</span>
      <div class="ws-num" style="background:${numBg};color:${numCol}">${d.getDate()}</div>
      <div class="ws-dot" style="background:${hasEv?(isT?"#FF3B30":"#C7C7CC"):"transparent"}"></div>
    </div>`;
  });
  hh+=`</div>`;
  document.getElementById("header-cal").innerHTML=hh;

  const selD=days.find(d=>fmt(d)===selectedWeekDay)||days[0];
  const selDs=fmt(selD), selEvs=getEvs(selDs), isSelT=selDs===todayStr;
  let h=`<div class="week-cards">
    <div class="day-hdr">
      <span class="day-hdr-date" style="color:${isSelT?"#FF3B30":"#1C1C1E"}">${selD.getMonth()+1}월 ${selD.getDate()}일</span>
      <span class="day-hdr-dow">${DAY_KR[selD.getDay()]}요일</span>
      ${isSelT?`<span class="today-pill">오늘</span>`:""}
      <button class="add-day-btn" onclick="openAdd('${selDs}')">+ 추가</button>
    </div>`;
  h+=selEvs.length
    ? selEvs.map(ev=>cardHtml(ev,`openDetail(${ev.id})`)).join("")
    : `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">일정이 없어요</div></div>`;
  h+=`</div>`;
  document.getElementById("view").innerHTML=h;
}
function selectWeekDay(ds){ selectedWeekDay=ds; renderWeek(); }
function weekPrev(){ weekRef=addDays(weekRef,-7); renderView(); }
function weekNext(){ weekRef=addDays(weekRef,7); renderView(); }

/* ── SWIPE TO CLOSE ── */
function setupSwipe(overlayId, sheetId, closeFn){
  const overlay=document.getElementById(overlayId);
  const sheet=document.getElementById(sheetId);
  let startY=0, currentY=0, dragging=false;

  function onStart(e){
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    startY=clientY; currentY=0; dragging=true;
    sheet.style.transition="none";
  }
  function onMove(e){
    if(!dragging) return;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    const dy=clientY-startY;
    if(dy<0) return; // 위로는 안됨
    currentY=dy;
    sheet.style.transform=`translateY(${dy}px)`;
  }
  function onEnd(){
    if(!dragging) return;
    dragging=false;
    sheet.style.transition="";
    if(currentY>120){
      sheet.style.transform=`translateY(100%)`;
      setTimeout(()=>{ sheet.style.transform=""; closeFn(); }, 280);
    } else {
      sheet.style.transform="";
    }
  }

  sheet.addEventListener("touchstart", onStart, {passive:true});
  sheet.addEventListener("touchmove", onMove, {passive:true});
  sheet.addEventListener("touchend", onEnd);
}

setupSwipe("detail-overlay","detail-sheet", closeDetail);
setupSwipe("day-overlay","day-sheet", closeDayPanel);
setupSwipe("settings-overlay","settings-sheet", closeSettings);
setupSwipe("add-overlay","add-sheet", closeAdd);

/* ── SETTINGS ── */
const PALETTE = [
  "#FF3B30","#FF6B6B","#FF9500","#FFD93D","#34C759","#30D158",
  "#007AFF","#4D96FF","#5856D6","#AF52DE","#FF2D55","#FF6FC8",
  "#8E8E93","#636366","#1C1C1E","#00C7BE","#32ADE6","#BF5AF2"
];

function hexToRgb(hex){ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return {r,g,b}; }
function lightenHex(hex, amt=0.85){
  const {r,g,b}=hexToRgb(hex);
  const lr=Math.round(r+(255-r)*amt), lg=Math.round(g+(255-g)*amt), lb=Math.round(b+(255-b)*amt);
  return `#${lr.toString(16).padStart(2,"0")}${lg.toString(16).padStart(2,"0")}${lb.toString(16).padStart(2,"0")}`;
}
function darkenHex(hex, amt=0.3){
  const {r,g,b}=hexToRgb(hex);
  const dr=Math.round(r*(1-amt)), dg=Math.round(g*(1-amt)), db=Math.round(b*(1-amt));
  return `#${dr.toString(16).padStart(2,"0")}${dg.toString(16).padStart(2,"0")}${db.toString(16).padStart(2,"0")}`;
}
function makeCatColors(bg){ return { bg, light: lightenHex(bg), text: darkenHex(bg) }; }

function openSettings(){
  renderCatList();
  renderColorPresets();
  document.getElementById("settings-overlay").classList.add("show");
}
function closeSettings(){
  document.querySelectorAll(".cat-name-in").forEach(inp=>{
    const oldKey=inp.dataset.key, newKey=inp.value.trim();
    if(!newKey || newKey===oldKey) return;
    if(CAT[newKey]) return;
    CAT[newKey]=CAT[oldKey];
    delete CAT[oldKey];
    events=events.map(e=>e.category===oldKey?{...e,category:newKey}:e);
  });
  document.getElementById("settings-overlay").classList.remove("show");
  renderView();
}

function renderCatList(){
  const keys=Object.keys(CAT);
  document.getElementById("cat-list").innerHTML=keys.map((k,i)=>{
    const v=CAT[k];
    const canDel=keys.length>1;
    return `<div class="cat-row" id="catrow-${i}">
      <div class="cat-color-dot" style="background:${v.bg}" onclick="pickColorFor('${esc(k)}')">
        <input type="color" value="${v.bg}" oninput="updateCatColor('${esc(k)}',this.value,${i})" onchange="updateCatColor('${esc(k)}',this.value,${i})">
      </div>
      <input class="cat-name-in" data-key="${esc(k)}" value="${esc(k)}" placeholder="카테고리명">
      <button class="cat-del-btn" onclick="deleteCat('${esc(k)}')" ${canDel?"":"disabled"}>−</button>
    </div>`;
  }).join("");
}

function renderColorPresets(){
  document.getElementById("color-presets").innerHTML=PALETTE.map(c=>
    `<button class="color-preset" style="background:${c}" onclick="applyPresetColor('${c}')"></button>`
  ).join("");
}

function updateCatColor(key, hex, idx){
  if(!CAT[key]) return;
  CAT[key]=makeCatColors(hex);
  const dot=document.querySelector(`#catrow-${idx} .cat-color-dot`);
  if(dot) dot.style.background=hex;
}

let focusedCatKey=null;
document.addEventListener("focusin", e=>{ if(e.target.classList.contains("cat-name-in")) focusedCatKey=e.target.dataset.key; });

function applyPresetColor(hex){
  const key=focusedCatKey||Object.keys(CAT)[0];
  if(!CAT[key]) return;
  CAT[key]=makeCatColors(hex);
  renderCatList();
}

function pickColorFor(key){ focusedCatKey=key; }

function addNewCat(){
  const names=["새카테고리","카테고리A","카테고리B","카테고리C","카테고리D"];
  let name=names.find(n=>!CAT[n])||"카테고리"+(Object.keys(CAT).length+1);
  const colors=PALETTE[Object.keys(CAT).length % PALETTE.length];
  CAT[name]=makeCatColors(colors);
  focusedCatKey=name;
  renderCatList();
  setTimeout(()=>{
    const inputs=document.querySelectorAll(".cat-name-in");
    const last=inputs[inputs.length-1];
    if(last){ last.focus(); last.select(); }
  },50);
}

function deleteCat(key){
  if(Object.keys(CAT).length<=1) return;
  const fallback=Object.keys(CAT).find(k=>k!==key)||"기타";
  events=events.map(e=>e.category===key?{...e,category:fallback}:e);
  delete CAT[key];
  if(focusedCatKey===key) focusedCatKey=null;
  renderCatList();
}

requestAnimationFrame(()=>{ requestAnimationFrame(renderView); });
window.addEventListener("resize", renderView);

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(()=>console.log('SW 등록 완료'))
      .catch(err=>console.log('SW 등록 실패:',err));
  });
}
</script>
