<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset='utf-8' />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중기 3기 일정표</title>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #f8f9fa;
        }
        #calendar-container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .fc-event { cursor: pointer; border: none !important; }
        .fc-event-title { font-weight: 600; padding: 2px 4px; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="calendar-container">
        <h2>중기 3기 1회차 프로그램 일정</h2>
        <div id='calendar'></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                initialDate: '2026-04-01',
                locale: 'ko',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek'
                },
                events: [
                    { title: 'OT: 청년 도전! 비전 게임', start: '2026-04-01T13:00:00', end: '2026-04-01T15:00:00', color: '#FFD700', textColor: '#000' },
                    { title: '비즈니스 매너 및 에티켓', start: '2026-04-01T15:00:00', end: '2026-04-01T17:00:00', color: '#00BFFF' },
                    { title: '기업탐방(포스코광양제철소)', start: '2026-04-02T12:30:00', end: '2026-04-02T17:30:00', color: '#32CD32' },
                    { title: '스테인드글라스 트레이 만들기', start: '2026-04-06T13:00:00', end: '2026-04-06T17:00:00', color: '#FFD700', textColor: '#000' },
                    { title: '집단심리상담(미술치료)', start: '2026-04-08T14:00:00', end: '2026-04-08T17:00:00', color: '#FF0000' },
                    { title: '퍼스널 컬러 이미지메이킹', start: '2026-04-13T13:00:00', end: '2026-04-13T17:00:00', color: '#DA70D6' },
                    { title: '경험과 강점으로 여는 나의 이야기', start: '2026-04-15T13:00:00', end: '2026-04-15T17:00:00', color: '#00BFFF' },
                    { title: 'TA자기분석 및 강점활용', start: '2026-04-20T13:00:00', end: '2026-04-20T17:00:00', color: '#32CD32' },
                    { title: '직업선호도 검사 및 진로 로드맵', start: '2026-04-22T14:00:00', end: '2026-04-22T17:00:00', color: '#DA70D6' },
                    { title: '순천 청년 퍼실리테이션', start: '2026-04-27T14:00:00', end: '2026-04-27T17:00:00', color: '#32CD32' },
                    { title: '중독예방교육', start: '2026-04-29T13:00:00', end: '2026-04-29T15:00:00', color: '#FFA500' },
                    { title: '나의 작은 정원(원예)', start: '2026-04-29T15:00:00', end: '2026-04-29T17:00:00', color: '#DA70D6' }
                ],
                eventClick: function(info) {
                    alert('프로그램: ' + info.event.title + '\n시간: ' + info.event.start.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}));
                }
            });
            calendar.render();
        });
    </script>
</body>
</html>
