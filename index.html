<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset='utf-8' />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>중기 3기 일정 관리</title>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root {
            --primary-color: #4A90E2;
            --bg-color: #f0f2f5;
        }
        body {
            margin: 0;
            padding: 10px;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
        }
        #calendar-container {
            width: 100%;
            max-width: 500px; /* S24+ 비율에 적당한 너비 */
            background: #fff;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        h2 { font-size: 1.2rem; text-align: center; margin-bottom: 15px; color: #333; }
        
        /* 캘린더 내부 텍스트 크기 조절 (겹침 방지) */
        .fc { font-size: 0.85rem; }
        .fc-event { border-radius: 4px; padding: 1px 3px; margin-bottom: 1px !important; border: none !important; }
        .fc-event-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .fc-daygrid-event-dot { display: none; } /* 점 숨기기 */

        /* 완료된 일정 스타일 */
        .event-completed {
            text-decoration: line-through;
            opacity: 0.5;
            filter: grayscale(1);
        }

        /* 모달 스타일 */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 20px;
            width: 85%;
            max-width: 350px;
            text-align: center;
        }
        .modal-title { font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; }
        .modal-info { font-size: 0.95rem; color: #666; margin-bottom: 20px; line-height: 1.6; }
        .btn-group { display: flex; gap: 10px; }
        button {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            font-weight: bold; cursor: pointer;
        }
        .btn-complete { background: #28a745; color: white; }
        .btn-close { background: #eee; color: #333; }
    </style>
</head>
<body>

    <div id="calendar-container">
        <h2>중기 3기 1회차 프로그램</h2>
        <div id='calendar'></div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <div id="m-title" class="modal-title"></div>
            <div id="m-info" class="modal-info"></div>
            <div class="btn-group">
                <button class="btn-complete" onclick="toggleComplete()">완료/미완료</button>
                <button class="btn-close" onclick="closeModal()">닫기</button>
            </div>
        </div>
    </div>

    <script>
        let currentEvent = null;
        const storageKey = 'completed_events';

        // 로컬스토리지에서 완료 목록 불러오기
        let completedIds = JSON.parse(localStorage.getItem(storageKey) || '[]');

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                initialDate: '2026-04-01',
                locale: 'ko',
                height: 'auto',
                headerToolbar: { left: 'prev', center: 'title', right: 'next' },
                events: [
                    { id: '1', title: 'OT: 비전 게임', start: '2026-04-01T13:00:00', end: '2026-04-01T15:00:00', color: '#FFD700', textColor: '#000', extendedProps: { loc: '미래기술산업진흥원 3층' } },
                    { id: '2', title: '비즈니스 매너', start: '2026-04-01T15:00:00', end: '2026-04-01T17:00:00', color: '#00BFFF', extendedProps: { loc: '미래기술산업진흥원 3층' } },
                    { id: '3', title: '기업탐방(포스코)', start: '2026-04-02T12:30:00', end: '2026-04-02T17:30:00', color: '#32CD32', extendedProps: { loc: '포스코 홍보관' } },
                    { id: '4', title: '트레이 만들기', start: '2026-04-06T13:00:00', end: '2026-04-06T17:00:00', color: '#FFD700', textColor: '#000', extendedProps: { loc: '미래기술산업진흥원 3층' } },
                    { id: '5', title: '집단심리상담', start: '2026-04-08T14:00:00', end: '2026-04-08T17:00:00', color: '#FF0000', extendedProps: { loc: '미래기술산업진흥원 3층' } },
                    { id: '6', title: '퍼스널 컬러', start: '2026-04-13T13:00:00', end: '2026-04-13T17:00:00', color: '#DA70D6', extendedProps: { loc: 'CL미용학원' } },
                    { id: '7', title: '나의 이야기', start: '2026-04-15T13:00:00', end: '2026-04-15T17:00:00', color: '#00BFFF', extendedProps: { loc: '시민공익활동지원센터' } },
                    { id: '8', title: 'TA자기분석', start: '2026-04-20T13:00:00', end: '2026-04-20T17:00:00', color: '#32CD32', extendedProps: { loc: '미래기술산업진흥원 3층' } },
                    { id: '9', title: '직업선호도 검사', start: '2026-04-22T14:00:00', end: '2026-04-22T17:00:00', color: '#DA70D6', extendedProps: { loc: '시민공익활동지원센터' } },
                    { id: '10', title: '청년 퍼실리테이션', start: '2026-04-27T14:00:00', end: '2026-04-27T17:00:00', color: '#32CD32', extendedProps: { loc: '시민공익활동지원센터' } },
                    { id: '11', title: '중독예방교육', start: '2026-04-29T13:00:00', end: '2026-04-29T15:00:00', color: '#FFA500', extendedProps: { loc: '미래기술산업진흥원 2층' } },
                    { id: '12', title: '원예 활동', start: '2026-04-29T15:00:00', end: '2026-04-29T17:00:00', color: '#DA70D6', extendedProps: { loc: '미래기술산업진흥원 2층' } }
                ],
                eventDidMount: function(info) {
                    if (completedIds.includes(info.event.id)) {
                        info.el.classList.add('event-completed');
                    }
                },
                eventClick: function(info) {
                    currentEvent = info.event;
                    document.getElementById('m-title').innerText = info.event.title;
                    document.getElementById('m-info').innerHTML = `
                        🕒 시간: ${info.event.start.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} ~ ${info.event.end.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}<br>
                        📍 장소: ${info.event.extendedProps.loc}
                    `;
                    document.getElementById('modal').style.display = 'flex';
                }
            });
            calendar.render();
        });

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function toggleComplete() {
            const id = currentEvent.id;
            const index = completedIds.indexOf(id);
            
            if (index > -1) {
                completedIds.splice(index, 1);
                currentEvent.el.classList.remove('event-completed');
            } else {
                completedIds.push(id);
                currentEvent.el.classList.add('event-completed');
            }
            
            localStorage.setItem(storageKey, JSON.stringify(completedIds));
            closeModal();
        }
    </script>
</body>
</html>
